<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thuộc Tính</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin/catalog/catalog.css}">

    <style>
        /* CSS dùng chung để thay thế các style inline cứng */
        .top-controls {
            display: flex;
            gap: 16px;
        }
        .search-wrapper {
            flex: 1;
        }
        .search-box-container {
            flex: 2;
            min-width: 200px;
        }
        .sys-info-group {
            display: flex;
            gap: 15px;
        }
        .sys-info-item {
            flex: 1;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            margin-top: 15px;
        }

        /* Tùy chỉnh riêng cho màn hình điện thoại và máy tính bảng nhỏ (< 768px) */
        @media (max-width: 768px) {
            .actions-bar {
                flex-direction: column; /* Xếp dọc nút thêm mới và tabs */
                align-items: stretch;
                gap: 12px;
            }
            .tabs {
                display: flex;
                overflow-x: auto; /* Cho phép vuốt ngang các tabs */
                white-space: nowrap;
                padding-bottom: 5px;
            }
            .tabs::-webkit-scrollbar {
                height: 4px;
            }
            .top-controls {
                flex-direction: column; /* Đẩy bộ lọc xuống dưới ô tìm kiếm */
                gap: 10px;
            }
            .filter-select {
                width: 100%;
            }
            .drawer {
                width: 100% !important; /* Khung thêm/sửa chiếm toàn màn hình */
                max-width: 100%;
            }
            .sys-info-group {
                flex-direction: column; /* Xếp dọc ngày tạo/ngày sửa */
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="actions-bar">
        <nav class="tabs" id="tabs">
            <button class="tab active" data-tab="danh-muc" data-has-desc="true">DANH MỤC</button>
            <button class="tab" data-tab="hang" data-has-desc="true">HÃNG</button>
            <button class="tab" data-tab="chat-lieu" data-has-desc="true">CHẤT LIỆU</button>
            <button class="tab" data-tab="mau-sac" data-has-desc="false">MÀU SẮC</button>
            <button class="tab" data-tab="kich-thuoc" data-has-desc="false">KÍCH THƯỚC</button>
        </nav>
        <button class="btn" id="btnAdd"><i class="bi bi-plus-lg"></i> THÊM MỚI</button>
    </div>
    <section class="search-section">
        <div class="top-controls">
            <div class="search-wrapper">
                <div class="search-box-container">
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="text" class="search-input" id="search"
                               placeholder="Tìm tên hoặc mã..."
                               oninput="window.CatalogApp.handleSearch(this.value)">
                    </div>
                </div>
            </div>
            <select class="filter-select" id="fTrangThaiFilter">
                <option value="">Tất cả trạng thái</option>
                <option value="true">Đang hoạt động</option>
                <option value="false">Ngưng hoạt động</option>
            </select>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="paginationContainer" class="pagination-wrapper"></div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-header">
        <h3 class="drawer-title" id="drawerTitle">THÊM MỚI</h3>
    </div>
    <div class="drawer-body">
        <h5 style="font-weight:700; margin-bottom:12px; font-size:13px; color:#555;">1. Thông tin chung</h5>
        <div class="form-group">
            <label class="form-label">Mã thuộc tính <span style="font-weight:400; color:#888;">(Để trống tự sinh)</span></label>
            <input id="fMa" class="form-input" placeholder="Mã tự động..." disabled style="background: #f9fafb;">
        </div>
        <div class="form-group">
            <label class="form-label">Tên thuộc tính <span style="color:red">*</span> <span style="font-weight:400; color:#888;">(Tối đa 100 ký tự)</span></label>
            <input id="fTen" class="form-input" placeholder="Nhập tên thuộc tính...">
        </div>
        <div class="form-group" id="groupMoTa">
            <label class="form-label">Mô tả</label>
            <textarea id="fMoTa" class="form-textarea" placeholder="Nhập mô tả chi tiết..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Trạng thái</label>
            <div class="switch-wrapper">
                <input type="checkbox" id="fTrangThai" class="switch" checked>
                <span class="switch-label">Kích hoạt</span>
            </div>
        </div>
        <div id="groupFullDetail" style="display: none; border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px;">
            <h5 style="font-weight:700; margin-bottom:12px; font-size:13px; color:#555;">2. Thông tin hệ thống</h5>
            <div class="sys-info-group">
                <div class="form-group sys-info-item">
                    <label class="form-label">Ngày tạo</label>
                    <input id="fNgayTao" class="form-input" disabled style="background: #f9fafb; color: #666;">
                </div>
                <div class="form-group sys-info-item">
                    <label class="form-label">Ngày sửa</label>
                    <input id="fNgaySua" class="form-input" disabled style="background: #f9fafb; color: #666;">
                </div>
            </div>
        </div>
    </div>
    <div class="drawer-footer">
        <button class="btn btn-secondary" id="btnClose" style="flex: 1; height: 38px;">THOÁT</button>
        <button class="btn" id="btnSave" style="flex: 1; height: 38px;">LƯU THÔNG TIN</button>
    </div>
</aside>

<script th:src="@{/js/admin/catalog/catalog.js}"></script>
</body>
</html>
