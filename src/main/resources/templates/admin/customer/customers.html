<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #000; --white: #fff; --gray-100: #f4f4f5; --gray-200: #e4e4e7; --gray-300: #d4d4d8; --font-size: 12.5px; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); font-size: var(--font-size); line-height: 1.4; }
        .container { max-width: 100%; padding: 20px 30px; }

        .actions-bar { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--gray-200); margin-bottom: 20px; padding-bottom: 0; }
        .tabs { display: flex; gap: 30px; margin-bottom: 0; border: none; }
        .tab { font-size: 12.5px; font-weight: 700; color: #888; padding: 0 0 12px 0; cursor: pointer; text-transform: uppercase; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: 0.2s; }
        .tab:hover { color: #000; }
        .tab.active { color: #000; border-bottom-color: #000; }
        .btn { font-size: 11px; font-weight: 800; text-transform: uppercase; height: 30px; padding: 0 14px; background: #000; color: #fff; border: 1px solid #000; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border-radius: 2px; }
        .btn:hover { background: #333; }

        .search-section { margin-bottom: 15px; }
        .search-wrapper { display: flex; gap: 15px; }
        .search-input, .filter-select { padding: 8px 12px; font-size: 12.5px; border: 1px solid var(--gray-300); outline: none; background: #fff; height: 34px; border-radius: 2px; }
        .search-input { width: 400px; }
        .filter-select { width: 150px; }
        .search-input:focus, .filter-select:focus { border-color: #000; }

        .table-wrapper { border: 1px solid var(--gray-200); width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        thead th { text-align: left; padding: 10px 15px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #666; background: #fafafa; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
        tbody td { padding: 8px 15px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; font-size: 12.5px; word-wrap: break-word; }
        tbody tr:hover { background: var(--gray-100); }
        .status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: #f4f4f5; color: #666; white-space: nowrap; }
        .status:not(.inactive) { background: #ecfdf5; color: #059669; }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

        .btn-icon { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); background: #fff; cursor: pointer; border-radius: 6px; transition: 0.2s; margin-left: 6px; }
        .btn-icon:hover { border-color: #000; background: #000; color: #fff; }
        .btn-icon.view:hover { background: #2563eb; border-color: #2563eb; } /* Màu xanh cho nút Xem */
        .btn-icon.edit:hover { background: #000; border-color: #000; }

        .pagination-wrapper { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; }
        .pagination-info { font-size: 11px; font-weight: 600; color: #888; }
        .page-number { min-width: 26px; height: 26px; font-size: 12px; font-weight: 700; background: transparent; border: 1px solid transparent; cursor: pointer; }
        .page-number.active { background: #000; color: #fff; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .overlay.show { display: block; }
        .drawer { position: fixed; top: 0; right: -650px; width: 650px; height: 100vh; background: #fff; border-left: 1px solid var(--gray-200); z-index: 1000; transition: 0.3s; display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
        .drawer.show { right: 0; }
        .drawer-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center;}
        .drawer-title { font-size: 14px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .drawer-body { flex: 1; padding: 20px; overflow-y: auto; }
        .drawer-footer { padding: 15px 20px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 8px; font-size: 12.5px; border: 1px solid var(--gray-300); outline: none; }
        .form-input:disabled, .form-textarea:disabled { background: #f9f9f9; color: #555; }
        .form-input:focus { border-color: #000; }
        .form-textarea { min-height: 80px; resize: vertical; }
        .switch-wrapper { display: flex; align-items: center; gap: 10px; }
        .switch { width: 36px; height: 20px; position: relative; appearance: none; background: #ddd; outline: none; cursor: pointer; transition: 0.2s; }
        .switch::before { content:''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; transition: 0.2s; }
        .switch:checked { background: #000; }
        .switch:checked::before { left: 18px; }
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: rgba(0,0,0,0.85); color: #fff; padding: 10px 14px; border-radius: 6px; margin-top: 10px; min-width: 180px; }
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }
        .empty-state { text-align: center; padding: 40px; color: #888; font-size: 12px; }

        .img-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid var(--gray-200); background: #fff; display:inline-block; }
        .small-muted { font-size: 12px; color: #888; }
        .row { display:flex; gap: 16px; }
        .col { flex: 1; }
        .col-sm { width: 220px; flex: none; }
        .btn-ghost { background: transparent; border: 1px solid var(--gray-300); color: #000; padding: 8px 12px; border-radius: 4px; cursor:pointer; }
        .btn-ghost:hover { background:#f3f4f6; }

        #btnGen { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="actions-bar">
        <nav class="tabs" id="tabs">
            <button class="tab active" data-tab="khach-hang" data-has-desc="true">KHÁCH HÀNG</button>
        </nav>
        <button class="btn" id="btnAdd"><i class="bi bi-plus-lg"></i> THÊM MỚI</button>
    </div>

    <section class="search-section">
        <div style="display: flex; gap: 16px; align-items:center;">
            <div class="search-wrapper" style="flex: 1;">
                <input type="text" class="search-input" id="search" placeholder="🔍 Tìm theo mã, tên, email, sđt...">
            </div>
            <select class="filter-select" id="fTrangThaiFilter" style="width: 200px;">
                <option value="">Tất cả</option>
                <option value="true">ACTIVE</option>
                <option value="false">INACTIVE</option>
            </select>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="pagination-wrapper">
        <div class="pagination-info" id="info">Showing 0 items</div>
        <div class="pagination">
            <button class="page-number" id="prev">←</button>
            <span id="pageNumbers"></span>
            <button class="page-number" id="next">→</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-header">
        <h3 class="drawer-title" id="drawerTitle">THÊM KHÁCH HÀNG</h3>
    </div>

    <div class="drawer-body">
        <h5 style="font-weight:700; margin-bottom:10px; font-size:13px; color:#555;">1. THÔNG TIN CHUNG</h5>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label class="form-label">Mã khách hàng <span style="font-weight:400; color:#888;">(Tối đa 20 ký tự, không dấu)</span></label>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input id="fMa" class="form-input" placeholder="Nhập mã... (ví dụ KH123ABC)" maxlength="20">
                        <!-- vẫn giữ nút nhưng ẩn bằng CSS -->
                        <button class="btn-ghost" id="btnGen">TỰ GEN</button>
                    </div>
                    <div id="errMa" class="small-muted" style="color:#dc2626; display:none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Họ tên <span style="color:red">*</span></label>
                    <input id="fHoTen" class="form-input" placeholder="Nhập họ tên...">
                    <div id="errHoTen" class="small-muted" style="color:#dc2626; display:none;"></div>
                </div>

                <div style="display:flex; gap:12px;">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Giới tính <span style="color:red">*</span></label>
                        <select id="fGioiTinh" class="form-select">
                            <option value="">—</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <div id="errGioiTinh" class="small-muted" style="color:#dc2626; display:none;"></div>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Ngày sinh <span style="color:red">*</span></label>
                        <input id="fNgaySinh" class="form-input" type="date">
                        <div id="errNgaySinh" class="small-muted" style="color:#dc2626; display:none;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email <span style="color:red">*</span></label>
                    <input id="fEmail" class="form-input" placeholder="ví dụ: abc@example.com">
                    <div id="errEmail" class="small-muted" style="color:#dc2626; display:none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Số điện thoại <span style="color:red">*</span></label>
                    <input id="fSoDienThoai" class="form-input" placeholder="0912345678 hoặc +84912345678">
                    <div id="errSoDienThoai" class="small-muted" style="color:#dc2626; display:none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Địa chỉ <span style="color:red">*</span></label>
                    <textarea id="fDiaChi" class="form-textarea" placeholder="Địa chỉ..."></textarea>
                    <div id="errDiaChi" class="small-muted" style="color:#dc2626; display:none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Trạng thái</label>
                    <div class="switch-wrapper">
                        <input type="checkbox" id="fTrangThai" class="switch" checked>
                        <span class="switch-label">Kích hoạt</span>
                    </div>
                </div>
            </div>

            <div class="col-sm" id="colImage" style="display:none; flex-direction: column;">
                <div style="font-weight:700; margin-bottom:8px;">ẢNH HIỂN THỊ</div>
                <img id="imgPreview" class="img-preview" src="https://haycafe.vn/wp-content/uploads/2021/11/Anh-avatar-dep-chat-lam-hinh-dai-dien.jpgg" alt="Ảnh khách hàng">
                <div style="margin-top:8px;">
                    <input type="file" id="fHinhAnhFile" accept="image/*" style="display:none;">
                    <button class="btn-ghost" id="btnChooseImage">Chọn ảnh mới</button>
                    <div id="errHinhAnh" class="small-muted" style="color:#dc2626; display:none;"></div>
                </div>
            </div>
        </div>

    </div>

    <div class="drawer-footer">
        <button class="btn btn-secondary" id="btnClose" style="flex: 1;">Thoát</button>
        <button class="btn" id="btnSave" style="flex: 1;">Lưu</button>
    </div>
</aside>
<div class="toast-container" id="toastHost"></div>

<script>
    // Simple toast implementation
    window.toast = function(message, type = 'default', ttl = 3000) {
        const host = document.getElementById('toastHost');
        const el = document.createElement('div');
        el.className = 'toast ' + (type === 'success' ? 'success' : (type === 'error' ? 'error' : ''));
        el.innerText = message;
        host.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transition = '0.3s'; }, ttl - 300);
        setTimeout(() => { host.removeChild(el); }, ttl);
    };

    const CustomerApp = {
        state: {
            page: 0, size: 10, totalPages: 0, q: '', trangThai: '', editingId: null, mode: 'create', saving: false
        },

        init: function() {
            this.bindEvents();
            this.loadData();
        },

        bindEvents: function() {
            const self = this;
            document.getElementById('btnAdd').onclick = () => self.openDrawer('create');
            document.getElementById('btnSave').onclick = () => self.saveItem();
            document.getElementById('btnClose').onclick = () => self.closeDrawer();
            document.getElementById('overlay').onclick = () => self.closeDrawer();
            document.getElementById('prev').onclick = () => { if(self.state.page > 0) { self.state.page--; self.loadData(); }};
            document.getElementById('next').onclick = () => { if(self.state.page < self.state.totalPages - 1) { self.state.page++; self.loadData(); }};

            let timeout;
            document.getElementById('search').oninput = (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => { self.state.q = e.target.value.trim(); self.state.page = 0; self.loadData(); }, 500);
            };
            document.getElementById('fTrangThaiFilter').onchange = (e) => {
                self.state.trangThai = e.target.value; self.state.page = 0; self.loadData();
            };
            document.getElementById('btnGen').onclick = (e) => {
                e.preventDefault();
                const gen = self.generateMa();
                document.getElementById('fMa').value = gen;
                document.getElementById('errMa').style.display = 'none';
            };
            document.getElementById('btnChooseImage').onclick = (e) => {
                e.preventDefault();
                document.getElementById('fHinhAnhFile').click();
            };
            document.getElementById('fHinhAnhFile').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                document.getElementById('imgPreview').src = url;
            };
        },

        loadData: async function() {
            this.renderHeader();
            const { page, size, q, trangThai } = this.state;
            const url = `/api/khach-hang?page=${page}&size=${size}&q=${encodeURIComponent(q || '')}&trangThai=${trangThai}`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Không thể tải dữ liệu');
                const data = await res.json();
                this.renderTable(data.content || []);
                this.renderPagination(data);
            } catch (err) {
                console.error(err);
                window.toast('Tải dữ liệu thất bại', 'error');
            }
        },

        renderHeader: function() {
            document.getElementById('thead').innerHTML = `
                <tr>
                    <th style="width:50px; text-align:center;">STT</th>
                    <th style="width:140px">MÃ</th>
                    <th>TÊN</th>
                    <th>EMAIL</th>
                    <th>SỐ ĐIỆN THOẠI</th>
                    <th style="text-align:center">TRẠNG THÁI</th>
                    <th style="text-align:right">THAO TÁC</th>
                </tr>`;
        },

        renderTable: function(list) {
            const tbody = document.getElementById('tbody');
            if(list.length === 0) { tbody.innerHTML = `<tr><td colspan="7" class="empty-state">Không có dữ liệu</td></tr>`; return; }

            tbody.innerHTML = list.map((item, index) => {
                const stt = (this.state.page * this.state.size) + index + 1;
                const statusHtml = item.trangThai ? `<span class="status"><span class="status-dot"></span>HOẠT ĐỘNG</span>` : `<span class="status inactive"><span class="status-dot"></span>NGƯNG HOẠT ĐỘNG</span>`;
                const email = item.email ? (item.email.length > 40 ? item.email.substring(0,40) + '...' : item.email) : '—';
                const phone = item.soDienThoai || '—';
                return `<tr>
                    <td style="font-weight:700; text-align:center;">${stt}</td>
                    <td style="font-weight:700; color:#1e40af">${item.ma || '—'}</td>
                    <td style="font-weight:600">${item.hoTen || '—'}</td>
                    <td style="font-weight:600; color:#111">${email}</td>
                    <td style="font-weight:600; color:#111">${phone}</td>
                    <td style="text-align:center">${statusHtml}</td>
                    <td style="text-align:right">
                        <button class="btn-icon view" title="Xem chi tiết" onclick="CustomerApp.openDetail(${item.id})"><i class="bi bi-eye"></i></button>
                        <button class="btn-icon edit" title="Sửa" onclick="CustomerApp.openEdit(${item.id})"><i class="bi bi-pencil"></i></button>
                    </td>
                </tr>`;
            }).join('');
        },

        renderPagination: function(data) {
            this.state.totalPages = data.totalPages;
            document.getElementById('info').textContent = `${data.numberOfElements}/${data.totalElements} bản ghi`;
            document.getElementById('prev').disabled = data.first;
            document.getElementById('next').disabled = data.last;
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';
            for(let i = 0; i < data.totalPages; i++) {
                if(i === 0 || i === data.totalPages - 1 || (i >= this.state.page - 1 && i <= this.state.page + 1)) {
                    const btn = document.createElement('button');
                    btn.className = `page-number ${i === this.state.page ? 'active' : ''}`;
                    btn.textContent = i + 1;
                    btn.onclick = () => { this.state.page = i; this.loadData(); };
                    pageNumbers.appendChild(btn);
                }
            }
        },

        // drawer handling
        openDrawer: function(mode, item) {
            this.state.mode = mode;
            this.state.editingId = item ? item.id : null;
            const titleEl = document.getElementById('drawerTitle');
            const btnSave = document.getElementById('btnSave');

            // fields
            const fMa = document.getElementById('fMa');
            const fHoTen = document.getElementById('fHoTen');
            const fGioiTinh = document.getElementById('fGioiTinh');
            const fNgaySinh = document.getElementById('fNgaySinh');
            const fEmail = document.getElementById('fEmail');
            const fSoDienThoai = document.getElementById('fSoDienThoai');
            const fDiaChi = document.getElementById('fDiaChi');
            const fTrangThai = document.getElementById('fTrangThai');
            const colImage = document.getElementById('colImage');
            const imgPreview = document.getElementById('imgPreview');
            const fileInput = document.getElementById('fHinhAnhFile');

            if(mode === 'create') {
                titleEl.textContent = 'THÊM KHÁCH HÀNG';
                btnSave.style.display = 'block';
                colImage.style.display = 'none';
                // reset
                this.state.editingId = null;
                fMa.value = '';
                fHoTen.value = '';
                fGioiTinh.value = '';
                fNgaySinh.value = '';
                fEmail.value = '';
                fSoDienThoai.value = '';
                fDiaChi.value = '';
                fTrangThai.checked = true;
                imgPreview.src = '';
                fileInput.value = '';
                this.clearValidation();
                // enable all inputs for create
                [fMa,fHoTen,fGioiTinh,fNgaySinh,fEmail,fSoDienThoai,fDiaChi,fTrangThai].forEach(el => el.disabled = false);
                document.getElementById('btnChooseImage').style.display = 'inline-block';
            } else if(mode === 'edit') {
                titleEl.textContent = 'CẬP NHẬT KHÁCH HÀNG';
                btnSave.style.display = 'block';
                // per request: khi chỉnh sửa KHÔNG được chỉnh sửa bất cứ thứ gì TRỪ trạng thái
                colImage.style.display = 'flex';
                fMa.value = item.ma || '';
                fHoTen.value = item.hoTen || '';
                fGioiTinh.value = item.gioiTinh || '';
                fNgaySinh.value = item.ngaySinh ? item.ngaySinh.split('T')[0] : '';
                fEmail.value = item.email || '';
                fSoDienThoai.value = item.soDienThoai || '';
                fDiaChi.value = item.diaChi || '';
                fTrangThai.checked = item.trangThai !== false;
                imgPreview.src = item.hinhAnh || '/static/images/default-avatar.png';
                fileInput.value = '';
                this.clearValidation();

                // disable all except fTrangThai
                [fMa,fHoTen,fGioiTinh,fNgaySinh,fEmail,fSoDienThoai,fDiaChi].forEach(el => el.disabled = true);
                fTrangThai.disabled = false;
                // disable image change per request (so user cannot change image while editing)
                document.getElementById('btnChooseImage').style.display = 'none';
            } else if(mode === 'view') {
                titleEl.textContent = 'CHI TIẾT KHÁCH HÀNG';
                btnSave.style.display = 'none';
                colImage.style.display = 'flex';
                fMa.value = item.ma || '';
                fHoTen.value = item.hoTen || '';
                fGioiTinh.value = item.gioiTinh || '';
                fNgaySinh.value = item.ngaySinh ? item.ngaySinh.split('T')[0] : '';
                fEmail.value = item.email || '';
                fSoDienThoai.value = item.soDienThoai || '';
                fDiaChi.value = item.diaChi || '';
                fTrangThai.checked = item.trangThai !== false;

                // disable all fields
                [fMa,fHoTen,fGioiTinh,fNgaySinh,fEmail,fSoDienThoai,fDiaChi,fTrangThai].forEach(el => el.disabled = true);
                document.getElementById('btnChooseImage').style.display = 'none';

                imgPreview.src = item.hinhAnh || '/static/images/default-avatar.png';
                fileInput.value = '';
            }

            // show drawer
            document.getElementById('overlay').classList.add('show');
            document.getElementById('drawer').classList.add('show');
            document.getElementById('drawer').setAttribute('aria-hidden','false');
        },

        closeDrawer: function() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('drawer').classList.remove('show');
            document.getElementById('drawer').setAttribute('aria-hidden','true');
            // re-enable fields (in case view/edit)
            const fields = ['fMa','fHoTen','fGioiTinh','fNgaySinh','fEmail','fSoDienThoai','fDiaChi','fTrangThai'];
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = false;
            });
            document.getElementById('btnChooseImage').style.display = 'inline-block';
        },

        openEdit: async function(id) {
            try {
                const res = await fetch(`/api/khach-hang/${id}`);
                if(!res.ok) throw new Error('Không tìm thấy khách hàng');
                const item = await res.json();
                this.openDrawer('edit', item);
            } catch (e) {
                console.error(e);
                window.toast(e.message || 'Lỗi', 'error');
            }
        },

        openDetail: async function(id) {
            try {
                const res = await fetch(`/api/khach-hang/${id}`);
                if(!res.ok) throw new Error('Không tìm thấy khách hàng');
                const item = await res.json();
                this.openDrawer('view', item);
            } catch (e) {
                console.error(e);
                window.toast(e.message || 'Lỗi', 'error');
            }
        },

        // helper: generate ma "KH" + 6 alnum
        generateMa: function() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let s = '';
            for(let i=0;i<6;i++) s += chars.charAt(Math.floor(Math.random()*chars.length));
            return 'KH' + s;
        },

        clearValidation: function() {
            ['errMa','errHoTen','errGioiTinh','errNgaySinh','errEmail','errSoDienThoai','errDiaChi','errHinhAnh'].forEach(id => {
                const el = document.getElementById(id);
                if(el){ el.style.display='none'; el.innerText=''; }
            });
        },

        validateForm: async function() {
            this.clearValidation();
            let ok = true;
            const fMaEl = document.getElementById('fMa');
            const fMa = fMaEl.value.trim();
            const fHoTen = document.getElementById('fHoTen').value.trim();
            const fGioiTinh = document.getElementById('fGioiTinh').value;
            const fNgaySinh = document.getElementById('fNgaySinh').value;
            const fEmail = document.getElementById('fEmail').value.trim();
            const fSoDienThoai = document.getElementById('fSoDienThoai').value.trim();
            const fDiaChi = document.getElementById('fDiaChi').value.trim();
            const editingId = this.state.editingId;
            const mode = this.state.mode;

            // if create and mã empty, we will auto gen BEFORE validation in saveItem
            if(!fMa) {
                document.getElementById('errMa').style.display='block';
                document.getElementById('errMa').innerText='Mã không được để trống';
                ok = false;
            } else {
                const pat = /^KH[A-Za-z0-9_-]{1,18}$/;
                if(!pat.test(fMa)) {
                    document.getElementById('errMa').style.display='block';
                    document.getElementById('errMa').innerText='Mã phải bắt đầu bằng "KH" và chỉ chứa chữ/số/_/- (tối đa 20 ký tự)';
                    ok = false;
                } else {
                    // uniqueness check
                    try {
                        const res = await fetch(`/api/khach-hang?q=${encodeURIComponent(fMa)}&size=5`);
                        if(res.ok) {
                            const data = await res.json();
                            const items = data.content || [];
                            const found = items.find(it => it.ma && it.ma.toLowerCase() === fMa.toLowerCase() && it.id !== editingId);
                            if(found) {
                                document.getElementById('errMa').style.display='block';
                                document.getElementById('errMa').innerText='Mã đã tồn tại';
                                ok = false;
                            }
                        }
                    } catch(e) { console.warn('Không thể kiểm tra trùng mã', e); }
                }
            }

            if(mode === 'edit') {
                return ok;
            }

            // for create: validate all fields
            if(!fHoTen) {
                document.getElementById('errHoTen').style.display='block';
                document.getElementById('errHoTen').innerText='Họ tên không được để trống';
                ok = false;
            }
            if(!fGioiTinh) {
                document.getElementById('errGioiTinh').style.display='block';
                document.getElementById('errGioiTinh').innerText='Vui lòng chọn giới tính';
                ok = false;
            }
            if(!fNgaySinh) {
                document.getElementById('errNgaySinh').style.display='block';
                document.getElementById('errNgaySinh').innerText='Vui lòng chọn ngày sinh';
                ok = false;
            } else {
                const d = new Date(fNgaySinh);
                const now = new Date();
                if(d > now) {
                    document.getElementById('errNgaySinh').style.display='block';
                    document.getElementById('errNgaySinh').innerText='Ngày sinh không được trong tương lai';
                    ok = false;
                }
            }

            const emailPat = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!fEmail) {
                document.getElementById('errEmail').style.display='block';
                document.getElementById('errEmail').innerText='Email không được để trống';
                ok = false;
            } else if(!emailPat.test(fEmail)) {
                document.getElementById('errEmail').style.display='block';
                document.getElementById('errEmail').innerText='Email không đúng định dạng';
                ok = false;
            } else {
                try {
                    const res = await fetch(`/api/khach-hang?q=${encodeURIComponent(fEmail)}&size=5`);
                    if(res.ok){
                        const data = await res.json();
                        const items = data.content || [];
                        const found = items.find(it => it.email && it.email.toLowerCase() === fEmail.toLowerCase() && it.id !== editingId);
                        if(found) {
                            document.getElementById('errEmail').style.display='block';
                            document.getElementById('errEmail').innerText='Email đã tồn tại';
                            ok = false;
                        }
                    }
                } catch(e){ console.warn('Không thể kiểm tra trùng email', e); }
            }

            const phonePat = /^0[0-9]{9}$|^\+84[0-9]{9}$/;
            if(!fSoDienThoai) {
                document.getElementById('errSoDienThoai').style.display='block';
                document.getElementById('errSoDienThoai').innerText='Số điện thoại không được để trống';
                ok = false;
            } else if(!phonePat.test(fSoDienThoai)) {
                document.getElementById('errSoDienThoai').style.display='block';
                document.getElementById('errSoDienThoai').innerText='Số điện thoại không đúng định dạng';
                ok = false;
            } else {
                try {
                    const res = await fetch(`/api/khach-hang?q=${encodeURIComponent(fSoDienThoai)}&size=5`);
                    if(res.ok){
                        const data = await res.json();
                        const items = data.content || [];
                        const found = items.find(it => it.soDienThoai && it.soDienThoai === fSoDienThoai && it.id !== editingId);
                        if(found) {
                            document.getElementById('errSoDienThoai').style.display='block';
                            document.getElementById('errSoDienThoai').innerText='Số điện thoại đã tồn tại';
                            ok = false;
                        }
                    }
                } catch(e){ console.warn('Không thể kiểm tra trùng sđt', e); }
            }

            if(!fDiaChi) {
                document.getElementById('errDiaChi').style.display='block';
                document.getElementById('errDiaChi').innerText='Địa chỉ không được để trống';
                ok = false;
            }

            return ok;
        },

        saveItem: async function() {
            if (this.state.saving) return; // prevent double click
            const mode = this.state.mode;
            const editingId = this.state.editingId;

            // If creating and mã empty => auto-generate here BEFORE validation
            if(mode === 'create') {
                const fMaEl = document.getElementById('fMa');
                if(!fMaEl.value.trim()) {
                    fMaEl.value = this.generateMa();
                }
            }

            const valid = await this.validateForm();
            if(!valid) { window.toast('Vui lòng sửa các lỗi trước khi lưu', 'error'); return; }

            let payload;
            if(mode === 'edit') {
                payload = { trangThai: document.getElementById('fTrangThai').checked };
            } else {
                payload = {
                    ma: document.getElementById('fMa').value.trim(),
                    hoTen: document.getElementById('fHoTen').value.trim(),
                    gioiTinh: document.getElementById('fGioiTinh').value,
                    ngaySinh: document.getElementById('fNgaySinh').value,
                    email: document.getElementById('fEmail').value.trim(),
                    soDienThoai: document.getElementById('fSoDienThoai').value.trim(),
                    diaChi: document.getElementById('fDiaChi').value.trim(),
                    hinhAnh: null,
                    idTaiKhoan: null,
                    trangThai: document.getElementById('fTrangThai').checked
                };
            }

            const fd = new FormData();
            fd.append('data', JSON.stringify(payload));


            this.state.saving = true;
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerText = 'Đang lưu...';

            try {
                const url = editingId ? `/api/khach-hang/${editingId}` : `/api/khach-hang`;
                const method = editingId ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method: method,
                    body: fd
                });

                if (!res.ok) {
                    let msg = `Lưu thất bại (status ${res.status})`;
                    try {
                        const ct = res.headers.get('content-type') || '';
                        if (ct.includes('application/json')) {
                            const j = await res.json();
                            msg = j.message || j.error || JSON.stringify(j);
                        } else {
                            msg = await res.text();
                        }
                    } catch (err) {
                        console.warn('Không parse được body lỗi', err);
                    }
                    throw new Error(msg);
                }

                window.toast('Thao tác thành công', 'success', 2000);
                this.closeDrawer();
                this.loadData();

            } catch (e) {
                console.error(e);
                window.toast('Lưu thất bại: ' + (e.message || ''), 'error', 7000);
            } finally {
                this.state.saving = false;
                btn.disabled = false;
                btn.innerText = 'Lưu';
            }
        }
    };

    window.CustomerApp = CustomerApp;
    CustomerApp.init();
</script>
