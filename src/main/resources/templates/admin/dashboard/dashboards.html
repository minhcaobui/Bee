<head>
    <meta charset="UTF-8">
    <title>Dashboard | Bee Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        /* ═══════════════════════════════════════════
           VARIABLES & RESET
        ═══════════════════════════════════════════ */
        :root {
            --g100:#f4f4f5; --g200:#e4e4e7; --g300:#d4d4d8;
            --green:#10b981; --red:#dc2626; --yellow:#f59e0b; --blue:#3b82f6; --info:#0ea5e9;
            --br:2px;
        }

        /* ═══════════════════════════════════════════
           SHARED COMPONENTS
        ═══════════════════════════════════════════ */
        .db-btn {
            font-size:11px; font-weight:800; text-transform:uppercase;
            height:30px; padding:0 12px; background:#000; color:#fff;
            border:1px solid #000; cursor:pointer;
            display:inline-flex; align-items:center; justify-content:center; gap:5px;
            border-radius:var(--br); transition:.15s; text-decoration:none; white-space:nowrap;
        }
        .db-btn:hover { background:#333; }
        .db-btn:disabled { opacity:.4; cursor:not-allowed; pointer-events:none; }
        .db-btn.ghost { background:#fff; color:#000; border-color:var(--g200); }
        .db-btn.ghost:hover { background:var(--g100); border-color:#000; }
        .db-btn.green-outline { background:#fff; color:var(--green); border-color:var(--green); }
        .db-btn.green-outline:hover { background:var(--green); color:#fff; }

        .db-badge { padding:2px 7px; border-radius:var(--br); font-weight:800; font-size:10px; text-transform:uppercase; letter-spacing:.4px; display:inline-flex; align-items:center; gap:4px; }
        .db-badge.success { background:#d1fae5; color:#065f46; }
        .db-badge.warning { background:#fef3c7; color:#92400e; }
        .db-badge.danger  { background:#fee2e2; color:#991b1b; }
        .db-badge.info    { background:#e0f2fe; color:#0369a1; }

        /* ═══════════════════════════════════════════
           PAGE WRAPPER
        ═══════════════════════════════════════════ */
        .db-page { display:flex; flex-direction:column; gap:14px; }

        /* ═══════════════════════════════════════════
           TOPBAR — period tabs + progressive date
        ═══════════════════════════════════════════ */
        .db-topbar {
            display:flex; align-items:center; justify-content:space-between;
            gap:10px; flex-wrap:wrap;
            border-bottom:1px solid var(--g200); padding-bottom:12px;
        }
        .db-topbar-left  { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .db-topbar-right { display:flex; align-items:center; gap:8px; }

        /* period tabs */
        .period-tabs { display:flex; border:1px solid var(--g200); border-radius:var(--br); overflow:hidden; background:#fff; }
        .period-tab  { font-size:11px; font-weight:800; text-transform:uppercase; padding:5px 12px; background:transparent; border:none; cursor:pointer; color:#888; transition:.15s; white-space:nowrap; }
        .period-tab:not(:last-child) { border-right:1px solid var(--g200); }
        .period-tab.active { background:#000; color:#fff; }
        .period-tab:disabled { opacity:.4; cursor:not-allowed; }

        /* progressive date */
        .date-from-wrap { display:flex; align-items:center; gap:6px; }
        .date-to-wrap   { display:flex; align-items:center; gap:6px;
            max-width:0; overflow:hidden; opacity:0;
            transition: max-width .25s ease, opacity .25s ease; }
        .date-to-wrap.visible { max-width:200px; opacity:1; }
        .db-date-input {
            height:30px; padding:0 9px; font-size:12px; font-family:inherit;
            border:1px solid var(--g200); border-radius:var(--br);
            background:#fff; outline:none; transition:.15s; width:130px;
        }
        .db-date-input:focus { border-color:#000; }
        .db-date-input.error { border-color:var(--red); background:#fff5f5; }
        .date-sep { font-size:11px; color:#bbb; }

        /* active range chip */
        .range-chip {
            display:none; align-items:center; gap:6px;
            padding:3px 9px; border:1px solid #000; border-radius:var(--br);
            background:#000; color:#fff; font-size:10px; font-weight:800; cursor:pointer;
            transition:.15s;
        }
        .range-chip.show { display:inline-flex; }
        .range-chip:hover { background:#333; }

        /* compare toggle */
        .compare-toggle {
            display:flex; align-items:center; gap:6px; padding:4px 10px;
            border:1px solid var(--g200); border-radius:var(--br);
            background:#fff; cursor:pointer; font-size:11px; font-weight:700;
            color:#888; transition:.15s; user-select:none;
        }
        .compare-toggle:hover { border-color:#000; color:#000; }
        .compare-toggle.active { border-color:#000; background:#000; color:#fff; }
        .compare-toggle input { display:none; }
        .cmp-dot { width:7px; height:7px; border-radius:50%; background:var(--g300); transition:.15s; flex-shrink:0; }
        .compare-toggle.active .cmp-dot { background:var(--yellow); }

        @keyframes spin { to{transform:rotate(360deg)} }
        .spinning { animation:spin .6s linear infinite; display:inline-block; }

        /* ═══════════════════════════════════════════
           STAT CARDS
        ═══════════════════════════════════════════ */
        .db-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
        .db-card  { background:#fff; border:1px solid var(--g200); border-radius:var(--br); padding:14px 15px 11px; transition:.2s; }
        .db-card:hover { border-color:#aaa; box-shadow:0 4px 14px rgba(0,0,0,.06); }
        .db-card-top   { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:7px; }
        .db-card-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:#888; }
        .db-card-icon  { width:26px; height:26px; border:1px solid var(--g200); border-radius:var(--br); display:flex; align-items:center; justify-content:center; font-size:12px; color:#bbb; flex-shrink:0; }
        .db-card-value { font-size:19px; font-weight:800; color:#000; line-height:1; margin-bottom:7px; }
        .db-sparkline  { height:30px; margin:0 -15px 8px; }
        .db-card-foot  { display:flex; align-items:center; justify-content:space-between; }
        .db-chg      { font-size:11px; font-weight:700; display:flex; align-items:center; gap:1px; }
        .db-chg.up   { color:var(--green); }
        .db-chg.down { color:var(--red); }
        .db-sub { font-size:11px; color:#bbb; font-weight:500; }

        /* ═══════════════════════════════════════════
           PANELS
        ═══════════════════════════════════════════ */
        .db-row-main   { display:grid; grid-template-columns:1fr 290px; gap:12px; align-items:stretch; }
        .db-row-bottom { display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:stretch; }
        .db-row-extra  { display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:stretch; }

        .db-panel { background:#fff; border:1px solid var(--g200); border-radius:var(--br); display:flex; flex-direction:column; }
        .db-panel-head { padding:10px 14px; border-bottom:1px solid var(--g200); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; gap:8px; }
        .db-panel-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; flex-shrink:0; }
        .db-chart-area  { padding:12px; flex:1; min-height:220px; position:relative; }

        /* chart legend */
        .chart-legend { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .leg-item {
            display:flex; align-items:center; gap:5px;
            padding:2px 7px; border:1px solid var(--g200); border-radius:var(--br);
            cursor:pointer; font-size:11px; font-weight:700; color:#555;
            background:#fff; transition:opacity .15s;
            user-select:none;
        }
        .leg-item.hidden { opacity:.35; text-decoration:line-through; }
        .leg-line   { width:16px; height:2px; display:inline-block; border-radius:1px; flex-shrink:0; }
        .leg-dashed { width:16px; height:0; display:inline-block; flex-shrink:0; }

        /* chart type toggle */
        .ctt { display:flex; border:1px solid var(--g200); border-radius:var(--br); overflow:hidden; }
        .ctt-btn { width:26px; height:24px; display:flex; align-items:center; justify-content:center; border:none; background:#fff; cursor:pointer; color:#bbb; font-size:12px; transition:.15s; }
        .ctt-btn:not(:last-child) { border-right:1px solid var(--g200); }
        .ctt-btn:hover  { color:#000; }
        .ctt-btn.active { background:#000; color:#fff; }

        /* drill-down strip */
        .drilldown-strip { display:none; border-top:1px solid var(--g200); background:var(--g100); padding:10px 14px; }
        .drilldown-strip.show { display:block; animation:fadeSlideUp .2s ease; }
        @keyframes fadeSlideUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
        .drilldown-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
        .drilldown-title { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:#888; }
        .drilldown-close { width:20px; height:20px; border:1px solid var(--g200); background:#fff; border-radius:var(--br); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; color:#888; transition:.15s; }
        .drilldown-close:hover { background:#000; color:#fff; border-color:#000; }
        .drilldown-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
        .dd-kpi { background:#fff; border:1px solid var(--g200); border-radius:var(--br); padding:7px 10px; }
        .dd-kpi-label { font-size:9px; font-weight:700; text-transform:uppercase; color:#aaa; margin-bottom:3px; }
        .dd-kpi-val   { font-size:15px; font-weight:800; color:#000; }

        /* top products */
        .db-prod-list { flex:1; overflow-y:auto; min-height:0; }
        .prod-item { display:flex; align-items:center; gap:9px; padding:8px 14px; border-bottom:1px solid var(--g200); transition:.12s; cursor:pointer; }
        .prod-item:last-child { border-bottom:none; }
        .prod-item:hover { background:var(--g100); }
        .prod-rank { width:18px; height:18px; border-radius:var(--br); border:1px solid var(--g200); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#bbb; flex-shrink:0; }
        .prod-rank.r1 { background:#fef3c7; border-color:#f59e0b; color:#92400e; }
        .prod-rank.r2 { background:#f1f5f9; border-color:#94a3b8; color:#475569; }
        .prod-rank.r3 { background:#fff7ed; border-color:#fb923c; color:#7c2d12; }
        .prod-thumb { width:34px; height:34px; border:1px solid var(--g200); border-radius:var(--br); background:var(--g100); display:flex; align-items:center; justify-content:center; color:#ccc; font-size:12px; flex-shrink:0; overflow:hidden; }
        .prod-info  { flex:1; min-width:0; }
        .prod-name  { font-weight:700; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:none; }
        .prod-meta  { font-size:10px; color:#aaa; margin-top:1px; font-weight:500; text-transform:none; }
        .prod-bar-wrap { margin-top:4px; display:flex; align-items:center; gap:5px; }
        .prod-bar-bg   { flex:1; height:3px; background:var(--g200); border-radius:2px; overflow:hidden; }
        .prod-bar-fill { height:100%; background:#000; border-radius:2px; transition:.7s ease; width:0; }
        .prod-sold { font-size:10px; font-weight:800; color:#000; flex-shrink:0; }
        .prod-rev  { text-align:right; flex-shrink:0; margin-left:5px; }
        .prod-rev-val { font-size:11px; font-weight:700; color:#000; white-space:nowrap; }
        .prod-rev-lbl { font-size:10px; color:#aaa; font-weight:500; }

        /* orders table */
        .db-table-wrap { flex:1; overflow-y:auto; min-height:0; }
        .db-table { width:100%; border-collapse:collapse; }
        .db-table thead th { text-align:left; padding:8px 13px; font-size:10px; font-weight:800; text-transform:uppercase; color:#888; background:#fafafa; border-bottom:1px solid var(--g200); white-space:nowrap; }
        .db-table tbody td { padding:7px 13px; border-bottom:1px solid var(--g200); vertical-align:middle; font-size:12px; font-weight:500; text-transform:none; }
        .db-table tbody tr:last-child td { border-bottom:none; }
        .db-table tbody tr { cursor:pointer; transition:.1s; }
        .db-table tbody tr:hover { background:var(--g100); }

        /* donut */
        .db-donut-wrap   { position:relative; flex-shrink:0; }
        .db-donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
        .db-donut-val { font-size:14px; font-weight:800; line-height:1; }
        .db-donut-lbl { font-size:9px; color:#aaa; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-top:2px; }
        .db-legend     { flex:1; display:flex; flex-direction:column; gap:7px; }
        .db-legend-row { display:flex; align-items:center; gap:7px; cursor:pointer; padding:2px 3px; border-radius:2px; transition:.15s; }
        .db-legend-row:hover { background:var(--g100); }
        .db-legend-dot  { width:8px; height:8px; border-radius:1px; flex-shrink:0; }
        .db-legend-name { font-size:11px; font-weight:600; color:#555; flex:1; text-transform:none; }
        .db-legend-pct  { font-size:11px; font-weight:800; color:#000; }
        .db-panel-foot  { border-top:1px solid var(--g200); padding:10px 14px; display:flex; flex-direction:column; }
        .db-foot-row    { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--g200); }
        .db-foot-row:last-child { border-bottom:none; }
        .db-foot-label  { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:#aaa; }
        .db-foot-val    { font-size:14px; font-weight:800; color:#000; }

        /* stock widget */
        .stock-list { flex:1; overflow-y:auto; max-height: 280px; min-height:0; }
        .stock-item { display:flex; align-items:center; gap:9px; padding:8px 14px; border-bottom:1px solid var(--g200); transition:.12s; cursor:pointer; }
        .stock-item:last-child { border-bottom:none; }
        .stock-item:hover { background:var(--g100); }
        .stock-thumb { width:32px; height:32px; border:1px solid var(--g200); border-radius:var(--br); background:var(--g100); display:flex; align-items:center; justify-content:center; color:#ccc; font-size:12px; flex-shrink:0; }
        .stock-info { flex:1; min-width:0; }
        .stock-name { font-weight:700; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:none; }
        .stock-sku  { font-size:10px; color:#aaa; font-weight:500; text-transform:none; margin-top:1px; }
        .stock-bar-wrap  { margin-top:4px; height:3px; background:var(--g200); border-radius:2px; overflow:hidden; }
        .stock-bar-fill  { height:100%; border-radius:2px; }
        .stock-bar-fill.critical { background:var(--red); }
        .stock-bar-fill.warning  { background:var(--yellow); }
        .stock-qty-wrap { flex-shrink:0; text-align:right; }
        .stock-qty { font-size:14px; font-weight:800; line-height:1; }
        .stock-qty.critical { color:var(--red); }
        .stock-qty.warning  { color:var(--yellow); }
        .stock-qty-label { font-size:9px; color:#aaa; font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
        .stock-count { font-size:10px; font-weight:800; padding:2px 6px; border-radius:var(--br); }
        .stock-count.critical { background:#fee2e2; color:#991b1b; }
        .stock-count.warning  { background:#fef3c7; color:#92400e; }

        /* heatmap */
        .heatmap-grid { display:grid; grid-template-columns:30px repeat(12,1fr); gap:2px; padding:10px 14px 6px; }
        .hm-label     { font-size:10px; font-weight:700; color:#aaa; display:flex; align-items:center; justify-content:flex-end; padding-right:5px; text-transform:none; }
        .hm-col-label { font-size:9px; font-weight:700; color:#aaa; text-align:center; }
        .hm-cell      { height:16px; border-radius:2px; cursor:pointer; transition:.15s; position:relative; }
        .hm-cell:hover { transform:scale(1.2); z-index:2; outline:2px solid #000; }
        .hm-cell:hover::after {
            content:attr(data-tip); position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
            background:#000; color:#fff; font-size:10px; font-weight:700; padding:3px 7px; border-radius:2px;
            white-space:nowrap; pointer-events:none; z-index:10;
        }
        .hm-legend { display:flex; align-items:center; gap:6px; padding:0 14px 10px 44px; }
        .hm-legend-label { font-size:10px; color:#aaa; font-weight:600; text-transform:none; }
        .hm-legend-scale { display:flex; gap:2px; }
        .hm-legend-step  { width:12px; height:9px; border-radius:1px; }

        /* ═══════════════════════════════════════════
           SKELETON
        ═══════════════════════════════════════════ */
        @keyframes shimmer { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
        .skeleton { background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:600px 100%; animation:shimmer 1.4s infinite linear; border-radius:2px; }
        .sk-card  { background:#fff; border:1px solid var(--g200); border-radius:var(--br); padding:14px 15px 11px; }
        .sk-panel { background:#fff; border:1px solid var(--g200); border-radius:var(--br); }
        .sk-ph    { padding:10px 14px; border-bottom:1px solid var(--g200); }
        .sk-row   { padding:10px 14px; border-bottom:1px solid var(--g200); display:flex; gap:10px; align-items:center; }
        .sk-circle{ width:34px; height:34px; border-radius:50%; flex-shrink:0; }
        .sk-block { flex:1; display:flex; flex-direction:column; gap:5px; }
        .sk-line  { height:9px; border-radius:2px; }

        /* ═══════════════════════════════════════════
           EMPTY STATE
        ═══════════════════════════════════════════ */
        .db-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 20px; color:#bbb; gap:8px; }
        .db-empty i { font-size:28px; opacity:.4; }
        .db-empty-txt { font-size:12px; font-weight:600; text-transform:none; }
        .db-empty-sub { font-size:11px; font-weight:400; color:#ccc; text-transform:none; }

        /* ═══════════════════════════════════════════
           DRAWER (products & orders)
        ═══════════════════════════════════════════ */
        .db-drawer-backdrop {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
            z-index:1000; backdrop-filter:blur(1px);
        }
        .db-drawer-backdrop.show { display:block; animation:fadeIn .2s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        .db-drawer {
            position:fixed; top:0; right:-680px; width:660px; max-width:95vw;
            height:100vh; background:#fff; border-left:1px solid var(--g200);
            box-shadow:-8px 0 32px rgba(0,0,0,.12); z-index:1001;
            display:flex; flex-direction:column;
            transition:right .28s cubic-bezier(.4,0,.2,1);
        }
        .db-drawer.show { right:0; }

        .db-drawer-head {
            padding:14px 18px; border-bottom:1px solid var(--g200);
            display:flex; align-items:center; justify-content:space-between;
            flex-shrink:0; background:#fff;
        }
        .db-drawer-title { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }
        .db-drawer-close {
            width:28px; height:28px; border:1px solid var(--g200); background:#fff;
            border-radius:var(--br); cursor:pointer; display:flex; align-items:center;
            justify-content:center; font-size:14px; color:#888; transition:.15s;
        }
        .db-drawer-close:hover { background:#000; color:#fff; border-color:#000; }
        .db-drawer-body { flex:1; overflow-y:auto; }

        /* drawer search/filter bar */
        .drawer-filter { padding:12px 18px; border-bottom:1px solid var(--g200); display:flex; gap:8px; align-items:center; background:#fafafa; }
        .drawer-search-wrap { position:relative; flex:1; }
        .drawer-search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:#bbb; font-size:12px; }
        .drawer-search-input {
            width:100%; height:30px; padding:0 10px 0 28px;
            border:1px solid var(--g200); border-radius:var(--br);
            font-size:12px; font-family:inherit; outline:none; background:#fff;
        }
        .drawer-search-input:focus { border-color:#000; }
        .drawer-stat-badge { padding:3px 8px; border-radius:var(--br); font-size:10px; font-weight:800; background:var(--g100); border:1px solid var(--g200); color:#555; white-space:nowrap; }

        /* drawer product list (full) */
        .drawer-prod-item {
            display:flex; align-items:center; gap:12px; padding:11px 18px;
            border-bottom:1px solid var(--g200); transition:.12s; cursor:pointer;
        }
        .drawer-prod-item:hover { background:var(--g100); }
        .drawer-prod-rank { width:24px; height:24px; border-radius:var(--br); border:1px solid var(--g200); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#bbb; flex-shrink:0; }
        .drawer-prod-rank.r1 { background:#fef3c7; border-color:#f59e0b; color:#92400e; }
        .drawer-prod-rank.r2 { background:#f1f5f9; border-color:#94a3b8; color:#475569; }
        .drawer-prod-rank.r3 { background:#fff7ed; border-color:#fb923c; color:#7c2d12; }
        .drawer-prod-thumb { width:42px; height:42px; border:1px solid var(--g200); border-radius:var(--br); background:var(--g100); display:flex; align-items:center; justify-content:center; color:#ccc; font-size:14px; flex-shrink:0; overflow:hidden; }
        .drawer-prod-info  { flex:1; min-width:0; }
        .drawer-prod-name  { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-transform:none; }
        .drawer-prod-meta  { font-size:11px; color:#888; font-weight:500; text-transform:none; margin-top:2px; }
        .drawer-prod-bar-wrap { margin-top:5px; display:flex; align-items:center; gap:7px; }
        .drawer-prod-bar-bg   { flex:1; height:4px; background:var(--g200); border-radius:2px; overflow:hidden; }
        .drawer-prod-bar-fill { height:100%; background:#000; border-radius:2px; transition:.7s; width:0; }
        .drawer-prod-sold  { font-size:11px; font-weight:800; color:#000; flex-shrink:0; }
        .drawer-prod-right { text-align:right; flex-shrink:0; min-width:80px; }
        .drawer-prod-rev   { font-size:12px; font-weight:700; color:#000; }
        .drawer-prod-rev-lbl { font-size:10px; color:#aaa; font-weight:500; }

        /* drawer order table */
        .drawer-order-table { width:100%; border-collapse:collapse; }
        .drawer-order-table thead th { text-align:left; padding:9px 18px; font-size:10px; font-weight:800; text-transform:uppercase; color:#888; background:#fafafa; border-bottom:1px solid var(--g200); white-space:nowrap; position:sticky; top:0; z-index:5; }
        .drawer-order-table tbody td { padding:9px 18px; border-bottom:1px solid var(--g200); vertical-align:middle; font-size:12px; font-weight:500; text-transform:none; }
        .drawer-order-table tbody tr:last-child td { border-bottom:none; }
        .drawer-order-table tbody tr { cursor:pointer; transition:.1s; }
        .drawer-order-table tbody tr:hover { background:var(--g100); }

        /* scrollbar */
        .db-table-wrap::-webkit-scrollbar,
        .db-prod-list::-webkit-scrollbar,
        .stock-list::-webkit-scrollbar,
        .db-drawer-body::-webkit-scrollbar { width:4px; }
        .db-table-wrap::-webkit-scrollbar-thumb,
        .db-prod-list::-webkit-scrollbar-thumb,
        .stock-list::-webkit-scrollbar-thumb,
        .db-drawer-body::-webkit-scrollbar-thumb { background:#d4d4d8; border-radius:2px; }

        @media (max-width:1180px) {
            .db-stats { grid-template-columns:repeat(2,1fr); }
            .db-row-main, .db-row-bottom, .db-row-extra { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<div class="db-page" id="dashboardPage">

    <div class="db-topbar">
        <div class="db-topbar-left">
            <div class="period-tabs" id="periodTabs">
                <button class="period-tab active" data-p="today" onclick="DB.setPeriod(this)">Hôm nay</button>
                <button class="period-tab" data-p="week"  onclick="DB.setPeriod(this)">Tuần này</button>
                <button class="period-tab" data-p="month" onclick="DB.setPeriod(this)">Tháng này</button>
                <button class="period-tab" data-p="year"  onclick="DB.setPeriod(this)">Năm nay</button>
            </div>

            <div class="date-from-wrap">
                <input type="date" class="db-date-input" id="dbDateFrom"
                       placeholder="Từ ngày" onchange="DB.onFromChange()">

            <div class="date-to-wrap" id="dateToWrap">
                <span class="date-sep">→</span>

            <span class="range-chip" id="rangeChip" onclick="DB.clearRange()">

            </span>

            <label class="compare-toggle" id="compareToggle">
                <input type="checkbox" id="compareChk" onchange="DB.toggleCompare(this.checked)">

                So sánh kỳ trước

        <div class="db-topbar-right">
            <button class="db-btn ghost" id="btnRefresh" onclick="DB.refresh()">
                <i class="bi bi-arrow-clockwise" id="refreshIcon"></i> Làm mới

    </div>

    <div class="db-stats" id="statsGrid">
        <div class="sk-card"><div class="skeleton sk-line" style="width:50%;margin-bottom:10px"></div><div class="skeleton sk-line" style="width:65%;height:20px;margin-bottom:12px"></div><div class="skeleton" style="height:30px;margin:0 -15px 10px"></div><div class="skeleton sk-line" style="width:40%"></div></div>
        <div class="sk-card"><div class="skeleton sk-line" style="width:50%;margin-bottom:10px"></div><div class="skeleton sk-line" style="width:65%;height:20px;margin-bottom:12px"></div><div class="skeleton" style="height:30px;margin:0 -15px 10px"></div><div class="skeleton sk-line" style="width:40%"></div></div>
        <div class="sk-card"><div class="skeleton sk-line" style="width:50%;margin-bottom:10px"></div><div class="skeleton sk-line" style="width:65%;height:20px;margin-bottom:12px"></div><div class="skeleton" style="height:30px;margin:0 -15px 10px"></div><div class="skeleton sk-line" style="width:40%"></div></div>
        <div class="sk-card"><div class="skeleton sk-line" style="width:50%;margin-bottom:10px"></div><div class="skeleton sk-line" style="width:65%;height:20px;margin-bottom:12px"></div><div class="skeleton" style="height:30px;margin:0 -15px 10px"></div><div class="skeleton sk-line" style="width:40%"></div></div>
    </div>

    <div class="db-row-main" id="rowMain">
        <div class="sk-panel"><div class="sk-ph"><div class="skeleton sk-line" style="width:30%"></div></div><div style="padding:12px;height:248px;"><div class="skeleton" style="width:100%;height:100%;border-radius:2px;"></div></div></div>
        <div class="sk-panel"><div class="sk-ph"><div class="skeleton sk-line" style="width:50%"></div></div>
            <div class="sk-row"><div class="skeleton sk-circle"></div><div class="sk-block"><div class="skeleton sk-line" style="width:80%"></div><div class="skeleton sk-line" style="width:50%"></div></div></div>
            <div class="sk-row"><div class="skeleton sk-circle"></div><div class="sk-block"><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:45%"></div></div></div>
            <div class="sk-row"><div class="skeleton sk-circle"></div><div class="sk-block"><div class="skeleton sk-line" style="width:75%"></div><div class="skeleton sk-line" style="width:55%"></div></div></div>
        </div>
    </div>

    <div class="db-row-bottom" id="rowBottom">
        <div class="sk-panel"><div class="sk-ph"><div class="skeleton sk-line" style="width:35%"></div></div>
            <div class="sk-row"><div class="sk-block"><div class="skeleton sk-line" style="width:30%"></div></div><div class="skeleton sk-line" style="width:15%;height:9px"></div></div>
            <div class="sk-row"><div class="sk-block"><div class="skeleton sk-line" style="width:40%"></div></div><div class="skeleton sk-line" style="width:15%;height:9px"></div></div>
            <div class="sk-row"><div class="sk-block"><div class="skeleton sk-line" style="width:35%"></div></div><div class="skeleton sk-line" style="width:15%;height:9px"></div></div>

                <div class="skeleton" style="width:100px;height:100px;border-radius:50%;flex-shrink:0;"></div>
                <div class="sk-block"><div class="skeleton sk-line" style="width:90%"></div><div class="skeleton sk-line" style="width:80%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:85%"></div></div>

            <div class="sk-row"><div class="skeleton sk-circle"></div><div class="sk-block"><div class="skeleton sk-line" style="width:65%"></div><div class="skeleton sk-line" style="width:35%"></div></div></div>

            <div style="padding:10px 14px;"><div class="skeleton" style="height:160px;border-radius:2px;"></div></div>

</div><div class="db-drawer-backdrop" id="prodBackdrop" onclick="DB.closeProdDrawer()"></div>
<div class="db-drawer" id="prodDrawer">
    <div class="db-drawer-head">
        <span class="db-drawer-title">Sản phẩm bán chạy</span>
        <button class="db-drawer-close" onclick="DB.closeProdDrawer()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="drawer-filter">
        <div class="drawer-search-wrap">
            <i class="bi bi-search drawer-search-icon"></i>
            <input type="text" class="drawer-search-input" id="prodSearch"
                   placeholder="Tìm theo tên hoặc SKU..." oninput="DB.filterProducts(this.value)">
        </div>

</div>

<div class="db-drawer-backdrop" id="ordBackdrop" onclick="DB.closeOrdDrawer()"></div>
<div class="db-drawer" id="ordDrawer">
    <div class="db-drawer-head">
        <span class="db-drawer-title">Đơn hàng gần đây</span>
        <button class="db-drawer-close" onclick="DB.closeOrdDrawer()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="drawer-filter">
        <div class="drawer-search-wrap">
            <i class="bi bi-search drawer-search-icon"></i>
            <input type="text" class="drawer-search-input" id="ordSearch"
                   placeholder="Tìm mã đơn hoặc khách hàng..." oninput="DB.filterOrders(this.value)">
        </div>
        <span class="drawer-stat-badge" id="ordDrawerCount">0 đơn</span>
        <button class="db-btn green-outline" style="height:28px;font-size:10px;" onclick="DB.exportCSV()">
            <i class="bi bi-download"></i> CSV
        </button>
    </div>
    <div class="db-drawer-body" id="ordDrawerBody"></div>
</div>

<script>
    window.DB = (() => {
        /* ── helpers ── */
        const fmt   = n => new Intl.NumberFormat('vi-VN').format(Math.round(n));
        const fmtS  = n => n>=1e9?(n/1e9).toFixed(1)+'T':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':String(n);
        const $     = id => document.getElementById(id);
        const fmtD  = s => { if (!s) return ''; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; };

        function _toast(msg, type='success') {
            if (typeof window.toast === 'function') { window.toast(msg, type); return; }
            const col = type==='error'?'#dc2626':type==='warning'?'#f59e0b':'#10b981';
            const el  = document.createElement('div');
            el.style.cssText=`position:fixed;top:20px;right:20px;z-index:9999;background:#fff;padding:11px 16px;border-left:3px solid ${col};box-shadow:0 4px 16px rgba(0,0,0,.12);border-radius:2px;font-size:12px;font-weight:700;font-family:Inter,sans-serif;display:flex;align-items:center;gap:8px;min-width:220px;`;
            el.innerHTML=`<i class="bi bi-${type==='error'?'x-circle-fill':type==='warning'?'exclamation-triangle-fill':'check-circle-fill'}" style="color:${col};font-size:14px;"></i>${msg}`;
            document.body.appendChild(el);
            setTimeout(()=>{el.style.opacity='0';el.style.transition='.3s';setTimeout(()=>el.remove(),300);},2600);
        }

        // 🌟 BỘ LỌC TRẠNG THÁI ĐƠN HÀNG CHUẨN XÁC
        function _getOrderStatus(code) {
            const map = {
                'CHO_THANH_TOAN': {lbl:'Chờ thanh toán', cls:'warning', dot:'#f59e0b'},
                'pending':        {lbl:'Chờ xử lý', cls:'warning', dot:'#f59e0b'},
                'CHO_XAC_NHAN':   {lbl:'Chờ xác nhận', cls:'warning', dot:'#f59e0b'},
                'confirming':     {lbl:'Chờ xác nhận', cls:'warning', dot:'#f59e0b'},
                'CHO_GIAO':       {lbl:'Đang chuẩn bị', cls:'info', dot:'#0ea5e9'},
                'preparing':      {lbl:'Đang chuẩn bị', cls:'info', dot:'#0ea5e9'},
                'DANG_GIAO':      {lbl:'Đang giao hàng', cls:'info', dot:'#3b82f6'},
                'delivering':     {lbl:'Đang giao hàng', cls:'info', dot:'#3b82f6'},
                'HOAN_THANH':     {lbl:'Hoàn thành', cls:'success', dot:'#10b981'},
                'completed':      {lbl:'Hoàn thành', cls:'success', dot:'#10b981'},
                'DA_HUY':         {lbl:'Đã hủy', cls:'danger', dot:'#dc2626'},
                'cancelled':      {lbl:'Đã hủy', cls:'danger', dot:'#dc2626'}
            };
            return map[code] || {lbl: code || 'Không rõ', cls:'warning', dot:'#f59e0b'};
        }

        // 🌟 HÀM QUÉT TỪ KHÓA BẤT CHẤP LỖI CÚ PHÁP HOẶC KHOẢNG TRẮNG CỦA DATABASE
        function _formatPayment(method) {
            if (!method) return { i: 'bi-credit-card', c: '#555', lbl: 'Khác' };

            const str = String(method).toUpperCase().replace(/_/g, ' ').trim();

            if (str.includes('TIEN_MAT') || str.includes('TIEN_MAT')) {
                return { i: 'bi-cash', c: '#10b981', lbl: 'Tiền mặt' };
            } else if (str.includes('MOMO')) {
                return { i: 'bi-wallet2', c: '#a50064', lbl: 'Ví MoMo' };
            } else if (str.includes('COD') || str.includes('GIAO HANG')) {
                return { i: 'bi-truck', c: '#3b82f6', lbl: 'COD (Giao hàng)' };
            }

            return { i: 'bi-credit-card', c: '#555', lbl: String(method).trim() };
        }

        /* ═══════════════════════════════════════
           MOCK DATA
        ═══════════════════════════════════════ */
        const MOCK = {
            today:  { spAvg:[], spCust:[] },
            week:   { spAvg:[], spCust:[] },
            month:  { spAvg:[], spCust:[] },
            year:   { spAvg:[], spCust:[] },
            custom: { spAvg:[], spCust:[] },
        };

        const ALL_PRODUCTS = [];
        const ALL_ORDERS   = [];
        const LOW_STOCK    = [];
        const PAY = { labels:[], values:[], colors:[] };
        let HEATMAP = { days:[], hours:[], values:[] };

        /* ── state ── */
        let period      = 'today';
        let isCustom    = false;
        let isLoading   = false;
        let compareMode = false;
        let chartType   = 'line';
        let rChart = null, pChart = null, spMap = {};

        /* ═══════════════════════════════════════
           PERIOD TABS
        ═══════════════════════════════════════ */
        function setPeriod(el) {
            if (isLoading) return;
            document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
            el.classList.add('active');
            period   = el.dataset.p;
            isCustom = false;
            _clearRangeUI();
            _fetchAndRender();
        }

        /* ═══════════════════════════════════════
           PROGRESSIVE DATE FILTER
           — from: show; to: visible after from chosen; auto-apply on to chosen
        ═══════════════════════════════════════ */
        function onFromChange() {
            const val = $('dbDateFrom').value;
            $('dbDateFrom').classList.remove('error');
            if (val) {
                $('dateToWrap').classList.add('visible');
                /* min for "to" = selected from date */
                $('dbDateTo').min = val;
                $('dbDateTo').value = '';
            } else {
                $('dateToWrap').classList.remove('visible');
                $('dbDateTo').value = '';
                _clearRangeUI();
                _fetchAndRender({ silent:true });
            }
        }

        function onToChange() {
            const from = $('dbDateFrom').value;
            const to   = $('dbDateTo').value;
            if (!from || !to) return;
            if (from > to) {
                $('dbDateTo').classList.add('error');
                _toast('Ngày kết thúc phải sau ngày bắt đầu', 'warning');
                return;
            }
            $('dbDateTo').classList.remove('error');
            document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
            isCustom = true;
            period   = 'custom'; // ← đổi từ 'month' thành 'custom'
            const chip  = $('rangeChip');
            const label = $('rangeChipLabel');
            if (label) label.textContent = `${fmtD(from)} – ${fmtD(to)}`;
            chip?.classList.add('show');
            _fetchAndRender({ silent:true });
            _toast(`Đã lọc từ ${fmtD(from)} đến ${fmtD(to)}`);
        }

        function clearRange() {
            isCustom = false;
            period   = 'today';
            _clearRangeUI();
            /* reactivate "Hôm nay" tab */
            document.querySelectorAll('.period-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
            _fetchAndRender();
            _toast('Đã xoá bộ lọc ngày');
        }

        function _clearRangeUI() {
            $('rangeChip')?.classList.remove('show');
            $('dateToWrap')?.classList.remove('visible');
            const f = $('dbDateFrom'), t = $('dbDateTo');
            if (f) { f.value=''; f.classList.remove('error'); }
            if (t) { t.value=''; t.classList.remove('error'); }
        }

        /* ═══════════════════════════════════════
           COMPARE TOGGLE
        ═══════════════════════════════════════ */
        function toggleCompare(on) {
            compareMode = on;
            $('compareToggle')?.classList.toggle('active', on);
            const leg2 = $('leg-2');
            if (leg2) leg2.style.display = on ? 'flex' : 'none';
            _renderRevenueChart();
            _toast(on ? 'Đang so sánh kỳ trước' : 'Đã tắt so sánh');
        }

        /* ═══════════════════════════════════════
           CHART TYPE TOGGLE
        ═══════════════════════════════════════ */
        function setChartType(type) {
            chartType = type;
            $('ctt-line')?.classList.toggle('active', type==='line');
            $('ctt-bar') ?.classList.toggle('active', type==='bar');
            _renderRevenueChart();
        }

        /* ═══════════════════════════════════════
           LEGEND TOGGLE DATASET
        ═══════════════════════════════════════ */
        function toggleDataset(idx) {
            if (!rChart) return;
            const meta = rChart.getDatasetMeta(idx);
            meta.hidden = !meta.hidden;
            rChart.update();
            $('leg-'+idx)?.classList.toggle('hidden', meta.hidden);
        }

        /* ═══════════════════════════════════════
           DRILL-DOWN
        ═══════════════════════════════════════ */
        const DRILL = {
            today:{
                labels:['7h','8h','9h','10h','11h','12h','13h','14h','15h','16h','17h','18h'],
                details:[
                    {rev:400000,ord:1,avg:400000,cust:1},{rev:820000,ord:3,avg:273333,cust:3},
                    {rev:1100000,ord:4,avg:275000,cust:4},{rev:1800000,ord:6,avg:300000,cust:5},
                    {rev:2200000,ord:7,avg:314285,cust:6},{rev:950000,ord:3,avg:316666,cust:3},
                    {rev:1400000,ord:5,avg:280000,cust:4},{rev:1600000,ord:5,avg:320000,cust:5},
                    {rev:900000,ord:3,avg:300000,cust:3},{rev:1200000,ord:4,avg:300000,cust:4},
                    {rev:780000,ord:2,avg:390000,cust:2},{rev:700000,ord:2,avg:350000,cust:2},
                ]
            },
        };

        function onChartClick(evt) {
            if (!rChart) return;
            const pts = rChart.getElementsAtEventForMode(evt,'index',{intersect:false},true);
            if (!pts.length) return;
            const idx = pts[0].index;
            const d   = MOCK[period];
            const src = DRILL[period];
            const det = src?.details?.[idx];
            const lbl = d.cL[idx];
            const panel = $('drilldownPanel');
            const title = $('ddTitle');
            const kpis  = $('ddKpis');
            if (!panel||!title||!kpis) return;
            title.textContent = `Chi tiết: ${lbl}`;
            if (det) {
                kpis.innerHTML = `
                <div class="dd-kpi"><div class="dd-kpi-label">Doanh thu</div><div class="dd-kpi-val">${fmt(det.rev)} ₫</div></div>
                <div class="dd-kpi"><div class="dd-kpi-label">Số đơn</div><div class="dd-kpi-val">${det.ord} đơn</div></div>
                <div class="dd-kpi"><div class="dd-kpi-label">Giá trị TB</div><div class="dd-kpi-val">${fmt(det.avg)} ₫</div></div>
                <div class="dd-kpi"><div class="dd-kpi-label">Khách hàng</div><div class="dd-kpi-val">${det.cust} người</div></div>`;
            } else {
                const diff = d.cRprev ? d.cR[idx]-d.cRprev[idx] : null;
                kpis.innerHTML = `
                <div class="dd-kpi"><div class="dd-kpi-label">Kỳ này</div><div class="dd-kpi-val">${fmt(d.cR[idx])} ₫</div></div>
                <div class="dd-kpi"><div class="dd-kpi-label">Số đơn</div><div class="dd-kpi-val">${d.cO[idx]} đơn</div></div>
                <div class="dd-kpi"><div class="dd-kpi-label">Kỳ trước</div><div class="dd-kpi-val">${d.cRprev?fmt(d.cRprev[idx])+' ₫':'—'}</div></div>
                <div class="dd-kpi"><div class="dd-kpi-label">Chênh lệch</div><div class="dd-kpi-val" style="color:${diff>=0?'var(--green)':'var(--red)'};">${diff!==null?(diff>=0?'+':'')+fmt(diff)+' ₫':'—'}</div></div>`;
            }
            panel.classList.add('show');
        }

        function closeDrilldown() { $('drilldownPanel')?.classList.remove('show'); }

        /* ═══════════════════════════════════════
           LOADING
        ═══════════════════════════════════════ */
        function _setLoading(on) {
            isLoading = on;
            const icon = $('refreshIcon');
            if (icon) icon.className = on ? 'bi bi-arrow-clockwise spinning' : 'bi bi-arrow-clockwise';
            document.querySelectorAll('.period-tab, #btnRefresh').forEach(el=>el.disabled=on);
        }

        function refresh() {
            if (isLoading) return;
            _fetchAndRender({ silent:true });
            _toast('Đã làm mới dữ liệu');
        }

        /* ═══════════════════════════════════════
           FETCH & RENDER
        ═══════════════════════════════════════ */
        async function _fetchAndRender(opts = {}) {
            if (isLoading) return;
            _setLoading(true);
            if (!opts.silent) _showSkeletons();

            const from = $('dbDateFrom')?.value || '';
            const to   = $('dbDateTo')?.value   || '';
            const p    = `period=${period}&from=${from}&to=${to}`;

            try {
                const [statsRes, chartRes, prodsRes, ordsRes, payRes, stockRes, heatRes] = await Promise.all([
                    fetch(`/api/dashboard/stats?${p}`),
                    fetch(`/api/dashboard/chart?${p}`),
                    fetch(`/api/dashboard/top-products?${p}`),
                    fetch(`/api/dashboard/recent-orders`),
                    fetch(`/api/dashboard/payment-methods?${p}`),
                    fetch(`/api/dashboard/low-stock`),
                    fetch(`/api/dashboard/heatmap?${p}`),
                ]);

                const [stats, chart, products, orders, payment, stock, heatmap] = await Promise.all([
                    statsRes.json(),
                    chartRes.json(),
                    prodsRes.json(),
                    ordsRes.json(),
                    payRes.json(),
                    stockRes.json(),
                    heatRes.json(),
                ]);

                // Gán vào các biến gốc
                MOCK[period] = { ...MOCK[period], ...stats, ...chart };
                ALL_PRODUCTS.splice(0, ALL_PRODUCTS.length, ...products);
                ALL_ORDERS.splice(0, ALL_ORDERS.length, ...orders);
                LOW_STOCK.splice(0, LOW_STOCK.length, ...stock);
                PAY.labels = payment.labels;
                PAY.values = payment.values;
                PAY.colors = payment.colors;

                HEATMAP.days   = heatmap.days;
                HEATMAP.hours  = heatmap.hours;
                HEATMAP.values = heatmap.values;

                if (!opts.silent) _injectHTML();
                _renderAll();

            } catch (e) {
                console.error('[Dashboard]', e);
                _toast('Không thể tải dữ liệu, vui lòng thử lại.', 'error');
                if (!opts.silent) _injectHTML();
                _renderAll();
            } finally {
                _setLoading(false);
            }
        }

        /* ═══════════════════════════════════════
           SKELETON → REAL HTML
        ═══════════════════════════════════════ */
        function _destroyCharts() {
            try{if(rChart){rChart.destroy();rChart=null;}}catch(_){}
            try{if(pChart){pChart.destroy();pChart=null;}}catch(_){}
            Object.keys(spMap).forEach(k=>{try{if(spMap[k]){spMap[k].destroy();delete spMap[k];}}catch(_){}});
        }

        /* ═══════════════════════════════════════
           RENDER ALL
        ═══════════════════════════════════════ */
        function _renderAll() {
            _renderStats(); _renderSparklines(); _renderRevenueChart();
            _renderTopProducts(); _renderOrders(); _renderPayChart();
            _renderStock(); _renderHeatmap();
        }

        /* stats */
        function _setChg(id,val,up) {
            const el=$(id); if(!el)return;
            el.className='db-chg '+(up?'up':'down');
            el.innerHTML=`<i class="bi bi-arrow-${up?'up':'down'}-short"></i>${up?'+':''}${val}%`;
        }
        function _renderStats() {
            const d=MOCK[period];
            $('s-rev')       &&($('s-rev').textContent      =fmt(d.rev)+' ₫');
            $('s-ord')       &&($('s-ord').textContent      =fmt(d.ord));
            $('s-ord-sub')   &&($('s-ord-sub').textContent  ='Chờ xử lý: '+d.pend);
            $('s-avg')       &&($('s-avg').textContent      =fmt(d.avg)+' ₫');
            $('s-cust')      &&($('s-cust').textContent     =fmt(d.cust));
            $('s-sold')      &&($('s-sold').textContent     =fmt(d.sold)+' SP');
            $('s-rate')      &&($('s-rate').textContent     =d.rate+'%');
            $('s-cancelled') &&($('s-cancelled').textContent=fmt(d.cancelled)+' đơn');
            $('donut-val')   &&($('donut-val').textContent  =fmt(d.ord));
            _setChg('s-rev-chg',d.revChg,d.revUp);
            _setChg('s-ord-chg',d.ordChg,d.ordUp);
            _setChg('s-avg-chg',d.avgChg,d.avgUp);
            _setChg('s-cust-chg',d.custChg,d.custUp);
        }

        /* sparklines */
        function _mkSpark(id,data,color) {
            const c=$(id); if(!c)return;
            if(spMap[id])spMap[id].destroy();
            const ctx=c.getContext('2d');
            const rgb=color==='#000'?'0,0,0':color==='#10b981'?'16,185,129':color==='#3b82f6'?'59,130,246':'245,158,11';
            const g=ctx.createLinearGradient(0,0,0,30);
            g.addColorStop(0,`rgba(${rgb},.14)`); g.addColorStop(1,`rgba(${rgb},0)`);
            spMap[id]=new Chart(ctx,{
                type:'line',
                data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:color,borderWidth:1.6,fill:true,backgroundColor:g,tension:0.4,pointRadius:0}]},
                options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
            });
        }
        function _renderSparklines() {
            const d=MOCK[period];
            _mkSpark('sp-rev',d.spRev,'#000'); _mkSpark('sp-ord',d.spOrd,'#10b981');
            _mkSpark('sp-avg',d.spAvg,'#3b82f6'); _mkSpark('sp-cust',d.spCust,'#f59e0b');
        }

        /* revenue chart */
        function _renderRevenueChart() {
            const d=MOCK[period];
            const canvas=$('revenueChart'); if(!canvas)return;
            const gctx=canvas.getContext('2d');
            if(rChart){try{rChart.destroy();}catch(_){}rChart=null;}
            const isBar=chartType==='bar';
            const grad=gctx.createLinearGradient(0,0,0,220);
            grad.addColorStop(0,'rgba(0,0,0,.10)'); grad.addColorStop(1,'rgba(0,0,0,.01)');
            const datasets=[
                {label:'Kỳ này',data:d.cR,type:isBar?'bar':'line',borderColor:'#000',
                    backgroundColor:isBar?'rgba(0,0,0,.80)':grad,fill:!isBar,tension:0.4,
                    borderWidth:isBar?0:2,borderRadius:isBar?2:0,
                    pointRadius:isBar?0:2.5,pointBackgroundColor:'#000',pointHoverRadius:5,yAxisID:'y'},
                {label:'Đơn hàng',data:d.cO,type:'line',borderColor:'#10b981',
                    backgroundColor:'transparent',fill:false,tension:0.4,borderWidth:2,borderDash:[5,4],
                    pointRadius:2.5,pointBackgroundColor:'#10b981',pointHoverRadius:5,yAxisID:'y1'},
            ];
            if(compareMode&&d.cRprev){
                datasets.push({label:'Kỳ trước',data:d.cRprev,type:isBar?'bar':'line',
                    borderColor:'#f59e0b',backgroundColor:isBar?'rgba(245,158,11,.45)':'transparent',
                    fill:false,tension:0.4,borderWidth:isBar?0:1.5,borderRadius:isBar?2:0,
                    borderDash:isBar?[]:[4,3],pointRadius:0,pointHoverRadius:4,yAxisID:'y'});
            }
            $('ctt-line')?.classList.toggle('active',!isBar);
            $('ctt-bar') ?.classList.toggle('active', isBar);
            [0,1,2].forEach(i=>{const b=$('leg-'+i);if(b)b.classList.remove('hidden');});
            rChart=new Chart(gctx,{
                type:isBar?'bar':'line',
                data:{labels:d.cL,datasets},
                options:{
                    responsive:true,maintainAspectRatio:false,
                    interaction:{mode:'index',intersect:false},
                    onClick:onChartClick,
                    plugins:{legend:{display:false},
                        tooltip:{backgroundColor:'#000',titleFont:{family:'Inter',size:11,weight:'700'},
                            bodyFont:{family:'Inter',size:11},padding:10,cornerRadius:2,
                            callbacks:{label:c=>{
                                    if(c.datasetIndex===0)return'  Kỳ này: '+fmt(c.raw)+' ₫';
                                    if(c.datasetIndex===1)return'  Đơn hàng: '+c.raw+' đơn';
                                    return'  Kỳ trước: '+fmt(c.raw)+' ₫';
                                }}}},
                    scales:{
                        x:{grid:{display:false},border:{display:false},ticks:{font:{family:'Inter',size:10,weight:'600'},color:'#bbb'}},
                        y:{position:'left',grid:{color:'#f4f4f5'},border:{display:false,dash:[4,4]},ticks:{font:{family:'Inter',size:10},color:'#bbb',callback:v=>fmtS(v)}},
                        y1:{position:'right',grid:{display:false},border:{display:false},ticks:{font:{family:'Inter',size:10},color:'#10b981',callback:v=>v+' đơn'}},
                    }
                }
            });
        }

            const list=ALL_PRODUCTS.slice(0,7);
            if(!list.length){
                el.innerHTML=`<div class="db-empty"><i class="bi bi-box-seam"></i><div class="db-empty-txt">Chưa có dữ liệu</div></div>`;

            const max=list[0].sold; const rc=['r1','r2','r3'];
            el.innerHTML=list.map((p,i)=>`
            <div class="prod-item" onclick="DB.openProdDrawer()">
                <div class="prod-rank ${rc[i]||''}">${i+1}</div>

                <div class="prod-info">
                    <div class="prod-name">${p.name}</div>
                    <div class="prod-meta">${p.sku} · ${p.attr}</div>
                    <div class="prod-bar-wrap">
                        <div class="prod-bar-bg"><div class="prod-bar-fill" data-w="${Math.round(p.sold/max*100)}"></div></div>
                        <span class="prod-sold">${p.sold} bán</span>
                    </div>
                </div>
                <div class="prod-rev"><div class="prod-rev-val">${fmtS(p.rev)}₫</div><div class="prod-rev-lbl">doanh thu</div></div>
            </div>`).join('');
            requestAnimationFrame(()=>document.querySelectorAll('.prod-bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%';}));
        }

        /* orders preview */
        function _renderOrders() {
            const el=$('ordersBody'); if(!el)return;
            const list=ALL_ORDERS.slice(0,6);
            if(!list.length){
                el.closest('.db-table-wrap').innerHTML=`<div class="db-empty"><i class="bi bi-receipt"></i><div class="db-empty-txt">Chưa có đơn hàng</div></div>`;

            }
            el.innerHTML=_ordersRowsHTML(list,true);

        function _ordersRowsHTML(list,short=false) {
            return list.map(o=>{
                const s = _getOrderStatus(o.status);
                const m = _formatPayment(o.method);
                return `<tr onclick="DB._goToOrder(${o.id})" style="cursor:pointer;">
                <td><code style="font-size:11px;font-weight:700;background:var(--g100);padding:2px 6px;border-radius:var(--br);text-transform:none;">${o.code}</code></td>
                <td style="font-weight:600;text-transform:none;">${o.name}</td>
                <td style="text-align:center;"><span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--g100);border:1px solid var(--g200);border-radius:var(--br);font-size:11px;font-weight:800;">${o.items}</span></td>
                <td style="text-align:right;font-weight:700;">${fmt(o.total)} ₫</td>
                <td><span style="display:flex;align-items:center;gap:4px;"><i class="bi ${m.i}" style="color:${m.c};font-size:12px;"></i><span style="font-size:11px;text-transform:none;font-weight:500;">${m.lbl}</span></span></td>
                <td><span class="db-badge ${s.cls}"><span style="width:5px;height:5px;border-radius:50%;background:${s.dot};display:inline-block;"></span>${s.lbl}</span></td>
            </tr>`;
            }).join('');
        }

        /* 🌟 Tính toán phần trăm biểu đồ Donut trực tiếp ở JS */
        function _renderPayChart() {
            const c=$('payChart'); if(!c)return;
            if(pChart){try{pChart.destroy();}catch(_){}pChart=null;}

            const totalPay = PAY.values.reduce((a, b) => a + b, 0);

            pChart=new Chart(c.getContext('2d'),{
                type:'doughnut',
                data:{labels:PAY.labels,datasets:[{data:PAY.values,backgroundColor:PAY.colors,borderWidth:2,borderColor:'#fff',hoverOffset:4}]},
                options:{
                    responsive:false, cutout:'66%',
                    plugins:{
                        legend:{display:false},
                        tooltip:{
                            backgroundColor:'#000', bodyFont:{family:'Inter',size:11},
                            callbacks:{
                                label: c => {
                                    const pct = totalPay > 0 ? ((c.raw / totalPay) * 100).toFixed(1) : 0;
                                    return ` ${c.label}: ${c.raw} đơn (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });

            const leg=$('payLegend'); if(!leg)return;
            leg.innerHTML=PAY.labels.map((l,i) => {
                const pct = totalPay > 0 ? ((PAY.values[i] / totalPay) * 100).toFixed(1) : 0;
                return `
                <div class="db-legend-row" onclick="DB.openOrdDrawer()">
                    <div class="db-legend-dot" style="background:${PAY.colors[i]};"></div>
                    <span class="db-legend-name">${l}</span>
                    <span class="db-legend-pct">${pct}%</span>
                </div>`;
            }).join('');
        }

        /* stock */
        function _renderStock() {
            const el=$('stockList'); if(!el)return;
            if(!LOW_STOCK?.length){
                el.innerHTML=`<div class="db-empty"><i class="bi bi-check-circle"></i><div class="db-empty-txt">Tất cả hàng còn đủ</div></div>`;
                return;
            }
            const sorted=[...LOW_STOCK].sort((a,b)=>a.qty-b.qty);
            el.innerHTML=sorted.map(s=>{
                const cls=s.qty<=3?'critical':'warning';
                const pct=Math.round(s.qty/s.max*100);
                return `<div class="stock-item" onclick="DB._goToProduct(${s.id})">
                <div class="stock-thumb"><i class="bi bi-box-seam"></i></div>
                <div class="stock-info">
                    <div class="stock-name">${s.name}</div>
                    <div class="stock-sku">${s.sku} · ${s.attr}</div>
                    <div class="stock-bar-wrap"><div class="stock-bar-fill ${cls}" style="width:${pct}%"></div></div>
                </div>
                <div class="stock-qty-wrap">
                    <div class="stock-qty ${cls}">${s.qty}</div>
                    <div class="stock-qty-label">còn lại</div>
                </div>
            </div>`;
            }).join('');
        }

        /* heatmap */
        function _hmColor(t) {
            if(t<.2) return`rgba(240,240,240,${.4+t*2})`;
            if(t<.4) return`rgba(254,243,199,${.6+t})`;
            if(t<.65)return`rgba(251,191,36,${.7+t*.4})`;
            if(t<.85)return`rgba(245,158,11,${.85+t*.1})`;
            return`rgba(180,83,9,.95)`;
        }
        function _renderHeatmap() {
            const wrap=$('heatmapWrap'); if(!wrap)return;
            const hm=HEATMAP;
            const maxV=Math.max(...hm.values.flat());
            let html=`<div class="heatmap-grid"><div></div>${hm.hours.map(h=>`<div class="hm-col-label">${h}</div>`).join('')}`;
            hm.values.forEach((row,ri)=>{
                html+=`<div class="hm-label">${hm.days[ri]}</div>`;
                row.forEach((v,ci)=>{
                    html+=`<div class="hm-cell" style="background:${_hmColor(v/maxV)};" data-tip="${hm.days[ri]} ${hm.hours[ci]}: ${v.toFixed(1)}M ₫"></div>`;
                });
            });
            html+=`</div><div class="hm-legend"><span class="hm-legend-label">Thấp</span><div class="hm-legend-scale">${[0,.25,.5,.75,1].map(t=>`<div class="hm-legend-step" style="background:${_hmColor(t)};"></div>`).join('')}</div><span class="hm-legend-label">Cao</span></div>`;
            wrap.innerHTML=html;
        }

        /* ═══════════════════════════════════════
           DRAWER — PRODUCTS
        ═══════════════════════════════════════ */
        let _prodFilter='';

        function openProdDrawer() {
            _prodFilter='';
            const inp=$('prodSearch'); if(inp)inp.value='';
            _renderProdDrawer(ALL_PRODUCTS);
            $('prodBackdrop').classList.add('show');
            $('prodDrawer').classList.add('show');
            document.body.style.overflow='hidden';
        }

        function closeProdDrawer() {
            $('prodBackdrop').classList.remove('show');
            $('prodDrawer').classList.remove('show');
            document.body.style.overflow='';
        }

        function filterProducts(q) {
            _prodFilter=q.trim().toLowerCase();
            const list=_prodFilter
                ? ALL_PRODUCTS.filter(p=>p.name.toLowerCase().includes(_prodFilter)||p.sku.toLowerCase().includes(_prodFilter))
                : ALL_PRODUCTS;
            _renderProdDrawer(list);
        }

        function _renderProdDrawer(list) {
            const body=$('prodDrawerBody'); if(!body)return;
            const count=$('prodDrawerCount'); if(count)count.textContent=`${list.length} sản phẩm`;
            if(!list.length){
                body.innerHTML=`<div class="db-empty"><i class="bi bi-search"></i><div class="db-empty-txt">Không tìm thấy sản phẩm</div><div class="db-empty-sub">Thử tên khác hoặc xoá bộ lọc</div></div>`;
                return;
            }
            const max=ALL_PRODUCTS[0].sold;
            const rc=['r1','r2','r3'];
            body.innerHTML=list.map((p,i)=>`
            <div class="drawer-prod-item">
                <div class="drawer-prod-rank ${rc[i]||''}">${i+1}</div>
                <div class="drawer-prod-thumb"><i class="bi bi-image" style="font-size:16px;"></i></div>
                <div class="drawer-prod-info">
                    <div class="drawer-prod-name">${p.name}</div>
                    <div class="drawer-prod-meta">${p.sku} · ${p.attr}</div>
                    <div class="drawer-prod-bar-wrap">
                        <div class="drawer-prod-bar-bg"><div class="drawer-prod-bar-fill" data-w="${Math.round(p.sold/max*100)}"></div></div>
                        <span class="drawer-prod-sold">${p.sold} đã bán</span>
                    </div>
                </div>
                <div class="drawer-prod-right">
                    <div class="drawer-prod-rev">${fmtS(p.rev)}₫</div>
                    <div class="drawer-prod-rev-lbl">doanh thu</div>
                </div>
            </div>`).join('');
            requestAnimationFrame(()=>document.querySelectorAll('.drawer-prod-bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%';}));
        }

        /* ═══════════════════════════════════════
           DRAWER — ORDERS
        ═══════════════════════════════════════ */
        let _ordFilter='';

        function openOrdDrawer() {
            _ordFilter='';
            const inp=$('ordSearch'); if(inp)inp.value='';
            _renderOrdDrawer(ALL_ORDERS);
            $('ordBackdrop').classList.add('show');
            $('ordDrawer').classList.add('show');
            document.body.style.overflow='hidden';
        }

        function closeOrdDrawer() {
            $('ordBackdrop').classList.remove('show');
            $('ordDrawer').classList.remove('show');
            document.body.style.overflow='';
        }

        function filterOrders(q) {
            _ordFilter=q.trim().toLowerCase();
            const list=_ordFilter
                ? ALL_ORDERS.filter(o=>o.code.toLowerCase().includes(_ordFilter)||o.name.toLowerCase().includes(_ordFilter))
                : ALL_ORDERS;
            _renderOrdDrawer(list);
        }

        function _renderOrdDrawer(list) {
            const body=$('ordDrawerBody'); if(!body)return;
            const count=$('ordDrawerCount'); if(count)count.textContent=`${list.length} đơn`;
            if(!list.length){
                body.innerHTML=`<div class="db-empty"><i class="bi bi-receipt"></i><div class="db-empty-txt">Không tìm thấy đơn hàng</div></div>`;
                return;
            }

            body.innerHTML=`<table class="drawer-order-table">
            <thead><tr>
                <th>Mã đơn</th><th>Khách hàng</th>
                <th style="text-align:center;">SP</th>
                <th style="text-align:right;">Tổng tiền</th>
                <th>Thanh toán</th><th>Trạng thái</th>
            </tr></thead>
            <tbody>${list.map(o=>{
                const s = _getOrderStatus(o.status);
                const m = _formatPayment(o.method);
                return `<tr>
                    <td><code style="font-size:11px;font-weight:700;background:var(--g100);padding:2px 6px;border-radius:var(--br);text-transform:none;">${o.code}</code></td>
                    <td style="font-weight:600;text-transform:none;">${o.name}</td>
                    <td style="text-align:center;"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--g100);border:1px solid var(--g200);border-radius:var(--br);font-size:11px;font-weight:800;">${o.items}</span></td>
                    <td style="text-align:right;font-weight:700;">${fmt(o.total)} ₫</td>
                    <td><span style="display:flex;align-items:center;gap:5px;"><i class="bi ${m.i}" style="color:${m.c};font-size:12px;"></i><span style="font-size:11px;text-transform:none;font-weight:500;">${m.lbl}</span></span></td>
                    <td><span class="db-badge ${s.cls}"><span style="width:5px;height:5px;border-radius:50%;background:${s.dot};display:inline-block;"></span>${s.lbl}</span></td>
                </tr>`;
            }).join('')}</tbody>
        </table>`;
        }

        /* export CSV từ drawer */
        function exportCSV() {
            const headers=['Mã đơn','Khách hàng','Số SP','Tổng tiền','Thanh toán','Trạng thái'];
            const rows=ALL_ORDERS.map(o=>[o.code,o.name,o.items,o.total,o.method,_getOrderStatus(o.status).lbl]);
            const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
            const a=document.createElement('a');
            a.href=URL.createObjectURL(blob);
            a.download=`don-hang-${period}-${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
            _toast(`Đã xuất ${ALL_ORDERS.length} đơn ra CSV`);
        }

        /* ═══════════════════════════════════════
           INIT
        ═══════════════════════════════════════ */
        function init() {
            _fetchAndRender();
        }

        function destroy() { /* cleanup nếu cần */ }

        function _goToOrder(id) {
            sessionStorage.setItem('highlightOrderId', id);
            window.location.hash = '#orders';
        }

        function _goToProduct(id) {
            sessionStorage.setItem('highlightProductId', id);
            window.location.hash = '#products';
        }

        return {
            init, destroy, refresh,
            setPeriod, onFromChange, onToChange, clearRange,
            toggleCompare, setChartType, toggleDataset,
            onChartClick, closeDrilldown,
            openProdDrawer, closeProdDrawer, filterProducts,
            openOrdDrawer,  closeOrdDrawer,  filterOrders, exportCSV,
            _goToOrder, _goToProduct,
        };
    })();

    if (document.getElementById('dashboardPage')) {
        if (document.readyState === 'loading')
            document.addEventListener('DOMContentLoaded', DB.init);
        else DB.init();
    }

    window.initDashboard    = DB.init;
    window.destroyDashboard = DB.destroy;
</script>
</body>
