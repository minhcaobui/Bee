<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khuyến Mãi & Voucher</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           CORE STYLES (ĐÃ ĐỒNG BỘ 100% VỚI ORDER & PRODUCT)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #000; --white: #fff; --gray-100: #f4f4f5; --gray-200: #e4e4e7; --gray-300: #d4d4d8; --font-size: 13px; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); font-size: var(--font-size); line-height: 1.5; }
        .container { max-width: 100%; padding: 20px 30px; }

        /* Tabs */
        .actions-bar { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--gray-200); margin-bottom: 20px; padding-bottom: 0; }
        .tabs { display: flex; gap: 30px; margin-bottom: 0; border: none; }
        .tab { font-size: 13px; font-weight: 700; color: #888; padding: 0 0 12px 0; cursor: pointer; text-transform: uppercase; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .tab:hover { color: #000; }
        .tab.active { color: #000; border-bottom-color: #000; }

        /* Buttons */
        .btn { font-size: 11px; font-weight: 800; text-transform: uppercase; height: 34px !important; padding: 0 16px !important; background: #000; color: #fff; border: 1px solid #000; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #333; }
        .btn-secondary { background: #fff; color: #000; border: 1px solid var(--gray-300); }
        .btn-secondary:hover { background: var(--gray-100); border-color: #000; }
        .btn-icon { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); background: #fff; cursor: pointer; border-radius: 4px; margin-left: 4px; transition: 0.2s; color: #555;}
        .btn-icon:hover { border-color: #000; background: #000; color: #fff; }

        /* Search Section */
        .search-section { background: #f8f9fa; padding: 18px 20px; border: 1px solid var(--gray-200); border-radius: 4px; margin-bottom: 20px; }
        .search-wrapper { display: flex; gap: 12px; align-items: center; width: 100%; }
        .search-box { position: relative; flex: 1; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 14px; pointer-events: none; }
        .search-input { width: 100%; padding: 8px 12px 8px 36px !important; font-size: 13px; border: 1px solid var(--gray-300); outline: none; background: #fff; height: 40px; border-radius: 4px; transition: 0.2s;}
        .filter-select { padding: 8px 12px; font-size: 13px; border: 1px solid var(--gray-300); outline: none; background: #fff; height: 40px; border-radius: 4px; min-width: 180px; transition: 0.2s; cursor: pointer;}
        .btn-reset { height: 40px !important; width: 40px !important; padding: 0 !important; justify-content: center; font-size: 16px; background: #fff; border: 1px solid var(--gray-300); color: #555; border-radius: 4px; transition: 0.2s;}
        .btn-reset:hover { background: #f4f4f5; border-color: #000; color: #000; }
        .search-input:focus, .filter-select:focus { border-color: #000; }

        /* Table */
        .table-wrapper { border: 1px solid var(--gray-200); width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        thead th { text-align: left; padding: 12px 15px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #666; background: #fafafa; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
        tbody td { padding: 10px 15px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; font-size: 13px; word-wrap: break-word; }
        tbody tr:hover { background: var(--gray-100); }

        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #fff; white-space: nowrap; display: inline-block; }
        .badge-type { font-size: 10px; padding: 2px 6px; border-radius: 2px; font-weight: 800; text-transform: uppercase; background: #f4f4f5; color: #555;}

        /* Pagination Đồng Bộ */
        .pagination-wrapper { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; }
        .pagination-info { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; }
        .pagination { display: flex; gap: 5px; }
        .page-number { min-width: 28px; height: 28px; font-size: 12px; font-weight: 700; background: transparent; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: 0.2s;}
        .page-number:hover:not(:disabled) { background: #eee; }
        .page-number.active { background: #000; color: #fff; }
        .page-number:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Drawer */
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 999; display: none; }
        .overlay.show { display: block; }
        .drawer { position: fixed; top: 0; right: -600px; width: 600px; height: 100vh; background: #fff; border-left: 1px solid var(--gray-200); z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0, 0, 0, 0.1); }
        .drawer.show { right: 0; }
        .drawer-header { padding: 15px 20px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center;}
        .drawer-title { font-size: 15px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .drawer-body { flex: 1; padding: 20px; overflow-y: auto; }
        .drawer-footer { padding: 15px 20px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; background: #fafafa;}

        /* Form & Switch */
        .form-group { margin-bottom: 18px; }
        .form-label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; color: #444;}
        .form-input { width: 100%; padding: 0 12px; font-size: 13px; border: 1px solid var(--gray-300); outline: none; height: 40px; border-radius: 4px; font-family: inherit;}
        .form-input:focus { border-color: #000; }
        .form-input:disabled { background: #f9f9f9; color: #555; cursor: not-allowed; border-color: #eee; }

        .switch-wrapper { display: flex; align-items: center; gap: 10px; }
        .switch-square { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch-square input { opacity: 0; width: 0; height: 0; }
        .slider-square { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 4px; }
        .slider-square:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 2px; }
        input:checked + .slider-square { background-color: #000; }
        input:checked + .slider-square:before { transform: translateX(20px); }

        /* Quick Switch (Table) */
        .switch-sm { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch-sm input { opacity: 0; width: 0; height: 0; }
        .slider-sm { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
        .slider-sm:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider-sm { background-color: #000; }
        input:checked + .slider-sm:before { transform: translateX(16px); }
        .switch-sm.loading { opacity: 0.5; pointer-events: none; }

        /* =========================================================
           BEE TOAST CUSTOM (CHỐNG XUNG ĐỘT BOOTSTRAP 100%)
        ========================================================== */
        #beeToastHost { position: fixed; top: 30px; right: 30px; z-index: 999999; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .bee-toast-box { min-width: 320px; max-width: 400px; padding: 18px 24px; border-radius: 8px; background: #fff; color: #000; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2); display: flex; align-items: flex-start; gap: 14px; border-left: 6px solid #000; animation: beeToastSlideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; transition: all 0.3s ease; pointer-events: auto; }
        .bee-toast-box.success { border-left-color: #10b981; }
        .bee-toast-box.error { border-left-color: #ef4444; }
        .bee-toast-box.warning { border-left-color: #f59e0b; }
        .bee-toast-box.hiding { transform: translateX(120%); opacity: 0; margin-top: -80px; }
        @keyframes beeToastSlideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Product Select Box */
        .product-select-box { border: 1px solid var(--gray-200); border-radius: 4px; height: 250px; overflow-y: auto; background: #fff; margin-top: 5px;}
        .product-table { width: 100%; border-collapse: collapse; }
        .product-table th { position: sticky; top: 0; background: #fafafa; padding: 10px; text-align: left; font-size: 11px; font-weight: 800; border-bottom: 1px solid var(--gray-200); z-index: 1;}
        .product-table td { padding: 10px; border-bottom: 1px solid var(--gray-200); font-size: 13px; }
        .empty-state { text-align: center; padding: 40px; color: #888; font-size: 13px; font-style: italic;}

        /* Progress Bar */
        .qty-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: help; min-width: 140px; padding: 5px 0; }
        .qty-text-group { position: relative; width: 100%; height: 18px; margin-bottom: 6px; }
        .qty-default, .qty-hover-text { position: absolute; width: 100%; text-align: center; left: 0; top: 0; font-size: 12px; font-weight: 700; white-space: nowrap; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .qty-default { opacity: 1; transform: translateY(0); color: #333; }
        .qty-hover-text { opacity: 0; transform: translateY(5px); }
        .qty-wrapper:hover .qty-default { opacity: 0; transform: translateY(-5px); }
        .qty-wrapper:hover .qty-hover-text { opacity: 1; transform: translateY(0); }
        .progress-track { width: 90%; height: 6px; background-color: #e5e7eb; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
        .bg-safe { background-color: #10b981; } .bg-warning { background-color: #f59e0b; } .bg-danger { background-color: #ef4444; }
        .text-safe { color: #059669; } .text-warning { color: #d97706; } .text-danger { color: #dc2626; }

        /* ==========================================================================
           RESPONSIVE MOBILE CHO TRANG KHUYẾN MÃI & VOUCHER
           ========================================================================== */
        @media (max-width: 768px) {
            /* Thanh Header & Tabs */
            .actions-bar { flex-direction: column; align-items: stretch; gap: 15px; padding-bottom: 10px; }
            .tabs { width: 100%; border-bottom: 1px solid var(--gray-200); margin-bottom: 0; }

            /* Khung tìm kiếm ngoài màn hình chính */
            .search-wrapper { flex-direction: column; align-items: stretch; }
            .filter-select { width: 100%; }
            .btn-reset { width: 100% !important; margin-top: 5px; }

            /* Khung Drawer (Slide Panel Thêm/Sửa) */
            .drawer { width: 100% !important; right: -100% !important; }
            .drawer.show { right: 0 !important; }

            /* Chuyển các cặp Input xếp ngang thành dọc (Dựa vào cấu trúc flex inline) */
            .drawer-body > div[style*="display: flex; gap: 15px"],
            #voucherFields > div[style*="display: flex"] {
                flex-direction: column !important;
                gap: 12px !important;
            }
            .drawer-body > div[style*="display: flex"] > *,
            #voucherFields > div[style*="display: flex"] > * {
                flex: none !important;
                width: 100% !important;
            }

            /* Tìm kiếm sản phẩm trong Drawer Sale */
            .form-group > div[style*="display:flex; justify-content:space-between"] {
                flex-direction: column;
                align-items: stretch !important;
                gap: 10px;
            }
            .form-group > div[style*="display:flex; justify-content:space-between"] .search-box {
                width: 100% !important;
            }
            #selectedCount {
                align-self: flex-start;
                margin-bottom: 5px;
            }

            /* Phân trang */
            .pagination-wrapper { flex-direction: column; gap: 10px; align-items: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="actions-bar">
        <nav class="tabs">
            <button class="tab active" data-tab="voucher" onclick="window.PromotionApp.switchTab('voucher')" id="tabVoucher">
                <i class="bi bi-ticket-perforated-fill"></i> MÃ GIẢM GIÁ (Voucher)
            </button>

            <button class="tab" data-tab="sale" onclick="window.PromotionApp.switchTab('sale')" id="tabSale">
                <i class="bi bi-tags-fill"></i> ĐỢT KHUYẾN MÃI (Sale)
            </button>
        </nav>
        <button class="btn" id="btnAdd" onclick="window.PromotionApp.openDrawer('create')">
            <i class="bi bi-plus-lg"></i> THÊM MỚI
        </button>
    </div>

    <section class="search-section">
        <div class="search-wrapper">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" class="search-input" id="search"
                       placeholder="Tìm tên hoặc mã chương trình..."
                       oninput="window.PromotionApp.handleSearch(this.value)">
            </div>
            <select class="filter-select" id="fTrangThaiFilter" onchange="window.PromotionApp.handleStatus(this.value)">
                <option value="">-- Trạng thái --</option>
                <option value="true">Đang hoạt động</option>
                <option value="false">Ngưng hoạt động</option>
            </select>
            <button class="btn-reset" onclick="window.PromotionApp.resetFilters()" title="Làm mới">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead id="thead">
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="paginationContainer" class="pagination-wrapper"></div>
</div>

<div class="overlay" id="overlay" onclick="window.PromotionApp.closeDrawer()"></div>

<aside class="drawer" id="drawer">
    <div class="drawer-header">
        <h3 class="drawer-title" id="drawerTitle">THÊM MỚI</h3>
        <button class="btn-icon" onclick="window.PromotionApp.closeDrawer()" style="border:none;"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="drawer-body">
        <h5 style="font-weight:800; margin-bottom:15px; font-size:13px; color:#000;">1. THÔNG TIN CHUNG</h5>

        <div class="form-group">
            <label class="form-label" id="lblMa">Mã chương trình <span style="font-weight:600; color:#888; text-transform:none;">(Tự động sinh nếu để trống)</span></label>
            <input id="kmMa" class="form-input" maxlength="20" placeholder="VD: SALE50..." oninput="this.value = this.value.toUpperCase().replace(/\s/g, '')">
        </div>

        <div class="form-group">
            <label class="form-label">Tên hiển thị <span style="color:red">*</span></label>
            <input id="kmTen" class="form-input" placeholder="Nhập tên chương trình/voucher...">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Loại giảm</label>
                <select id="kmLoai" class="form-input" style="cursor: pointer;" onchange="window.PromotionApp.handleTypeChange()">
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Giá trị giảm <span style="color:red">*</span></label>
                <input id="kmGiaTri" class="form-input" placeholder="VD: 10" oninput="window.PromotionApp.formatMoneyInput(this)">
            </div>
        </div>

        <div id="voucherFields" style="display: none;">
            <div class="form-group" id="groupMaxGiam" style="display: none;">
                <label class="form-label">Giảm tối đa (VND) <span style="color:red">*</span></label>
                <input id="vGiaTriToiDa" class="form-input" placeholder="VD: 100,000" oninput="window.PromotionApp.formatMoneyInput(this)">
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Đơn tối thiểu <span style="color:red">*</span></label>
                    <input id="vDieuKien" class="form-input" placeholder="VD: 200,000" oninput="window.PromotionApp.formatMoneyInput(this)">
                </div>
                <div class="form-group" style="flex: 1; text-align: center">
                    <label class="form-label">Số lượng phát hành <span style="color:red">*</span></label>
                    <input id="vSoLuong" type="number" class="form-input" placeholder="VD: 100">
                </div>
            </div>

            <div class="form-group" style="margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <div class="switch-wrapper">
                    <label class="switch-square">
                        <input type="checkbox" id="kmCongDon" checked>
                        <span class="slider-square"></span>
                    </label>
                    <span style="font-size: 13px; font-weight: 700;">Áp dụng chung với SP đang Sale</span>
                </div>
                <div style="margin-top:12px; font-size:12px; color:#d97706; background:#fffbeb; padding:12px; border-radius:4px; border:1px solid #fcd34d;">
                    <i class="bi bi-info-circle-fill"></i> Tắt tùy chọn này nếu bạn muốn <b>Voucher chỉ áp dụng giảm thêm cho các sản phẩm Nguyên giá</b> (Tránh khách hàng lách luật giảm giá kép làm lỗ đơn hàng).
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 15px;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Ngày bắt đầu <span style="color:red">*</span></label>
                <input id="kmNgayBatDau" type="datetime-local" class="form-input">
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Ngày kết thúc <span style="color:red">*</span></label>
                <input id="kmNgayKetThuc" type="datetime-local" class="form-input">
            </div>
        </div>

        <div class="form-group" style="margin-top: 10px;">
            <div class="switch-wrapper">
                <label class="switch-square">
                    <input type="checkbox" id="kmTrangThai" checked>
                    <span class="slider-square"></span>
                </label>
                <span style="font-size: 13px; font-weight: 700;">Kích hoạt kinh doanh</span>
            </div>
        </div>

        <div id="saleFields">
            <h5 style="font-weight:800; margin: 25px 0 15px 0; font-size:13px; color:#000;">2. CHỌN SẢN PHẨM ÁP DỤNG SALE</h5>
            <div class="form-group">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <div class="search-box" style="width: 60%;">
                        <i class="bi bi-search"></i>
                        <input type="text" id="productSearchDrawer" class="form-input" placeholder="Tìm sản phẩm..." style="padding-left: 32px;" oninput="window.PromotionApp.filterProducts(this.value)">
                    </div>
                    <span style="color:#2563eb; font-size:12px; font-weight:700;" id="selectedCount">(Đã chọn: 0)</span>
                </div>
                <div class="product-select-box">
                    <table class="product-table">
                        <thead>
                        <tr>
                            <th style="width:40px; text-align: center;"><input type="checkbox" id="checkAll" style="width:14px; height:14px; cursor:pointer;"></th>
                            <th>MÃ SP</th>
                            <th>TÊN SẢN PHẨM</th>
                        </tr>
                        </thead>
                        <tbody id="productTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div class="drawer-footer">
        <button class="btn btn-secondary" id="btnClose" onclick="window.PromotionApp.closeDrawer()" style="flex: 1; height: 40px !important;">THOÁT</button>
        <button class="btn" id="btnSave" onclick="window.PromotionApp.saveItem()" style="flex: 1; height: 40px !important;">LƯU THIẾT LẬP</button>
    </div>
</aside>

<div id="beeToastHost"></div>

<script>
    // --- TOAST SYSTEM ---
    window.toast = function (message, type = 'success') {
        let container = document.getElementById('beeToastHost');
        if (!container) {
            container = document.createElement('div');
            container.id = 'beeToastHost';
            document.body.appendChild(container);
        }

        const el = document.createElement('div');
        el.className = `bee-toast-box ${type}`;
        const prefix = type === 'success' ? 'THÀNH CÔNG' : (type === 'error' ? 'LỖI' : 'THÔNG BÁO');
        const color = type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#f59e0b');
        const icon = type === 'success' ? 'bi-check-circle-fill' : (type === 'error' ? 'bi-x-circle-fill' : 'bi-exclamation-triangle-fill');

        el.innerHTML = `
            <i class="bi ${icon}" style="color:${color}; font-size:22px; margin-top:2px;"></i>
            <div style="display: flex; flex-direction: column; flex: 1;">
                <span style="font-weight:800; font-size:12px; text-transform: uppercase; margin-bottom: 4px; color:${color}">${prefix}</span>
                <span style="font-weight:500; font-size:13px; color:#333; line-height: 1.4;">${message}</span>
            </div>
            <i class="bi bi-x-lg" style="cursor: pointer; margin-left: 10px; font-size: 18px; color:#999; transition: 0.2s;" onmouseover="this.style.color='#000'" onmouseout="this.style.color='#999'" onclick="this.parentElement.remove()"></i>
        `;
        container.appendChild(el);

        setTimeout(() => {
            if (el.parentNode) {
                el.classList.add('hiding');
                setTimeout(() => el.remove(), 300);
            }
        }, 3500);
    };

    window.toastConfirm = function (title, message, onConfirm) {
        let container = document.getElementById('beeToastHost');
        if (!container) {
            container = document.createElement('div');
            container.id = 'beeToastHost';
            document.body.appendChild(container);
        }

        const el = document.createElement('div');
        el.className = `bee-toast-box warning`;
        el.style.flexDirection = 'column';
        el.style.alignItems = 'stretch';

        el.innerHTML = `
            <div style="display: flex; gap: 12px; align-items: flex-start; width: 100%;">
                <i class="bi bi-question-circle-fill" style="color:#f59e0b; font-size:24px; margin-top:2px;"></i>

        loadData: async function () {
            const { activeTab, page, size, q, trangThai } = this.state;

        // 🌟 ÁP DỤNG PHÂN TRANG ... ĐỒNG BỘ
        renderPagination: function(data) {
            this.state.totalPages = data.totalPages || 0;
            const container = document.getElementById('paginationContainer');

            if (this.state.totalPages <= 0) {
                container.innerHTML = '';
                return;
            }

            let html = `<div class="pagination-info">Hiển thị ${data.numberOfElements}/${data.totalElements} bản ghi</div><div class="pagination">`;

            html += `<button class="page-number" ${this.state.page === 0 ? 'disabled' : ''} onclick="window.PromotionApp.changePage(${this.state.page - 1})"><i class="bi bi-chevron-left"></i></button>`;

            const current = this.state.page + 1;
            const last = this.state.totalPages;
            const delta = 1;
            const left = current - delta;
            const right = current + delta;
            const range = [];
            const rangeWithDots = [];
            let l;

            for (let i = 1; i <= last; i++) {
                if (i === 1 || i === last || (i >= left && i <= right)) range.push(i);
            }

            for (let i of range) {
                if (l) {
                    if (i - l === 2) { rangeWithDots.push(l + 1); }
                    else if (i - l !== 1) { rangeWithDots.push('...'); }
                }
                rangeWithDots.push(i);
                l = i;
            }

            for (let i of rangeWithDots) {
                if (i === '...') {
                    html += `<span class="page-number" style="border:none; background:transparent; pointer-events:none; cursor:default; min-width: 15px;">...</span>`;
                } else {
                    const pageIndex = i - 1;
                    const activeClass = pageIndex === this.state.page ? 'active' : '';
                    html += `<button class="page-number ${activeClass}" onclick="window.PromotionApp.changePage(${pageIndex})">${i}</button>`;
                }
            }

            html += `<button class="page-number" ${this.state.page === this.state.totalPages - 1 ? 'disabled' : ''} onclick="window.PromotionApp.changePage(${this.state.page + 1})"><i class="bi bi-chevron-right"></i></button></div>`;

            container.innerHTML = html;
        },

        changePage: function(p) {
            if (p < 0 || p >= this.state.totalPages) return;
            this.state.page = p;
            this.loadData();
        },

            }).join('');

        renderVoucherTable: function (list) {

            if (list.length === 0) { tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Chưa có voucher nào</td></tr>'; return; }

                const fm = new Intl.NumberFormat('vi-VN');

                if (item.loaiGiamGia === 'PERCENT') typeLabel = '<span class="badge-type">Phần trăm</span>';
                else if (item.loaiGiamGia === 'FREESHIP') typeLabel = '<span class="badge-type" style="background:#dbeafe; color:#2563eb;"><i class="bi bi-truck"></i> Freeship</span>';
                else typeLabel = '<span class="badge-type">Tiền mặt</span>';

                const val = item.loaiGiamGia === 'PERCENT' ? item.giaTriGiamGia + '%' : fm.format(item.giaTriGiamGia) + ' ₫';
                const cond = fm.format(item.dieuKien);
                const toggleHtml = `<label class="switch-sm"><input type="checkbox" ${item.trangThai ? 'checked' : ''} onchange="window.PromotionApp.quickToggle(${item.id}, this)"><span class="slider-sm"></span></label>`;

                const total = item.soLuong;
                const used = item.luotSuDung;
                const remain = total - used;
                const percentRemain = total > 0 ? (remain / total) * 100 : 0;
                const fmt = (n) => n.toLocaleString('vi-VN');

                let colorClass = 'bg-safe'; let textClass = 'text-safe';
                if (remain === 0) { colorClass = 'bg-danger'; textClass = 'text-danger'; }
                else if (percentRemain < 30) { colorClass = 'bg-danger'; textClass = 'text-danger'; }
                else if (percentRemain < 70) { colorClass = 'bg-warning'; textClass = 'text-warning'; }

                const qtyHtml = `
                    <div class="qty-wrapper" title="Rê chuột để xem số lượng còn lại">
                        <div class="qty-text-group">
                            <span class="qty-default">${fmt(used)} / ${fmt(total)}</span>
                            <span class="qty-hover-text ${textClass}">Còn: ${fmt(remain)}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill ${colorClass}" style="width: ${percentRemain}%"></div>
                        </div>

                    <td>${typeLabel}</td>

                } else {
                    typeSelect.innerHTML = '<option value="PERCENT">Phần trăm (%)</option><option value="AMOUNT">Tiền mặt (VNĐ)</option><option value="FREESHIP">Hỗ trợ vận chuyển (VNĐ)</option>';

                document.getElementById('kmGiaTri').value = giaTri ? new Intl.NumberFormat('en-US').format(giaTri) : '';

                this.handleTypeChange(true);

                const formatTime = (t) => t ? t.substring(0, 16) : '';
                document.getElementById('kmNgayBatDau').value = formatTime(item.ngayBatDau);
                document.getElementById('kmNgayKetThuc').value = formatTime(item.ngayKetThuc);

                document.getElementById('kmTrangThai').checked = item.trangThai;

                    document.getElementById('saleFields').style.display = 'block';

        // 🌟 BỔ SUNG TOAST CONFIRM KHI LƯU
        saveItem: async function () {
            const formatDateTime = (val) => {
                if (!val) return null;
                return val.length === 16 ? val + ':00' : val;
            };
            const isSale = this.state.activeTab === 'sale';
            const actionTitle = this.state.editingId ? "Cập nhật dữ liệu" : "Thêm mới";
            const nameLabel = isSale ? "đợt Sale" : "Voucher";

            const ten = document.getElementById('kmTen').value.trim();
            const ngayBatDau = formatDateTime(document.getElementById('kmNgayBatDau').value);
            const ngayKetThuc = formatDateTime(document.getElementById('kmNgayKetThuc').value);

            const cleanMoney = (id, defaultValue = null) => {
                const val = document.getElementById(id).value;
                if (!val || val.trim() === '') return defaultValue;
                return parseFloat(val.replace(/,/g, ''));
            };
            const giaTriRaw = cleanMoney('kmGiaTri', null);

            if (!ten) { window.toast('Vui lòng nhập tên chương trình.', 'warning'); return; }
            if (!ngayBatDau || !ngayKetThuc) { window.toast('Thiếu thông tin thời gian.', 'warning'); return; }
            if (new Date(ngayKetThuc) <= new Date(ngayBatDau)) { window.toast('Kết thúc phải sau Bắt đầu.', 'warning'); return; }
            if (giaTriRaw === null) { window.toast('Vui lòng nhập định mức chiết khấu.', 'warning'); return; }

            if(isSale && this.state.selectedProductIds.length === 0) {
                window.toast('Bạn chưa chọn sản phẩm nào để áp dụng Sale!', 'warning');
                return;
            }

            window.toastConfirm(actionTitle, `Bạn chắc chắn muốn lưu thông tin ${nameLabel} này vào hệ thống?`, async () => {
                const btnSave = document.getElementById('btnSave');
                const originalText = btnSave.innerHTML;
                const loaiRaw = document.getElementById('kmLoai').value;

                let payload = {
                    ten: ten, ngayBatDau: ngayBatDau, ngayKetThuc: ngayKetThuc,
                    choPhepCongDon: document.getElementById('kmCongDon').checked,
                    trangThai: document.getElementById('kmTrangThai').checked
                };

                if (isSale) {
                    payload.ma = document.getElementById('kmMa').value.trim();
                    payload.loai = loaiRaw;
                    payload.giaTri = giaTriRaw;
                    payload.idSanPhams = this.state.selectedProductIds;
                    payload.choPhepCongDon = true;
                } else {
                    payload.maCode = document.getElementById('kmMa').value.trim();

                    if (loaiRaw === 'PERCENT') payload.loaiGiamGia = 'PERCENT';
                    else if (loaiRaw === 'FREESHIP') payload.loaiGiamGia = 'FREESHIP';
                    else payload.loaiGiamGia = 'FIXED';

                    payload.giaTriGiamGia = giaTriRaw;
                    payload.giaTriGiamGiaToiDa = (loaiRaw === 'PERCENT') ? cleanMoney('vGiaTriToiDa', null) : null;
                    payload.dieuKien = cleanMoney('vDieuKien', 0);
                    payload.soLuong = parseInt(document.getElementById('vSoLuong').value) || 0;
                }

                const endpoint = isSale ? '/api/khuyen-mai' : '/api/vouchers';
                const url = this.state.editingId ? `${endpoint}/${this.state.editingId}` : endpoint;

                try {
                    btnSave.disabled = true;
                    btnSave.innerHTML = 'ĐANG XỬ LÝ...';

                    const res = await fetch(url, {
                        method: this.state.editingId ? 'PUT' : 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        window.toast("Lưu dữ liệu thành công.", "success");
                        this.closeDrawer(); this.loadData();
                    } else {
                        let errorMsg = "Lưu thất bại.";
                        try {
                            const err = await res.json();
                            errorMsg = err.message || errorMsg;
                        } catch (e) {
                            const text = await res.text();
                            if (text) errorMsg = text;
                        }
                        window.toast(errorMsg, 'error');
                    }
                } catch (e) { window.toast("Sự cố kết nối máy chủ.", 'error'); }
                finally { btnSave.disabled = false; btnSave.innerHTML = originalText; }
            });
        },

        setFormState: function(disabled) {
            document.querySelectorAll('#drawer input, #drawer select').forEach(el => el.disabled = disabled);
            document.getElementById('btnSave').style.display = disabled ? 'none' : 'block';

        openView: async function(id) {

            this.setFormState(true);
            const isSale = this.state.activeTab === 'sale';
            document.getElementById('drawerTitle').innerText = isSale ? "CHI TIẾT ĐỢT SALE" : "CHI TIẾT VOUCHER";

                document.getElementById('productSearchDrawer').style.display = 'none';
                document.getElementById('checkAll').style.display = 'none';
                document.getElementById('selectedCount').innerText = `(Sản phẩm áp dụng: ${selectedOnly.length})`;
            }
        },

        quickToggle: async function(id, el) {
            const originalState = !el.checked;
            const isSale = this.state.activeTab === 'sale';

            // 🌟 ĐÃ FIX: Gọi window.toastConfirm thay vì this.toastConfirm
            window.toastConfirm("Đổi trạng thái", "Xác nhận thay đổi trạng thái kích hoạt của chương trình này?", async () => {
                    const endpoint = isSale ? `/api/khuyen-mai/${id}/trang-thai` : `/api/vouchers/${id}/trang-thai`;
                    const parent = el.closest('.switch-sm');
                    try {
                        parent.classList.add('loading');
                        const res = await fetch(endpoint, { method: 'PATCH' });

                        let data = {};
                        try { data = await res.json(); } catch (e) {}

                        if (res.ok) {
                            window.toast(data.message || "Cập nhật thành công.", 'success');
                            this.loadData();
                        } else {
                            window.toast(data.message || "Lỗi cập nhật.", 'error');
                            el.checked = originalState; // Hoàn tác lại trạng thái cũ trên UI nếu lỗi
                        }
                    } catch (e) {
                        window.toast("Lỗi kết nối.", "error");
                        el.checked = originalState; // Hoàn tác lại trạng thái cũ trên UI nếu lỗi mạng
                    }
                    finally { parent.classList.remove('loading'); }
                },
                () => {
                    // 🌟 ĐÃ FIX: Nếu người dùng bấm Hủy (Cancel) thì hoàn tác lại cái nút switch ngay lập tức
                    el.checked = originalState;
                }
            );
        },

        formatMoneyInput: function(el) {
            let val = el.value.replace(/[^0-9]/g, '');
            if (val.length > 1 && val.startsWith('0')) val = val.substring(1);
            el.value = val ? parseInt(val).toLocaleString('en-US') : '';
        },
        handleSearch: function(val) { clearTimeout(this.timeout); this.timeout = setTimeout(() => { this.state.q = val.trim(); this.state.page = 0; this.loadData(); }, 500); },
        handleStatus: function(val) { this.state.trangThai = val; this.state.page = 0; this.loadData(); },
        resetFilters: function() { this.state.q=''; this.state.trangThai=''; document.getElementById('search').value=''; document.getElementById('fTrangThaiFilter').value=''; this.loadData(); },
        closeDrawer: function () { document.getElementById('drawer').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); },

        loadProducts: async function () { try { const res = await fetch('/api/khuyen-mai/san-pham'); this.state.products = await res.json(); } catch(e){} },
        filterProducts: function(key) {
            const low = key.toLowerCase();
            this.renderProductSelectionTable(this.state.products.filter(p => p.ma.toLowerCase().includes(low) || p.ten.toLowerCase().includes(low)));
        },
        renderProductSelectionTable: function (data) {
            document.getElementById('productTableBody').innerHTML = data.map(p => `<tr>
                <td style="text-align:center;"><input type="checkbox" class="product-check" style="width:14px; height:14px; cursor:pointer;" value="${p.id}" ${this.state.selectedProductIds.includes(p.id)?'checked':''} onchange="window.PromotionApp.toggleProductSelection(${p.id}, this.checked)"></td>
                <td style="font-weight:800; color:#555;">${p.ma}</td>
                <td style="font-weight:600;">${p.ten}</td>
            </tr>`).join('');
        },
        toggleProductSelection: function (id, checked) {
            if(checked) { if (!this.state.selectedProductIds.includes(id)) this.state.selectedProductIds.push(id); }
            else { this.state.selectedProductIds = this.state.selectedProductIds.filter(x => x !== id); }
            document.getElementById('selectedCount').innerText = `(Đã chọn: ${this.state.selectedProductIds.length})`;
        }
    };

    window.PromotionApp.init();
</script>
</body>
</html>
