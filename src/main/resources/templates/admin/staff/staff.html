<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên - BeeMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        /* --- KẾ THỪA CSS CHUẨN TỪ MODULE KHÁCH HÀNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #000; --white: #fff; --gray-100: #f4f4f5; --gray-200: #e4e4e7; --gray-300: #d4d4d8; --font-size: 12.5px; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); font-size: var(--font-size); line-height: 1.4; }
        .container-bee { max-width: 100%; padding: 25px 35px; }

        .actions-bar { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--gray-200); margin-bottom: 25px; padding-bottom: 12px; }
        .page-title { font-size: 15px; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: 0.5px; }

        .btn-bee { font-size: 11px; font-weight: 800; text-transform: uppercase; height: 32px; padding: 0 16px; background: #000; color: #fff; border: 1px solid #000; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border-radius: 2px; transition: 0.2s; }
        .btn-bee:hover { background: #333; }
        .btn-secondary { background: #fff; color: #000; border: 1px solid #ccc; }

        .search-wrapper { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-bee-search { padding: 8px 15px; font-size: 12.5px; border: 1px solid var(--gray-300); outline: none; height: 36px; border-radius: 2px; flex: 1; }
        .select-bee-filter { padding: 0 12px; font-size: 12.5px; border: 1px solid var(--gray-300); outline: none; height: 36px; border-radius: 2px; width: 220px; }

        .table-wrapper { border: 1px solid var(--gray-200); width: 100%; overflow-x: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        thead th { padding: 12px 15px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #222; background: #fafafa; border-bottom: 1px solid var(--gray-200); }
        tbody td { padding: 12px 15px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; }

        /* SWITCH TOGGLE VUÔNG (Drawer) */
        .switch-square { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch-square input { opacity: 0; width: 0; height: 0; }
        .slider-square { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; }
        .slider-square:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; }
        input:checked + .slider-square { background-color: #000; }
        input:checked + .slider-square:before { transform: translateX(20px); }

        /* SWITCH TRONG BẢNG (Toggle nhanh) */
        .switch-sm { position: relative; display: inline-block; width: 30px; height: 16px; }
        .switch-sm input { opacity: 0; width: 0; height: 0; }
        .slider-sm { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; }
        .slider-sm:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: white; transition: .4s; }
        input:checked + .slider-sm { background-color: #000; }
        input:checked + .slider-sm:before { transform: translateX(14px); }

        /* DRAWER & TOAST */
        .staff-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; backdrop-filter: blur(2px); }
        .staff-overlay.show { display: block; }
        .drawer-bee { position: fixed; top: 0; right: -650px; width: 650px; height: 100vh; background: #fff; z-index: 3001; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.15); }
        .drawer-bee.show { right: 0; }
        .drawer-header { padding: 18px 25px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { flex: 1; padding: 25px; overflow-y: auto; }
        .drawer-footer { padding: 20px 25px; border-top: 1px solid var(--gray-200); display: flex; gap: 15px; background: #fff; }

        .form-group { margin-bottom: 15px; }
        .label-bee { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; color: #000; }
        .input-bee { width: 100%; padding: 10px; font-size: 12.5px; border: 1px solid var(--gray-300); border-radius: 2px; outline: none; }
        .input-bee:disabled { background-color: #f8fafc; color: #888; border: 1px dashed #cbd5e1; }

        .upload-area { width: 100px; height: 100px; border-radius: 50%; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 0 auto 15px; background: #fafafa; }
        .upload-area img { width: 100%; height: 100%; object-fit: cover; }

        .drawer-tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 20px; gap: 20px; }
        .drawer-tab { padding-bottom: 10px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
        .drawer-tab.active { color: #000; border-bottom-color: #000; }

        /* TOAST XỊN */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 280px; padding: 14px 22px; border-radius: 4px; background: #fff; color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; border-left: 5px solid #000; animation: toastIn 0.3s forwards; }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .btn-icon { width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--gray-200); background: #fff; cursor: pointer; border-radius: 2px; margin-left: 6px; }
        .btn-icon:hover { border-color: #000; background: #000; color: #fff; }
    </style>
</head>
<body>

<div class="container-bee">
    <div class="actions-bar">
        <h5 class="page-title">Hệ Thống Nhân Sự</h5>
        <button class="btn-bee" onclick="window.StaffApp.openDrawer('add')">
            <i class="bi bi-person-plus-fill"></i> TẠO HỒ SƠ MỚI
        </button>
    </div>

    <section class="search-section">
        <div class="search-wrapper">
            <input type="text" id="liveSearch" class="input-bee-search" placeholder="Tìm theo tên, mã, số điện thoại..." oninput="window.StaffApp.handleSearch(this.value)">
            <select id="filterStatus" class="select-bee-filter" onchange="window.StaffApp.handleSearch()">
                <option value="">TẤT CẢ TRẠNG THÁI</option>
                <option value="true">ĐANG LÀM VIỆC</option>
                <option value="false">NGHỈ LÀM</option>
            </select>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th style="text-align:center; width: 60px;">STT</th>
                <th>MÃ NV</th>
                <th>HỌ VÀ TÊN</th>
                <th>LIÊN HỆ</th>
                <th>CHỨC VỤ</th>
                <th style="text-align:center;">TRẠNG THÁI</th>
                <th style="text-align:right;">THAO TÁC</th>
            </tr>
            </thead>
            <tbody id="tableContent">
            </tbody>
        </table>
    </div>
</div>

<div class="staff-overlay" id="staffOverlay" onclick="window.StaffApp.closeDrawer()"></div>
<aside class="drawer-bee" id="staffDrawer">
    <div class="drawer-header">
        <h3 id="drawerTitle" style="font-weight: 800; font-size: 14px; text-transform: uppercase;">THIẾT LẬP HỒ SƠ</h3>
        <button class="btn-icon" onclick="window.StaffApp.closeDrawer()" style="border:none; font-size:20px;"><i class="bi bi-x-lg"></i></button>
    </div>

    <div class="drawer-body">
        <div class="drawer-tabs" id="drawerTabs" style="display: none;">
            <div class="drawer-tab active" onclick="window.StaffApp.switchTab('info')" id="tabInfo">THÔNG TIN HỒ SƠ</div>
            <div class="drawer-tab" onclick="window.StaffApp.switchTab('address')" id="tabAddr">ĐỊA CHỈ TẠM TRÚ</div>
        </div>

        <div id="contentInfo">
            <div id="avatarGroup" style="display: none;">
                <div class="upload-area" onclick="if(!window.StaffApp.state.isViewMode) document.getElementById('fileInput').click()">
                    <img id="imgPreview" src="https://via.placeholder.com/80">
                    <input type="file" id="fileInput" hidden accept="image/*" onchange="window.StaffApp.previewImg(this)">
                </div>
                <p style="text-align:center; font-size:11px; color:#888; margin-bottom:20px;">Nhấn để cập nhật ảnh đại diện</p>
            </div>

            <input type="hidden" id="nvId">
            <div class="form-group"><label class="label-bee">Họ và Tên *</label><input type="text" id="nvHoTen" class="input-bee" placeholder="Nhập họ tên..."></div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;"><label class="label-bee">Số điện thoại *</label><input type="tel" id="nvSdt" class="input-bee" placeholder="09xxxxxxxx"></div>
                <div class="form-group" style="flex: 1;"><label class="label-bee">Email *</label><input type="email" id="nvEmail" class="input-bee" placeholder="email@gmail.com"></div>
            </div>

            <div id="passwordBlock" style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;"><label class="label-bee">Mật khẩu *</label><input type="password" id="nvPass" class="input-bee" placeholder="••••••••"></div>
                <div class="form-group" style="flex: 1;"><label class="label-bee">Xác nhận *</label><input type="password" id="nvConfirmPass" class="input-bee" placeholder="••••••••"></div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;"><label class="label-bee">Ngày sinh</label><input type="date" id="nvNgaySinh" class="input-bee"></div>
                <div class="form-group" style="flex: 1;">
                    <label class="label-bee">Giới tính</label>
                    <select id="nvGender" class="input-bee"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
                </div>
            </div>

            <div class="form-group" id="statusGroup">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <label class="switch-square">
                        <input type="checkbox" id="nvTrangThaiSwitch" checked>
                        <span class="slider-square"></span>
                    </label>
                    <span style="font-size: 12px; font-weight: 700;" id="statusLabel">ĐANG LÀM VIỆC</span>
                </div>
            </div>

            <div id="editAddrGroup" style="border-top: 1px dashed #ccc; padding-top: 15px; margin-top: 20px;">
                <label class="label-bee">Địa chỉ liên hệ</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="inpCity" class="input-bee" onchange="window.StaffApp.Address.loadDistricts(this.value, 'inpDist', 'inpWard')"></select>
                    <select id="inpDist" class="input-bee" onchange="window.StaffApp.Address.loadWards(this.value, 'inpWard')" disabled></select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <select id="inpWard" class="input-bee" disabled></select>
                    <input id="inpDetail" class="input-bee" style="flex: 2;" placeholder="Số nhà, đường...">
                </div>
            </div>
        </div>

        <div id="contentAddr" style="display: none;">
            <div style="padding: 20px; background: #fafafa; border: 1px solid #eee; font-size: 13px; border-radius: 2px;">
                <i class="bi bi-geo-alt-fill" style="color: #ef4444;"></i> <span id="txtFullAddr" style="font-weight: 600;">Chưa cập nhật</span>
            </div>
        </div>
    </div>

    <div class="drawer-footer" id="drawerFooter">
        <button class="btn-bee btn-secondary" style="flex: 1;" onclick="window.StaffApp.closeDrawer()">HỦY BỎ</button>
        <button class="btn-bee" style="flex: 1;" id="btnSave" onclick="window.StaffApp.saveStaff()">LƯU HỒ SƠ</button>
    </div>
</aside>

<div class="toast-container" id="toastHost"></div>

<script>
    // --- TOAST XỊN ---
    window.toast = function(msg, type = 'success') {
        const h = document.getElementById('toastHost');
        const e = document.createElement('div');
        e.className = `toast ${type}`;
        e.innerHTML = `<div><span style="font-weight:800;">${type === 'success' ? 'THÀNH CÔNG: ' : 'LỖI: '}</span>${msg}</div>`;
        h.appendChild(e);
        setTimeout(() => e.remove(), 3500);
    };

    window.StaffApp = {
        state: { q: '', status: '', editingId: null, isViewMode: false },

        Address: {
            async loadProvinces(sid) {
                const res = await fetch('https://esgoo.net/api-tinhthanh/1/0.htm');
                const d = await res.json();
                document.getElementById(sid).innerHTML = '<option value="">-- Tỉnh/Thành --</option>' + d.data.map(p => `<option value="${p.id}" data-name="${p.full_name}">${p.full_name}</option>`).join('');
            },
            async loadDistricts(pid, did, wid) {
                const ds = document.getElementById(did); const ws = document.getElementById(wid);
                ws.innerHTML = '<option value="">-- Xã/Phường --</option>'; ws.disabled = true;
                if(!pid) { ds.innerHTML = '<option value="">-- Quận/Huyện --</option>'; ds.disabled = true; return; }
                const res = await fetch(`https://esgoo.net/api-tinhthanh/2/${pid}.htm`);
                const d = await res.json();
                ds.innerHTML = '<option value="">-- Quận/Huyện --</option>' + d.data.map(i => `<option value="${i.id}" data-name="${i.full_name}">${i.full_name}</option>`).join('');
                ds.disabled = false;
            },
            async loadWards(did, wid) {
                const ws = document.getElementById(wid);
                if(!did) { ws.innerHTML = '<option value="">-- Xã/Phường --</option>'; ws.disabled = true; return; }
                const res = await fetch(`https://esgoo.net/api-tinhthanh/3/${did}.htm`);
                const d = await res.json();
                ws.innerHTML = '<option value="">-- Xã/Phường --</option>' + d.data.map(i => `<option value="${i.id}" data-name="${i.full_name}">${i.full_name}</option>`).join('');
                ws.disabled = false;
            },
            getText(id) { const s = document.getElementById(id); return s.selectedIndex > 0 ? s.options[s.selectedIndex].getAttribute('data-name') : ''; },
            reset(cid, did, wid) {
                document.getElementById(cid).selectedIndex = 0;
                document.getElementById(did).innerHTML = '<option value="">-- Quận/Huyện --</option>';
                document.getElementById(wid).innerHTML = '<option value="">-- Xã/Phường --</option>';
            }
        },

        init() {
            this.loadData();
            this.Address.loadProvinces('inpCity');

            // Đồng bộ label cho switch trong drawer
            document.getElementById('nvTrangThaiSwitch').onchange = function() {
                document.getElementById('statusLabel').innerText = this.checked ? "ĐANG LÀM VIỆC" : "NGHỈ VIỆC";
            };
        },

        async loadData() {
            const res = await fetch(`/api/admin/nhan-vien/list-json?q=${this.state.q}&status=${this.state.status}`);
            const data = await res.json();
            this.renderTable(data);
        },

        renderTable(list) {
            document.getElementById('tableContent').innerHTML = list.map((item, idx) => `
                <tr>
                    <td style="text-align:center; font-weight:800; color:#888;">${idx+1}</td>
                    <td style="font-weight:800;">${item.ma || '---'}</td>
                    <td style="font-weight:700;">${item.hoTen}</td>
                    <td><b>${item.soDienThoai}</b><br><small>${item.email}</small></td>
                    <td><span style="font-size:10px; font-weight:800; text-transform:uppercase; padding:2px 8px; background:#eee; border-radius:2px;">${item.chucVu?.ten || 'NHÂN VIÊN'}</span></td>
                    <td style="text-align:center;">
                        <label class="switch-sm"><input type="checkbox" ${item.trangThai?'checked':''} onchange="window.StaffApp.quickToggle(${item.id}, this)"><span class="slider-sm"></span></label>
                    </td>
                    <td style="text-align:right;">
                        <button class="btn-icon" onclick="window.StaffApp.openEdit(${item.id}, true)"><i class="bi bi-eye"></i></button>
                        <button class="btn-icon" onclick="window.StaffApp.openEdit(${item.id}, false)"><i class="bi bi-pencil"></i></button>
                    </td>
                </tr>
            `).join('');
        },

        async quickToggle(id, el) {
            const original = !el.checked;
            try {
                const res = await fetch(`/api/admin/nhan-vien/toggle-status/${id}`, { method: 'PATCH' });
                if(res.ok) window.toast(await res.text(), "success");
                else { el.checked = original; window.toast("Lỗi cập nhật!", "error"); }
            } catch(e) { el.checked = original; window.toast("Mất kết nối!", "error"); }
        },

        openDrawer(mode) {
            this.state.editingId = null; this.state.isViewMode = false;
            document.getElementById('drawerTitle').innerText = 'TẠO HỒ SƠ NHÂN VIÊN';
            document.getElementById('drawerTabs').style.display = 'none';
            document.getElementById('avatarGroup').style.display = 'none'; // ✅ KHÔNG HIỆN ẢNH KHI THÊM
            document.getElementById('passwordBlock').style.display = 'flex';
            document.getElementById('editAddrGroup').style.display = 'block';
            document.getElementById('contentAddr').style.display = 'none';
            this.resetForm();
            this.toggleInputs(false);
            document.getElementById('staffDrawer').classList.add('show');
            document.getElementById('staffOverlay').classList.add('show');
        },

        async openEdit(id, isView) {
            this.state.editingId = id; this.state.isViewMode = isView;
            document.getElementById('drawerTitle').innerText = isView ? 'CHI TIẾT NHÂN VIÊN' : 'CẬP NHẬT HỒ SƠ';
            document.getElementById('drawerTabs').style.display = 'flex';
            document.getElementById('avatarGroup').style.display = 'block'; // ✅ HIỆN ẢNH KHI SỬA/XEM
            document.getElementById('passwordBlock').style.display = 'none';

            // Logic địa chỉ: View thì chỉ hiện text nối liền, Edit thì hiện ô chọn
            document.getElementById('editAddrGroup').style.display = isView ? 'none' : 'block';
            document.getElementById('contentAddr').style.display = isView ? 'block' : 'none';

            this.switchTab('info');
            const res = await fetch(`/api/admin/nhan-vien/detail/${id}`);
            const d = await res.json();

            document.getElementById('nvId').value = d.id;
            document.getElementById('nvHoTen').value = d.hoTen;
            document.getElementById('nvSdt').value = d.soDienThoai;
            document.getElementById('nvEmail').value = d.email;
            document.getElementById('nvNgaySinh').value = d.ngaySinh;
            document.getElementById('nvGender').value = d.gioiTinh;
            document.getElementById('nvTrangThaiSwitch').checked = d.trangThai;
            document.getElementById('statusLabel').innerText = d.trangThai ? "ĐANG LÀM VIỆC" : "NGHỈ VIỆC";
            document.getElementById('txtFullAddr').innerText = d.diaChi || 'Chưa cập nhật';
            document.getElementById('imgPreview').src = d.hinhAnh || 'https://via.placeholder.com/80';

            this.toggleInputs(isView);
            document.getElementById('staffDrawer').classList.add('show');
            document.getElementById('staffOverlay').classList.add('show');
        },

        switchTab(t) {
            document.querySelectorAll('.drawer-tab').forEach(el => el.classList.remove('active'));
            if(t === 'info') {
                document.getElementById('tabInfo').classList.add('active');
                document.getElementById('contentInfo').style.display = 'block';
                document.getElementById('contentAddr').style.display = 'none';
            } else {
                document.getElementById('tabAddr').classList.add('active');
                document.getElementById('contentInfo').style.display = 'none';
                document.getElementById('contentAddr').style.display = 'block';
            }
        },

        async saveStaff() {
            // 1. LẤY DỮ LIỆU TỪ CÁC Ô NHẬP
            const name = document.getElementById('nvHoTen').value.trim();
            const phone = document.getElementById('nvSdt').value.trim();
            const email = document.getElementById('nvEmail').value.trim();
            const dob = document.getElementById('nvNgaySinh').value;
            const isNew = !this.state.editingId;

            // 2. VALIDATE TRỐNG (CHECK TRỐNG)
            if (!name || !phone || !email || !dob) {
                window.toast("Vui lòng điền đầy đủ các trường có dấu (*)", "error");
                return;
            }

            // 3. VALIDATE TUỔI (PHẢI TRÊN 15 TUỔI)
            const birthDate = new Date(dob);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            // Tính toán chính xác đến từng ngày
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }

            if (age < 15) {
                window.toast(`Nhân viên chưa đủ tuổi (Hiện tại: ${age} tuổi). Phải từ 15 tuổi trở lên!`, "error");
                return;
            }

            // 4. KIỂM TRA MẬT KHẨU (NẾU LÀ THÊM MỚI)
            if (isNew) {
                const pass = document.getElementById('nvPass').value;
                const confirm = document.getElementById('nvConfirmPass').value;
                if (!pass) { window.toast("Mật khẩu không được để trống!", "error"); return; }
                if (pass !== confirm) { window.toast("Mật khẩu xác nhận không khớp!", "error"); return; }
            }

            // 5. CHUẨN BỊ FORM DATA GỬI LÊN JAVA
            const fd = new FormData();
            fd.append('hoTen', name);
            fd.append('soDienThoai', phone);
            fd.append('email', email);
            fd.append('ngaySinh', dob);
            fd.append('gioiTinh', document.getElementById('nvGender').value);
            fd.append('trangThai', document.getElementById('nvTrangThaiSwitch').checked);

            // Gửi chuỗi địa chỉ nối liền nếu có chọn mới, không thì giữ cái text hiển thị
            const city = this.Address.getText('inpCity');
            if(city) {
                fd.append('diaChi', `${document.getElementById('inpDetail').value}, ${this.Address.getText('inpWard')}, ${this.Address.getText('inpDist')}, ${city}`);
            } else {
                fd.append('diaChi', document.getElementById('txtFullAddr').innerText);
            }

            if(!isNew) {
                fd.append('id', this.state.editingId);
                const file = document.getElementById('fileInput').files[0];
                if(file) fd.append('fileAnh', file);
            } else {
                fd.append('password', document.getElementById('nvPass').value);
                fd.append('confirmPassword', document.getElementById('nvConfirmPass').value);
            }

            // 6. GỬI REQUEST
            try {
                const res = await fetch('/api/admin/nhan-vien/save', { method: 'POST', body: fd });
                const msg = await res.text();
                if(res.ok) {
                    window.toast(msg, "success");
                    setTimeout(() => location.reload(), 1000);
                } else {
                    window.toast(msg, "error"); // Hiện lỗi từ Java (Trùng SĐT, Email...)
                }
            } catch(e) {
                window.toast("Lỗi kết nối Server!", "error");
            }
        },

        toggleInputs(v) {
            document.querySelectorAll('#staffDrawer input, #staffDrawer select').forEach(i => { if(i.id !== 'fileInput') i.disabled = v; });
            document.getElementById('btnSave').style.display = v ? 'none' : 'block';
        },

        closeDrawer() { document.getElementById('staffDrawer').classList.remove('show'); document.getElementById('staffOverlay').classList.remove('show'); },
        resetForm() {
            document.querySelectorAll('#staffDrawer input').forEach(i => { if(i.type !== 'checkbox') i.value = ''; });
            document.getElementById('imgPreview').src = 'https://via.placeholder.com/80';
            this.Address.reset('inpCity', 'inpDist', 'inpWard');
        },
        previewImg(i) { if(i.files[0]) document.getElementById('imgPreview').src = URL.createObjectURL(i.files[0]); },
        handleSearch(v) { if(v !== undefined) this.state.q = v; this.state.status = document.getElementById('filterStatus').value; this.loadData(); },
        resetFilters() { document.getElementById('liveSearch').value=''; document.getElementById('filterStatus').value=''; this.state.q=''; this.state.status=''; this.loadData(); }
    };

    window.StaffApp.init();
</script>
</body>
</html>
