<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Nhân Viên - Bee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #000; --white: #fff;
            --gray-100: #f4f4f5; --gray-200: #e4e4e7;
            --gray-300: #d4d4d8; --font-main: 'Inter', sans-serif;
        }
        body { font-family: var(--font-main); background: var(--white); color: var(--black); font-size: 12.5px; line-height: 1.4; }

        .staff-module-wrapper { padding: 25px 35px; position: relative; min-height: 100vh; }

        .actions-bar {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid var(--gray-200); margin-bottom: 25px; padding-bottom: 12px;
        }
        .page-title { font-size: 15px; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: 0.5px; color: #000; }

        .btn-bee {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            height: 32px; padding: 0 16px; background: #000; color: #fff; border: 1px solid #000;
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; border-radius: 2px;
        }
        .btn-bee:hover { background: #333; }

        .search-section { margin-bottom: 20px; }
        .search-wrapper { display: flex; gap: 15px; }
        .input-bee-search {
            padding: 8px 15px; font-size: 12.5px; border: 1px solid var(--gray-300);
            outline: none; background: #fff; height: 36px; border-radius: 2px; flex: 1; transition: 0.2s;
        }
        .input-bee-search:focus { border-color: var(--black); }

        .select-bee-filter {
            padding: 0 12px; font-size: 12.5px; border: 1px solid var(--gray-300);
            outline: none; height: 36px; border-radius: 2px; width: 220px; cursor: pointer;
        }

        .table-wrapper { border: 1px solid var(--gray-200); border-radius: 0; overflow-x: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        thead th {
            padding: 12px 15px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            color: #222; background: #fafafa; border-bottom: 1px solid var(--gray-200);
        }
        tbody td { padding: 12px 15px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; }
        tbody tr:hover { background: #fcfcfc; }

        .status-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 3px 10px; border-radius: 4px; background: #f4f4f5; color: #666;
        }
        .status-pill.active-pill { background: #ecfdf5; color: #059669; }

        .btn-icon {
            width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--gray-200); background: #fff; cursor: pointer; color: #000; text-decoration: none; margin-left: 6px; border-radius: 2px;
        }
        .btn-icon:hover { border-color: #000; background: #000; color: #fff; }

        /* --- DRAWER STRUCTURE FIXED --- */
        .staff-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3000; display: none; backdrop-filter: blur(2px); }
        .staff-overlay.show { display: block; }

        .drawer-bee {
            position: fixed; top: 0; right: -650px; width: 650px; height: 100vh;
            background: #fff; z-index: 3001; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            box-shadow: -15px 0 40px rgba(0,0,0,0.15);
        }
        .drawer-bee.show { right: 0; }
        .drawer-header { padding: 18px 25px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .drawer-body { flex: 1; padding: 30px 25px; overflow-y: auto; overflow-x: hidden; }

        .drawer-footer {
            padding: 20px 25px; border-top: 1px solid var(--gray-200);
            display: flex; gap: 15px; flex-shrink: 0; background: #fff;
        }
        .btn-cancel-bee {
            flex: 1; height: 42px; border: 1px solid var(--gray-300); background: #fff; color: #000;
            font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 2px;
        }
        .btn-save-bee {
            flex: 1; height: 42px; border: 1px solid #000; background: #000; color: #fff;
            font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; border-radius: 2px;
        }

        .label-bee { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; color: #000; }
        .input-bee { width: 100%; padding: 10px; font-size: 12.5px; border: 1px solid var(--gray-300); border-radius: 2px; outline: none; }
        .input-bee:focus { border-color: #000; }
        .input-bee:disabled { background-color: #f8fafc; color: #888; border: 1px dashed #cbd5e1; cursor: not-allowed; }

        /* SWITCH TOGGLE */
        .form-switch .form-check-input { width: 3em; height: 1.5em; cursor: pointer; }
        .form-switch .form-check-input:checked { background-color: #000; border-color: #000; }
    </style>
</head>
<body>

<div class="staff-module-wrapper">
    <div class="actions-bar">
        <h5 class="page-title">HỆ THỐNG NHÂN SỰ</h5>
        <button class="btn-bee" onclick="window.openStaffDrawer('add')">
            <i class="bi bi-person-plus-fill"></i> TẠO HỒ SƠ MỚI
        </button>
    </div>

    <section class="search-section">
        <div class="search-wrapper">
            <input type="text" id="liveSearch" class="input-bee-search" placeholder="Tìm theo tên, mã, số điện thoại hoặc email..." oninput="window.doSearch()">
            <select id="filterStatus" class="select-bee-filter" onchange="window.doSearch()">
                <option value="">TẤT CẢ TRẠNG THÁI</option>
                <option value="true">ĐANG LÀM VIỆC</option>
                <option value="false">NGHỈ LÀM</option>
            </select>
        </div>
    </section>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th class="text-center" style="width: 60px;">STT</th>
                <th>Ảnh</th>
                <th>Mã NV</th>
                <th>Họ và Tên</th>
                <th>Thông tin liên hệ</th>
                <th>Chức vụ</th>
                <th class="text-center">Trạng thái</th>
                <th class="text-end" style="width: 120px;">Thao tác</th>
            </tr>
            </thead>
            <tbody id="tableContent" th:fragment="table_body">
            <tr th:each="nv, iterStat : ${list}" th:if="${nv.chucVu?.id != 1}">
                <td class="text-center fw-bold text-muted" th:text="${iterStat.count}"></td>
                <td><img th:src="${nv.hinhAnh ?: 'https://via.placeholder.com/35'}" width="35" height="35" class="rounded-circle border" style="object-fit:cover;"></td>
                <td class="fw-bold text-dark" th:text="${nv.ma}"></td>
                <td class="fw-bold text-dark" th:text="${nv.hoTen}"></td>
                <td style="line-height: 1.5;">
                    <span class="d-block fw-bold text-dark" th:text="${nv.soDienThoai}"></span>
                    <span class="text-muted small" th:text="${nv.email}"></span>
                </td>
                <td><span class="badge bg-light text-dark border fw-normal" th:text="${nv.chucVu?.ten}"></span></td>
                <td class="text-center">
                    <span th:class="${nv.trangThai ? 'status-pill active-pill' : 'status-pill'}" th:text="${nv.trangThai ? 'ĐANG LÀM' : 'NGHỈ LÀM'}"></span>
                </td>
                <td class="text-end">
                    <button class="btn-icon" th:onclick="'window.openStaffDrawer(\'view\',' + ${nv.id} + ')'"><i class="bi bi-eye"></i></button>
                    <button class="btn-icon" th:onclick="'window.openStaffDrawer(\'update\',' + ${nv.id} + ')'"><i class="bi bi-pencil-square"></i></button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="staff-overlay" id="staffOverlay" onclick="window.closeStaffDrawer()"></div>
<aside class="drawer-bee" id="staffDrawer">
    <div class="drawer-header">
        <h3 class="drawer-title" id="drawerTitle" style="font-weight: 800; font-size: 14px; text-transform: uppercase;">THIẾT LẬP HỒ SƠ</h3>
        <button type="button" class="btn-close" onclick="window.closeStaffDrawer()"></button>
    </div>

    <form id="staffForm" enctype="multipart/form-data" style="display: contents;">
        <div class="drawer-body">
            <input type="hidden" name="id" id="nvId">

            <div class="d-flex gap-4 align-items-center mb-5 p-4 border rounded-1 bg-light">
                <div class="position-relative">
                    <img id="imgPreview" src="https://via.placeholder.com/80" class="rounded-circle border border-3 border-white shadow-sm" style="width: 85px; height: 85px; object-fit: cover;">
                    <label id="labelCam" for="fileInput" class="btn btn-dark position-absolute bottom-0 end-0 rounded-circle p-0 d-flex align-items-center justify-content-center" style="width: 26px; height: 26px; cursor: pointer; border: 2px solid #fff;">
                        <i class="bi bi-camera-fill" style="font-size: 12px;"></i>
                    </label>
                    <input type="file" name="fileAnh" id="fileInput" class="d-none" onchange="window.previewImg(this)">
                </div>
                <div class="flex-grow-1 row g-3">
                    <div class="col-6" id="maNhanVienCol">
                        <label class="label-bee">MÃ NHÂN VIÊN</label>
                        <input type="text" name="ma" id="nvMa" class="input-bee fw-bold" readonly>
                    </div>
                    <div class="col-6" id="hoTenCol">
                        <label class="label-bee">HỌ VÀ TÊN *</label>
                        <input type="text" name="hoTen" id="nvHoTen" class="input-bee" required placeholder="Nhập họ tên...">
                    </div>
                </div>
            </div>

            <p class="fw-bold text-muted mb-3" style="font-size: 10.5px; text-transform: uppercase; border-left: 3px solid #000; padding-left: 10px;">I. Thông tin cá nhân</p>
            <div class="row row-cols-2 g-4 mb-5">
                <div class="col"><label class="label-bee">SỐ ĐIỆN THOẠI</label><input type="tel" name="soDienThoai" id="nvSdt" class="input-bee" placeholder="09xx xxx xxx"></div>
                <div class="col"><label class="label-bee">NGÀY SINH</label><input type="date" name="ngaySinh" id="nvNgaySinh" class="input-bee"></div>

                <div class="col">
                    <label class="label-bee">GIỚI TÍNH</label>
                    <div class="d-flex gap-4 pt-1">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gioiTinh" id="gtNam" value="Nam" checked>
                            <label class="form-check-label fw-bold" for="gtNam">Nam</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gioiTinh" id="gtNu" value="Nữ">
                            <label class="form-check-label fw-bold" for="gtNu">Nữ</label>
                        </div>
                    </div>
                </div>

                <div class="col-12"><label class="label-bee">ĐỊA CHỈ THƯỜNG TRÚ</label><textarea name="diaChi" id="nvDiaChi" class="input-bee" rows="2" placeholder="Nhập địa chỉ..."></textarea></div>
            </div>

            <p class="fw-bold text-muted mb-3" style="font-size: 10.5px; text-transform: uppercase; border-left: 3px solid #000; padding-left: 10px;">II. Tài khoản & Trạng thái</p>
            <div class="p-4 border rounded-1" style="background: #fafbfc;">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="label-bee">EMAIL (TÀI KHOẢN ĐĂNG NHẬP) *</label>
                        <input type="email" name="email" id="nvEmail" class="input-bee" placeholder="email@gmail.com">
                    </div>
                    <div id="passwordBlock" class="row g-4 m-0 p-0">
                        <div class="col-6"><label class="label-bee">MẬT KHẨU *</label><input type="password" name="password" id="nvPass" class="input-bee" placeholder="••••••••"></div>
                        <div class="col-6"><label class="label-bee">XÁC NHẬN MẬT KHẨU *</label><input type="password" name="confirmPassword" id="nvConfirmPass" class="input-bee" placeholder="••••••••"></div>
                    </div>

                    <div class="col-6" id="chucVuBlock">
                        <label class="label-bee">CHỨC VỤ HÀNH CHÍNH</label>
                        <select class="input-bee" disabled><option selected>NHÂN VIÊN BÁN HÀNG</option></select>
                        <input type="hidden" name="chucVu.id" value="2">
                    </div>

                    <div class="col-6">
                        <label class="label-bee">TRẠNG THÁI LÀM VIỆC</label>
                        <div class="form-check form-switch pt-2">
                            <input class="form-check-input" type="checkbox" id="nvTrangThaiSwitch" checked>
                            <label class="form-check-label fw-bold" for="nvTrangThaiSwitch" id="statusLabel" style="margin-left: 10px;">ĐANG LÀM VIỆC</label>
                            <input type="hidden" name="trangThai" id="nvTrangThaiHidden" value="true">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="drawer-footer" id="drawerFooter">
            <button type="button" class="btn-cancel-bee" onclick="window.closeStaffDrawer()">HỦY BỎ</button>
            <button type="submit" class="btn-save-bee">LƯU HỒ SƠ</button>
        </div>
    </form>
</aside>

<script th:inline="javascript">
    window.initStaff = function() {
        console.log("🚀 Bee Staff Module - Ready");

        const sw = document.getElementById('nvTrangThaiSwitch');
        const hd = document.getElementById('nvTrangThaiHidden');
        const lb = document.getElementById('statusLabel');

        sw.onchange = function() {
            hd.value = this.checked;
            lb.innerText = this.checked ? "ĐANG LÀM VIỆC" : "NGHỈ VIỆC";
            lb.style.color = this.checked ? "#059669" : "#6b7280";
        };

        window.doSearch = function() {
            const kw = document.getElementById('liveSearch').value;
            const st = document.getElementById('filterStatus').value;

            // Đảm bảo URL này khớp 100% với @RequestMapping + @GetMapping ở Java
            fetch(`/api/admin/nhan-vien/search?keyword=${encodeURIComponent(kw)}&status=${st}`)
                .then(res => {
                    if (!res.ok) throw new Error("Lỗi mạng hoặc server");
                    return res.text();
                })
                .then(html => {
                    // Sau khi đổi sang @Controller, 'html' ở đây sẽ là mã <tr>...</tr>
                    // chứ không còn là dòng chữ admin/staff/staff nữa
                    document.getElementById('tableContent').innerHTML = html;
                })
                .catch(err => console.error("Search Error:", err));
        }

        const staffForm = document.getElementById('staffForm');
        if (staffForm) {
            staffForm.onsubmit = function(e) {
                e.preventDefault();
                const ns = document.getElementById('nvNgaySinh').value;
                if (ns && (new Date().getFullYear() - new Date(ns).getFullYear() < 15)) {
                    alert("❌ Lỗi: Nhân viên phải từ 15 tuổi trở lên!"); return;
                }
                const emailVal = document.getElementById('nvEmail').value;
                if (!emailVal) { alert("Email không được trống!"); return; }

                const disabledInputs = staffForm.querySelectorAll(':disabled');
                disabledInputs.forEach(i => i.disabled = false);

                fetch('/api/admin/nhan-vien/save', { method: 'POST', body: new FormData(this) })
                    .then(async res => {
                        const msg = await res.text();
                        if (res.ok) { alert("✅ " + msg); location.reload(); }
                        else { alert("❌ Lỗi: " + msg); }
                    });
            };
        }

        window.openStaffDrawer = function(mode, id = null) {
            const form = document.getElementById('staffForm');
            if(!form) return;
            form.reset();
            document.getElementById('imgPreview').src = 'https://via.placeholder.com/80';
            const inputs = form.querySelectorAll('input, select, textarea, .form-check-input');
            const maCol = document.getElementById('maNhanVienCol');
            const passBlock = document.getElementById('passwordBlock');
            const cvBlock = document.getElementById('chucVuBlock');
            const footer = document.getElementById('drawerFooter');
            const labelCam = document.getElementById('labelCam');

            inputs.forEach(i => i.disabled = false);
            footer.style.display = 'flex';
            labelCam.style.display = 'flex';
            document.getElementById('nvMa').readOnly = true;

            if (mode === 'add') {
                document.getElementById('drawerTitle').innerText = 'TẠO HỒ SƠ NHÂN VIÊN';
                document.getElementById('nvId').value = '';
                maCol.style.display = 'none';
                cvBlock.style.display = 'none';
                passBlock.style.display = 'flex';
                sw.checked = true; sw.disabled = true; hd.value = "true";
                lb.innerText = "ĐANG LÀM VIỆC";
            }
            else if (mode === 'update') {
                document.getElementById('drawerTitle').innerText = 'CẬP NHẬT HỒ SƠ';
                maCol.style.display = 'block';
                cvBlock.style.display = 'none';
                passBlock.style.display = 'none';
                sw.disabled = false;
                ['nvHoTen', 'nvSdt', 'nvNgaySinh', 'nvDiaChi', 'gtNam', 'gtNu'].forEach(id => {
                    document.getElementById(id).disabled = true;
                });
                window.fetchData(id);
            }
            else if (mode === 'view') {
                document.getElementById('drawerTitle').innerText = 'CHI TIẾT NHÂN VIÊN';
                footer.style.display = 'none';
                labelCam.style.display = 'none';
                inputs.forEach(i => i.disabled = true);
                window.fetchData(id);
            }
            document.getElementById('staffDrawer').classList.add('show');
            document.getElementById('staffOverlay').classList.add('show');
        }

        window.fetchData = function(id) {
            fetch('/api/admin/nhan-vien/' + id)
                .then(res => {
                    if (!res.ok) throw new Error("Lỗi hệ thống");
                    return res.json();
                })
                .then(data => {
                    // Gán dữ liệu vào form, dùng || '' để tránh chữ "undefined"
                    document.getElementById('nvId').value = data.id || '';
                    document.getElementById('nvMa').value = data.ma || '';
                    document.getElementById('nvHoTen').value = data.hoTen || '';
                    document.getElementById('nvSdt').value = data.soDienThoai || '';
                    document.getElementById('nvEmail').value = data.email || '';
                    document.getElementById('nvDiaChi').value = data.diaChi || '';
                    document.getElementById('nvNgaySinh').value = data.ngaySinh || '';

                    // Xử lý Giới tính
                    if (data.gioiTinh === 'Nam') document.getElementById('gtNam').checked = true;
                    else if (data.gioiTinh === 'Nữ') document.getElementById('gtNu').checked = true;

                    // Cập nhật trạng thái
                    const sw = document.getElementById('nvTrangThaiSwitch');
                    const lb = document.getElementById('statusLabel');
                    sw.checked = data.trangThai === true;
                    lb.innerText = sw.checked ? "ĐANG LÀM VIỆC" : "NGHỈ VIỆC";
                    lb.style.color = sw.checked ? "#059669" : "#6b7280";

                    document.getElementById('imgPreview').src = data.hinhAnh || 'https://via.placeholder.com/80';
                })
                .catch(err => alert("❌ Lỗi: " + err.message));
        }

        window.closeStaffDrawer = function() {
            document.getElementById('staffDrawer').classList.remove('show');
            document.getElementById('staffOverlay').classList.remove('show');
        }

        window.previewImg = function(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => document.getElementById('imgPreview').src = e.target.result;
                r.readAsDataURL(input.files[0]);
            }
        }
    };

    if (!window.location.hash || window.location.hash === '#staff') window.initStaff();
</script>
</body>
</html>
