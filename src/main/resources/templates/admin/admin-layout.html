<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | Hệ thống Quản trị Bee</title>
    <style>
        /* ================= CSS VARIABLES & UTILS (Sử dụng lại) ================= */
        :root{ --bg:#0b0c0f;--panel:#11131a;--muted:#1a1d27;--text:#e7e9ee;--sub:#9aa4b2;--primary:#5b9cff;--red:#ff5b5b;--border:#232737; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font: 14px/1.4 system-ui, Roboto, Arial; }
        .row { display: flex; gap: 12px; align-items: center; }
        .muted { color: var(--sub); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid var(--border); background: var(--muted); color: var(--text); padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: 0.1s; }
        .btn.destructive { background: transparent; border-color: rgba(255, 91, 91, .25); color: #ff9f9f; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }

        /* ================= LAYOUT 3 PHẦN ================= */
        #app-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* 1. SIDEBAR (240px cố định) */
        #main-sidebar {
            width: 240px;
            background: #181c26;
            border-right: 1px solid var(--border);
            padding: 16px 0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-item {
            padding: 10px 20px;
            color: var(--sub);
            cursor: pointer;
            text-decoration: none;
            transition: 0.1s;
            display: block;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(91, 156, 255, 0.1);
            color: var(--text);
            border-right: 3px solid var(--primary);
        }

        /* 2. KHU VỰC CHÍNH */
        #main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* 3. HEADER (Thanh trên cùng) */
        #top-header {
            background: var(--panel);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 4. CONTENT AREA */
        #content-area {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto; /* Cho phép cuộn riêng phần nội dung */
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <aside id="main-sidebar">
        <h3 style="padding: 0 20px 10px; color: var(--primary);">BEE ADMIN</h3>
        <a href="#dashboard" class="sidebar-item active">🏠 Dashboard</a>
        <a href="#catalogs" class="sidebar-item">🛠️ Danh mục</a>
        <a href="#products" class="sidebar-item">📦 Sản phẩm</a>
        <a href="#pos" class="sidebar-item">🛒 Bán hàng POS</a>
        <a href="#orders" class="sidebar-item">🧾 Đơn hàng</a>
        <a href="#promo" class="sidebar-item">🎁 Giảm giá</a>
        <a href="#reports" class="sidebar-item">📈 Báo cáo</a>
        <a href="#users" class="sidebar-item">👤 Tài khoản</a>
    </aside>

    <div id="main-container">
        <header id="top-header">
            <h2 id="pageTitle" style="margin:0; font-size:1.4rem;">Dashboard</h2>
            <div class="row">
                <div class="muted">Hoàng (Admin)</div>
                <button class="btn destructive">Đăng xuất</button>
            </div>
        </header>

        <main id="content-area">
            <div class="card" style="padding:30px; text-align:center;">
                <h3 style="margin-bottom:10px;">Chào mừng Hoàng!</h3>
                <div>Bấm vào Sidebar để tải module.</div>
            </div>
        </main>
    </div>
</div>

<script src="/js/admin-router.js"></script>
</body>
</html>
