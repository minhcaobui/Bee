<style>
    #profile-page {
        font-family: 'Inter', sans-serif;
        font-size: 12.5px;
        line-height: 1.4;
        color: #000;
        padding: 20px 30px;
        --gray-100: #f4f4f5;
        --gray-200: #e4e4e7;
        --gray-300: #d4d4d8;
    }
    #profile-page *, #profile-page *::before, #profile-page *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Header ── */
    #profile-page .pf-header {
        background: #000; padding: 16px 20px;
        display: flex; align-items: center; gap: 16px;
        margin-bottom: 20px;
    }
    #profile-page .pf-avatar-wrap {
        position: relative; flex-shrink: 0; cursor: pointer;
        width: 46px; height: 46px;
    }
    #profile-page .pf-avatar {
        width: 46px; height: 46px; background: #fff; color: #000;
        font-size: 15px; font-weight: 800; display: flex;
        align-items: center; justify-content: center;
        text-transform: uppercase; overflow: hidden;
    }
    #profile-page .pf-avatar img { width: 100%; height: 100%; object-fit: cover; }
    #profile-page .pf-cam-overlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.6);
        color: #fff; display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: 0.2s; font-size: 14px;
    }
    #profile-page .pf-avatar-wrap:hover .pf-cam-overlay { opacity: 1; }

    #profile-page .pf-info { flex: 1; }
    #profile-page .pf-name { color: #fff; font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
    #profile-page .pf-role { color: #888; font-size: 11px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 6px;}

    /* ── Grid Layout ── */
    #profile-page .pf-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 900px) { #profile-page .pf-grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    #profile-page .pf-card {
        background: #fff; border: 1px solid var(--gray-200); border-radius: 2px;
        padding: 20px; margin-bottom: 20px;
    }
    #profile-page .pf-card-title {
        font-size: 11px; font-weight: 800; color: #888;
        text-transform: uppercase; letter-spacing: 0.5px;
        margin-bottom: 16px; border-bottom: 1px solid var(--gray-200);
        padding-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }

    /* ── Form Edit ── */
    .pf-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .pf-form-group { display: flex; flex-direction: column; gap: 6px; }
    .pf-form-group.full { grid-column: span 2; }
    .pf-label { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .pf-input {
        width: 100%; height: 36px; padding: 0 12px; font-family: 'Inter', sans-serif;
        font-size: 12.5px; border: 1px solid var(--gray-300); border-radius: 2px; outline: none; transition: 0.2s;
    }
    .pf-input:focus { border-color: #000; }
    .pf-input:disabled { background: var(--gray-100); color: #888; cursor: not-allowed; border-color: var(--gray-200); }
    select.pf-input { cursor: pointer; }

    .input-password-wrap { position: relative; width: 100%; }
    .toggle-pw-btn {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        background: none; border: none; cursor: pointer; color: #888; transition: 0.2s;
    }
    .toggle-pw-btn:hover { color: #000; }

    /* ── Buttons ── */
    .pf-btn {
        font-size: 11px; font-weight: 800; text-transform: uppercase; height: 36px;
        padding: 0 20px; background: #000; color: #fff; border: 1px solid #000;
        cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
        gap: 6px; border-radius: 2px; transition: 0.2s;
    }
    .pf-btn:hover { background: #333; }
    .pf-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<div id="profile-page">
    <div class="pf-header">
        <label class="pf-avatar-wrap" title="Đổi ảnh đại diện">
            <div class="pf-avatar" id="pfAvatarBig">NV</div>
            <div class="pf-cam-overlay" id="pfCamOverlay"><i class="bi bi-camera-fill"></i></div>
            <input type="file" id="pfAvatarUpload" accept="image/*" style="display:none;" onchange="ProfileApp.handleUpload(event)">
        </label>
        <div class="pf-info">
            <div class="pf-name" id="pfNameBig">Đang tải...</div>
            <div class="pf-role"><i class="bi bi-shield-check" style="color:#10b981;"></i> <span id="pfRoleText">...</span></div>
        </div>
    </div>

    <div class="pf-grid">
        <div>
            <div class="pf-card">
                <div class="pf-card-title"><i class="bi bi-person-lines-fill"></i> Hồ sơ cá nhân</div>

                <div class="pf-form-grid">
                    <div class="pf-form-group full">
                        <label class="pf-label">Tên đăng nhập <span style="color:#dc2626; font-size:9px; font-style:italic; text-transform:none;">(Chỉ được đổi 1 lần duy nhất)</span></label>
                        <input type="text" id="inpUsername" class="pf-input" placeholder="Tên đăng nhập...">
                        <div id="usernameWarning" style="display:none; font-size:10px; color:#dc2626; font-weight:600; margin-top:2px;">
                            <i class="bi bi-exclamation-triangle-fill"></i> Tên đăng nhập đã được thay đổi, không thể sửa thêm.
                        </div>
                    </div>

                    <div class="pf-form-group">
                        <label class="pf-label">Họ và tên</label>
                        <input type="text" id="inpName" class="pf-input" placeholder="Nhập họ tên...">
                    </div>

                    <div class="pf-form-group">
                        <label class="pf-label">Số điện thoại</label>
                        <input type="text" id="inpPhone" class="pf-input" placeholder="Nhập số điện thoại...">
                    </div>

                    <div class="pf-form-group">
                        <label class="pf-label">Email</label>
                        <input type="email" id="inpEmail" class="pf-input" placeholder="Nhập địa chỉ email...">
                    </div>

                    <div class="pf-form-group">
                        <label class="pf-label">Ngày sinh</label>
                        <input type="date" id="inpDob" class="pf-input">
                    </div>

                    <div class="pf-form-group">
                        <label class="pf-label">Giới tính</label>
                        <select id="inpGender" class="pf-input">
                            <option value="">Chưa chọn</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>

                    <div class="pf-form-group full">
                        <label class="pf-label">Địa chỉ</label>
                        <input type="text" id="inpAddress" class="pf-input" placeholder="Nhập địa chỉ hiện tại...">
                    </div>
                </div>

                <div style="text-align:right; margin-top: 24px;">
                    <button class="pf-btn" id="btnSaveProfile" onclick="ProfileApp.saveProfile()">LƯU THAY ĐỔI</button>
                </div>
            </div>
        </div>

        <div>
            <div class="pf-card">
                <div class="pf-card-title"><i class="bi bi-key-fill"></i> Đổi mật khẩu</div>

                <div class="pf-form-group" style="margin-bottom:16px;">
                    <label class="pf-label">Mật khẩu hiện tại</label>
                    <div class="input-password-wrap">
                        <input type="password" id="inpOldPw" class="pf-input" placeholder="Nhập mật khẩu cũ">
                        <button class="toggle-pw-btn" onclick="ProfileApp.togglePw('inpOldPw', this)"><i class="bi bi-eye-slash-fill"></i></button>
                    </div>
                </div>

                <div class="pf-form-group" style="margin-bottom:16px;">
                    <label class="pf-label">Mật khẩu mới (Tối thiểu 8 ký tự)</label>
                    <div class="input-password-wrap">
                        <input type="password" id="inpNewPw" class="pf-input" placeholder="Nhập mật khẩu mới">
                        <button class="toggle-pw-btn" onclick="ProfileApp.togglePw('inpNewPw', this)"><i class="bi bi-eye-slash-fill"></i></button>
                    </div>
                </div>

                <div class="pf-form-group" style="margin-bottom:20px;">
                    <label class="pf-label">Xác nhận mật khẩu mới</label>
                    <div class="input-password-wrap">
                        <input type="password" id="inpConfirmPw" class="pf-input" placeholder="Nhập lại mật khẩu mới">
                        <button class="toggle-pw-btn" onclick="ProfileApp.togglePw('inpConfirmPw', this)"><i class="bi bi-eye-slash-fill"></i></button>
                    </div>
                </div>

                <button class="pf-btn" id="btnSavePassword" onclick="ProfileApp.changePassword()" style="width:100%;">CẬP NHẬT MẬT KHẨU</button>
            </div>
        </div>
    </div>
</div>

<script>
     window.ProfileApp = {
        data: null,

        init: async function() {
            if (window.showLoading) window.showLoading();
            try {
                const res = await fetch('/api/nhan-vien/my-profile');
                if (!res.ok) throw new Error("Chưa đăng nhập");
                this.data = await res.json();
                this.render();
            } catch (err) {
                console.error(err);
                if (window.toast) window.toast("Không thể tải thông tin hồ sơ", "error");
            } finally {
                if (window.hideLoading) window.hideLoading();
            }
        },

        _initials: (name) => name ? name.substring(0, 2).toUpperCase() : 'NV',

        render: function() {
            const d = this.data;
            if (!d) return;

            // Render Header
            document.getElementById('pfNameBig').textContent = d.hoTen || 'Nhân viên';
            document.getElementById('pfRoleText').textContent = (d.chucVu && d.chucVu.ten) ? d.chucVu.ten : 'Chức vụ chưa rõ';

            const avatarEl = document.getElementById('pfAvatarBig');
            if (d.hinhAnh) avatarEl.innerHTML = `<img src="${d.hinhAnh}" alt="avatar" />`;
            else avatarEl.textContent = this._initials(d.hoTen);

            // Render Form Info
            const inpUser = document.getElementById('inpUsername');
            document.getElementById('inpName').value = d.hoTen || '';
            document.getElementById('inpPhone').value = d.soDienThoai || '';
            document.getElementById('inpEmail').value = d.email || '';
            document.getElementById('inpGender').value = d.gioiTinh || '';
            document.getElementById('inpAddress').value = d.diaChi || '';
            inpUser.value = d.tenDangNhap || '';

            if (d.ngaySinh) {
                const parts = d.ngaySinh.split('T')[0];
                document.getElementById('inpDob').value = parts;
            }

            // Logic khóa Tên Đăng Nhập
            if (d.daDoiTenDangNhap || (d.tenDangNhap && d.tenDangNhap !== d.soDienThoai)) {
                inpUser.disabled = true;
                document.getElementById('usernameWarning').style.display = 'block';
            }
        },

        saveProfile: async function() {
            const btn = document.getElementById('btnSaveProfile');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split spinning"></i> ĐANG LƯU...';

            const payload = {
                hoTen: document.getElementById('inpName').value.trim(),
                soDienThoai: document.getElementById('inpPhone').value.trim(),
                email: document.getElementById('inpEmail').value.trim(),
                gioiTinh: document.getElementById('inpGender').value,
                ngaySinh: document.getElementById('inpDob').value,
                diaChi: document.getElementById('inpAddress').value.trim(),
                tenDangNhap: document.getElementById('inpUsername').value.trim()
            };

            try {
                const res = await fetch('/api/nhan-vien/my-profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || "Tên đăng nhập đã tồn tại hoặc xảy ra lỗi.");
                }

                window.toast && window.toast("Cập nhật thông tin thành công!", "success");

                // Cập nhật lại UI Header
                document.getElementById('pfNameBig').textContent = payload.hoTen;

                // Đồng bộ tên lên thanh Sidebar Layout (nếu có)
                const miniName = document.querySelector('.user-mini-name');
                if(miniName) miniName.textContent = payload.hoTen;

                // Check khóa ô Username nếu đã bị đổi
                if (payload.tenDangNhap && payload.tenDangNhap !== this.data.soDienThoai) {
                    document.getElementById('inpUsername').disabled = true;
                    document.getElementById('usernameWarning').style.display = 'block';
                }

            } catch (err) {
                window.toast && window.toast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'LƯU THAY ĐỔI';
            }
        },

        togglePw: function(inputId, btnEl) {
            const inp = document.getElementById(inputId);
            if(inp.type === 'password') {
                inp.type = 'text';
                btnEl.innerHTML = '<i class="bi bi-eye-fill"></i>';
                btnEl.style.color = '#000';
            } else {
                inp.type = 'password';
                btnEl.innerHTML = '<i class="bi bi-eye-slash-fill"></i>';
                btnEl.style.color = '#888';
            }
        },

        changePassword: async function() {
            const oldPw = document.getElementById('inpOldPw').value;
            const newPw = document.getElementById('inpNewPw').value;
            const cfPw  = document.getElementById('inpConfirmPw').value;

            if (!oldPw || !newPw || !cfPw) {
                window.toast && window.toast("Vui lòng điền đủ thông tin mật khẩu!", "warning");
                return;
            }
            if (newPw.length < 8) {
                window.toast && window.toast("Mật khẩu mới phải có ít nhất 8 ký tự!", "warning");
                return;
            }
            if (newPw !== cfPw) {
                window.toast && window.toast("Xác nhận mật khẩu không khớp!", "error");
                return;
            }

            const btn = document.getElementById('btnSavePassword');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split spinning"></i> ĐANG CẬP NHẬT...';

            try {
                const res = await fetch('/api/nhan-vien/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw })
                });

                if (!res.ok) {
                    throw new Error("Sai mật khẩu hiện tại.");
                }

                window.toast && window.toast("Mật khẩu đã được thay đổi an toàn!", "success");
                document.getElementById('inpOldPw').value = '';
                document.getElementById('inpNewPw').value = '';
                document.getElementById('inpConfirmPw').value = '';

            } catch (err) {
                window.toast && window.toast(err.message, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'CẬP NHẬT MẬT KHẨU';
            }
        },

        handleUpload: async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                window.toast && window.toast('Kích thước ảnh không vượt quá 2MB.', 'warning');
                e.target.value = ''; return;
            }

            const overlay = document.getElementById('pfCamOverlay');
            if (overlay) overlay.innerHTML = '<i class="bi bi-hourglass-split spinning"></i>';

            const blobUrl = URL.createObjectURL(file);
            const avatarEl = document.getElementById('pfAvatarBig');
            const oldUrl = this.data.hinhAnh;
            avatarEl.innerHTML = `<img src="${blobUrl}" alt="avatar" />`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await uploadRes.json();
                if (uploadRes.ok && data.url) {

                    const updateRes = await fetch('/api/nhan-vien/my-profile', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ hinhAnh: data.url })
                    });

                    if (!updateRes.ok) throw new Error("Cập nhật Database thất bại");

                    this.data.hinhAnh = data.url;

                    if (oldUrl && oldUrl.includes('res.cloudinary.com')) {
                        fetch(`/api/upload?url=${encodeURIComponent(oldUrl)}`, { method: 'DELETE' }).catch(() => {});
                    }

                    const miniAvatar = document.querySelector('.user-mini-avatar');
                    if(miniAvatar) miniAvatar.src = data.url;

                    window.toast && window.toast('Đã cập nhật ảnh đại diện.', 'success');
                } else {
                    throw new Error(data.message || 'Upload thất bại');
                }
            } catch (err) {
                if (oldUrl) {
                    avatarEl.innerHTML = `<img src="${oldUrl}" alt="avatar" />`;
                } else {
                    avatarEl.textContent = this._initials(this.data.hoTen);
                }
                URL.revokeObjectURL(blobUrl);
                window.toast && window.toast('Lỗi tải ảnh: ' + err.message, 'error');
            } finally {
                if (overlay) overlay.innerHTML = '<i class="bi bi-camera-fill"></i>';
            }
        }
    };

    setTimeout(() => {
        ProfileApp.init();
    }, 50);
</script>
