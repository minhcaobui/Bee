<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập tài khoản</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 1. Thiết lập cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. Khung chứa form đăng nhập */
        .login-wrapper {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            margin: 20px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        /* 3. Các ô nhập liệu (Input group) */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px; /* Chừa chỗ cho icon bên trái */
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            transition: all 0.3s;
            font-size: 16px;
        }

        .input-group input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.2);
        }

        /* Icon mắt (hiện/ẩn password) */
        .toggle-password {
            position: absolute;
            right: 15px;
            left: auto !important; /* Ghi đè left của icon thường */
            cursor: pointer;
        }

        .toggle-password:hover {
            color: #764ba2;
        }

        /* 4. Tùy chọn phụ (Quên mật khẩu / Nhớ tôi) */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .options label {
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .options a {
            text-decoration: none;
            color: #764ba2;
            font-weight: 600;
        }

        .options a:hover {
            text-decoration: underline;
        }

        /* 5. Nút đăng nhập */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* 6. Footer (Đăng ký) */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-footer a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        /* Responsive cho màn hình nhỏ */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-header">
        <h2>Xin chào!</h2>
        <p>Vui lòng đăng nhập để tiếp tục</p>
    </div>

    <div th:if="${param.error}" style="color: #ff4d4d; text-align: center; margin-bottom: 15px; font-size: 14px;">
        Tên đăng nhập hoặc mật khẩu không chính xác!
    </div>

    <form th:action="@{/login}" method="POST">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Email hoặc tên đăng nhập" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>

        <div class="options">
            <label><input type="checkbox" name="remember-me"> Ghi nhớ tôi</label>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn-submit">Đăng nhập</button>
    </form>

    <div class="login-footer">
        Chưa có tài khoản? <a href="#">Đăng ký ngay</a>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        // Thay đổi type của input từ password sang text và ngược lại
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);

        // Thay đổi icon con mắt (mở/đóng)
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
