<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>BEE ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/layout/admin-layout.css}">
</head>
<body>
<div id="app-wrapper">
    <aside id="main-sidebar">
        <div class="brand">
            <i class="bi bi-ui-checks-grid"></i>
            <span>BEE ADMIN</span>
        </div>
        <div class="sidebar-menu">
            <div class="sidebar-label">TỔNG QUAN</div>
            <a href="#dashboard" class="sidebar-item active"><i class="bi bi-grid-fill"></i> <span>DASHBOARD</span></a>
            <a href="#pos" class="sidebar-item"><i class="bi bi-cart-fill"></i> <span>BÁN HÀNG</span></a>
            <div class="sidebar-label">QUẢN LÝ</div>
            <a href="#orders" class="sidebar-item"><i class="bi bi-collection-fill"></i> <span>HÓA ĐƠN</span></a>
            <a href="#catalogs" class="sidebar-item"><i class="bi bi-collection-fill"></i> <span>THUỘC TÍNH</span></a>
            <a href="#products" class="sidebar-item"><i class="bi bi-box-seam-fill"></i> <span>SẢN PHẨM</span></a>
            <a href="#promotions" class="sidebar-item"><i class="bi bi-tags-fill"></i> <span>KHUYẾN MÃI</span></a>
            <a href="#customers" class="sidebar-item"><i class="bi bi-receipt-cutoff"></i> <span>KHÁCH HÀNG</span></a>
            <a href="#staff" class="sidebar-item"><i class="bi bi-tags-fill"></i> <span>NHÂN VIÊN</span></a>
            <div class="sidebar-label">HỆ THỐNG</div>
            <a href="#users" class="sidebar-item"><i class="bi bi-person-fill"></i> <span>TÀI KHOẢN</span></a>
        </div>
        <div class="sidebar-user-panel" onclick="alert('Trang cá nhân')">
            <img th:src="${loggedInUser != null ? 'https://ui-avatars.com/api/?name=' + loggedInUser.hoTen + '&background=000&color=fff&size=64' : 'https://ui-avatars.com/api/?name=Admin&background=000&color=fff&size=64'}"
                 class="user-mini-avatar" alt="User">
            <div class="user-mini-info">
                <div class="user-mini-name" th:text="${loggedInUser != null ? loggedInUser.hoTen : 'Chưa đăng nhập'}">
                    VIỆT HOÀNG
                </div>
                <div class="user-mini-role" sec:authentication="principal.authorities[0].authority">
                    System Admin
                </div>
            </div>
            <form th:action="@{/logout}" method="POST" style="display:inline;">
                <button type="submit" class="logout-icon-btn" title="Đăng xuất" onclick="event.stopPropagation();">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </form>
        </div>
    </aside>
    <div id="main-container">
        <header id="top-header">
            <div class="header-left">
                <button class="toggle-btn" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h2 id="pageTitle" style="font-size:14px; font-weight:800;">DASHBOARD</h2>
            </div>
            <div class="header-right">
                <div class="header-clock">
                    <i class="bi bi-clock"></i> <span id="realtimeClock">00:00:00</span>
                </div>
                <div class="header-action-container">
                    <button class="icon-btn" onclick="handleNotifClick()">
                        <i class="bi bi-bell-fill"></i>
                        <span id="notif-badge"
                              style="position:absolute; top:8px; right:8px; width:8px; height:8px; background:red; border-radius:50%; border:2px solid #fff;"></span>
                    </button>
                    <div id="notif-dropdown" class="dropdown-menu">
                        <div class="dropdown-header">THÔNG BÁO MỚI</div>
                        <div class="dropdown-content">
                            <div class="empty-notif">
                                <i class="bi bi-bell-slash"></i>
                                <span>Không có thông báo mới nào</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <main id="content-area">
        </main>
    </div>
</div>
<div id="confirmOverlay" class="overlay">
    <div class="card"
         style="padding:24px; width:300px; background:#fff; border:1px solid #000; box-shadow: 4px 4px 0px #000;">
        <h4 style="margin-bottom:12px; font-size:14px;">ĐĂNG XUẤT?</h4>
        <div id="confirmMsg" style="margin-bottom:20px; color:#444;">Bạn có chắc muốn thoát phiên làm việc không?</div>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
            <button onclick="document.getElementById('confirmOverlay').style.display='none'" class="btn">Hủy</button>
            <button onclick="location.reload()" class="btn primary">Đồng ý</button>
        </div>
    </div>
</div>
<div class="loader-overlay" id="globalLoader">
    <div class="loader-content">
        <img src="https://media.giphy.com/media/YNlLqRY23XBjW/giphy.gif"
             class="loader-img"
             alt="System Processing...">
        <div class="loader-text">Đang xử lý...</div>
    </div>
</div>
<div class="toast-container" id="toastHost"></div>
<script src="/js/router/admin-router.js"></script>
<script th:src="@{/js/layout/admin-layout.js}"></script>
</body>
</html>
