<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catalog Manager (Vanilla JS + API)</title>
    <style>
        :root{ --bg:#0b0c0f;--panel:#11131a;--muted:#1a1d27;--text:#e7e9ee;--sub:#9aa4b2;--primary:#5b9cff;--green:#3ddc97;--amber:#ffbb33;--red:#ff5b5b;--border:#232737; --blue:#69a7ff; }
        *{box-sizing:border-box}
        body{margin:0;background:linear-gradient(180deg,#0b0c0f,#0e1118 40%,#0b0c0f);color:var(--text);font:14px/1.4 system-ui,Segoe UI,Roboto,Helvetica,Arial}
        .container{max-width:1100px;margin:24px auto;padding:0 16px}
        .row{display:flex;gap:12px;align-items:center}
        .between{justify-content:space-between}

        /* Tabs */
        .tabs{display:flex;gap:8px;background:var(--panel);border:1px solid var(--border);padding:6px;border-radius:999px}
        .tab{padding:8px 14px;border-radius:999px;color:var(--sub);cursor:pointer;user-select:none}
        .tab.active{background:var(--primary);color:#0b0c0f;font-weight:600}

        /* Button, Input */
        .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--muted);color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer}
        .btn.primary{background:var(--primary);border-color:transparent;color:#0b0c0f;font-weight:600}
        .btn.icon{padding:6px 10px}
        .btn.destructive{background:transparent;border-color:rgba(255,91,91,.25);color:#ff9f9f}
        .btn[disabled]{opacity:.5;cursor:not-allowed}
        .btn:hover:not([disabled]){filter:brightness(1.1)}
        .input{width:100%;background:#0c0f16;border:1px solid var(--border);color:#0eec; color: var(--text);padding:10px 12px;border-radius:10px}
        .input::placeholder{color:#657083}

        /* Card / Table */
        .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden}
        table{width:100%;border-collapse:separate;border-spacing:0}
        thead th{background:linear-gradient(180deg,#151926,#121521);text-align:left;padding:12px;border-bottom:1px solid var(--border);color:#c7cfdb;font-weight:600}
        tbody td{padding:12px;border-bottom:1px solid var(--border)}
        tbody tr:hover{background:rgba(255,255,255,.02)}
        .muted{color:var(--sub)}
        .badge{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid;}
        .badge.green{border-color:rgba(61,220,151,.3);color:#7bf0c5}
        .badge.amber{border-color:rgba(255,187,51,.3);color:#ffd792}

        /* Drawer */
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.2s}
        .overlay.show{opacity:1;pointer-events:auto}
        .drawer{position:fixed;top:0;right:-480px;width:420px;max-width:95vw;height:100%;background:#0f121a;border-left:1px solid var(--border);box-shadow:-10px 0 30px rgba(0,0,0,.3);transition:.25s}
        .drawer.show{right:0}
        .drawer header{padding:20px;border-bottom:1px solid var(--border)}
        .drawer main{padding:20px;display:grid;gap:14px}
        .drawer footer{padding:20px;border-top:1px solid var(--border)}
        .label{display:block;margin-bottom:6px;color:#c7cfdb}
        .label .req{color:#ff8080; margin-left:4px}
        .switch{appearance:none;width:42px;height:26px;background:#333;border-radius:999px;position:relative;outline:none;cursor:pointer;border:1px solid #444}
        .switch:checked{background:rgba(61,220,151,.2);border-color:#2a7c62}
        .switch:before{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#bbb;transition:.2s}
        .switch:checked:before{left:19px;background:#3ddc97}

        /* Pagination */
        .pagination{display:flex;align-items:center;gap:8px}
        .pager{border:1px solid var(--border);background:var(--muted);padding:6px 10px;border-radius:8px;cursor:pointer}
        .pager[disabled]{opacity:.5;cursor:not-allowed}
        .kpi{padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:#0c0f16}
        .spin{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid #9aa4b2;border-top-color:transparent;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Toasts */
        #toastHost{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:9999}
        .toast{min-width:260px;max-width:380px;background:#0f121a;border:1px solid var(--border);border-left-width:4px;border-radius:12px;padding:10px 12px;box-shadow:0 8px 24px rgba(0,0,0,.35);opacity:0;transform:translateY(8px);transition:.2s}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.success{border-left-color:var(--green)}
        .toast.error{border-left-color:var(--red)}
        .toast.info{border-left-color:var(--blue)}
        .toast .title{font-weight:600;margin-bottom:2px}
        .toast .msg{color:var(--sub)}

        /* Confirm dialog */
        #confirmOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9998}
        #confirmBox{width:min(92vw,420px);background:#0f121a;border:1px solid var(--border);border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
        #confirmBox header{padding:16px 18px;border-bottom:1px solid var(--border);font-weight:700}
        #confirmBox main{padding:16px 18px;color:#c7cfdb}
        #confirmBox footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    </style>
</head>
<body>
<div class="container">
    <div class="row between" style="margin-bottom:12px">
        <div id="tabs" class="tabs"></div>
        <button class="btn primary" id="btnAdd">➕ Thêm</button>
    </div>

    <div class="row" style="margin-bottom:12px">
        <div style="position:relative;flex:1">
            <input id="search" class="input" placeholder="Search…" />
            <span style="position:absolute;right:10px;top:50%;translate:0 -50%;color:#657083">⌕</span>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th style="width:160px">Mã</th>
                <th>Tên</th>
                <th id="thMoTa" class="hidden-mobile">Mô tả</th>
                <th id="thTrangThai" style="width:140px">Trạng thái</th>
                <th style="width:200px;text-align:right;padding-right:16px">Thao tác</th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="row between" style="margin-top:12px">
        <div class="muted" id="info">Hiển thị 0 / 0 bản ghi</div>
        <div class="pagination">
            <button class="pager" id="prev">◀ Trước</button>
            <span class="kpi" id="pageKpi">1 / 1</span>
            <button class="pager" id="next">Sau ▶</button>
        </div>
    </div>
</div>

<!-- Drawer -->
<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
    <header>
        <h3 id="drawerTitle" style="margin:0">Thêm mới</h3>
        <p class="muted" style="margin:6px 0 0">Điền thông tin rồi bấm Lưu.</p>
    </header>
    <main>
        <div>
            <label class="label" id="labelMa" for="fMa">Mã<span class="req" id="reqMa" style="display:none">*</span></label>
            <input id="fMa" class="input" placeholder="Để trống nếu muốn sinh tự động (tuỳ API)" />
        </div>
        <div>
            <label class="label" id="labelTen" for="fTen">Tên<span class="req">*</span></label>
            <input id="fTen" class="input" placeholder="Nhập tên" />
        </div>
        <div id="moTaRow">
            <label class="label" for="fMoTa">Mô tả</label>
            <input id="fMoTa" class="input" placeholder="Mô tả (tuỳ chọn)" />
        </div>
        <div id="statusRow" class="row between" style="border:1px solid var(--border);border-radius:12px;padding:10px 12px">
            <div>
                <div class="label" style="margin:0">Trạng thái</div>
                <div class="muted">Bật để hiển thị; tắt để ẩn.</div>
            </div>
            <input type="checkbox" id="fTrangThai" class="switch" />
        </div>
    </main>
    <footer>
        <div class="row" style="gap:10px">
            <button class="btn" id="btnClose">Đóng</button>
            <button class="btn primary" id="btnSave">Lưu</button>
        </div>
    </footer>
</aside>

<!-- Toast host -->
<div id="toastHost"></div>

<!-- Confirm dialog -->
<div id="confirmOverlay">
    <div id="confirmBox">
        <header>Xác nhận</header>
        <main id="confirmMsg">Bạn có chắc không?</main>
        <footer>
            <button class="btn" id="confirmCancel">Huỷ</button>
            <button class="btn primary" id="confirmOk">Đồng ý</button>
        </footer>
    </div>
</div>

<script>
    // ================= API CONFIG =================
    const API = {
        danh_muc: '/api/danh-muc',
        hang: '/api/hang',
        chat_lieu: '/api/chat-lieu',
        kich_thuoc: '/api/kich-thuoc',
        mau_sac: '/api/mau-sac',
    };

    const TABS = [
        { key: 'danh_muc',  label: 'Danh mục',  showMoTa: true,  showTrangThai: true,  requireMa: false },
        { key: 'hang',      label: 'Hãng',      showMoTa: true,  showTrangThai: true,  requireMa: false },
        { key: 'chat_lieu', label: 'Chất liệu', showMoTa: true,  showTrangThai: true,  requireMa: false },
        { key: 'kich_thuoc',label: 'Size',      showMoTa: false, showTrangThai: false, requireMa: true  },
        { key: 'mau_sac',   label: 'Màu',       showMoTa: false, showTrangThai: false, requireMa: true  },
    ];

    // --- duplicate check options ---
    const CHECK_DUP_TEN = true; // bật check trùng Tên (ngoài Mã)

    // ================= STATE =================
    let active = 'danh_muc';
    let q = '';
    let page = 1; // UI page (1-based)
    const size = 5;
    let rows = [];
    let totalElements = 0;
    let totalPages = 1;
    let editingId = null;

    // ================= HELPERS =================
    const $ = (s) => document.querySelector(s);

    // Toast
    function showToast(message, type = 'info', title){
        const host = $('#toastHost');
        const box = document.createElement('div');
        box.className = `toast ${type}`;
        box.innerHTML = `<div class="title">${title || (type==='success'?'Thành công': type==='error'?'Lỗi':'Thông báo')}</div><div class="msg">${message}</div>`;
        host.appendChild(box);
        requestAnimationFrame(()=> box.classList.add('show'));
        const timer = setTimeout(()=> close(), 2600);
        function close(){ box.classList.remove('show'); setTimeout(()=> box.remove(), 200); clearTimeout(timer); }
        box.addEventListener('click', close);
    }
    const toast = (msg, type='info', title) => showToast(msg, type, title);

    // Confirm (returns Promise<boolean>)
    function uiConfirm(message){
        return new Promise((resolve)=>{
            $('#confirmMsg').textContent = message;
            const ov = $('#confirmOverlay');
            ov.style.display = 'flex';
            const ok = ()=>{ cleanup(); resolve(true); };
            const cancel = ()=>{ cleanup(); resolve(false); };
            function onKey(e){ if(e.key==='Escape'){ cancel(); } }
            function cleanup(){
                ov.style.display = 'none';
                $('#confirmOk').removeEventListener('click', ok);
                $('#confirmCancel').removeEventListener('click', cancel);
                document.removeEventListener('keydown', onKey);
            }
            $('#confirmOk').addEventListener('click', ok);
            $('#confirmCancel').addEventListener('click', cancel);
            document.addEventListener('keydown', onKey);
        });
    }

    async function request(url, opts={}){
        const res = await fetch(url, { headers: { 'Content-Type':'application/json', 'Accept':'application/json' }, ...opts });
        if(!res.ok){ const text = await res.text(); throw new Error(text || res.statusText); }
        if(res.status === 204) return null;
        const ct = res.headers.get('content-type') || '';
        return ct.includes('application/json') ? res.json() : res.text();
    }

    function endpoint(){ return API[active]; }

    async function apiList(){
        const base = endpoint();
        const url = `${base}?page=${page-1}&size=${size}${q?`&q=${encodeURIComponent(q)}`:''}`;
        const data = await request(url);
        if(data && Array.isArray(data.content)){
            rows = data.content; totalElements = data.totalElements ?? rows.length; totalPages = data.totalPages ?? 1;
        } else if(Array.isArray(data)){
            rows = data; totalElements = data.length; totalPages = Math.max(1, Math.ceil(totalElements/size));
        } else { rows = []; totalElements = 0; totalPages = 1; }
    }

    async function apiCreate(payload){ return request(endpoint(), { method:'POST', body: JSON.stringify(payload) }); }
    async function apiUpdate(id, payload){ return request(`${endpoint()}/${id}`, { method:'PUT', body: JSON.stringify(payload) }); }
    async function apiDelete(id){ return request(`${endpoint()}/${id}`, { method:'DELETE' }); }

    // ---- Duplicate checks ----
    function isDupLocal(field, value, excludeId){
        if(!value) return false;
        const v = String(value).toLowerCase();
        return rows.some(x => String(x[field]||'').toLowerCase() === v && x.id !== excludeId);
    }
    async function isDupRemote(field, value, excludeId){
        if(!value) return false;
        const base = endpoint();
        // dùng q để tìm gần đúng, sau đó so sánh bằng tuyệt đối ở client
        const url = `${base}?page=0&size=5&q=${encodeURIComponent(value)}`;
        try{
            const data = await request(url);
            const list = Array.isArray(data?.content) ? data.content : (Array.isArray(data) ? data : []);
            const v = String(value).toLowerCase();
            return list.some(x => String(x[field]||'').toLowerCase() === v && x.id !== excludeId);
        }catch(e){
            // nếu API không hỗ trợ q thì bỏ qua remote check, rely vào 409 từ server
            return false;
        }
    }
    async function checkDuplicateAll(payload, excludeId){
        // Kiểm tra trùng Mã (nếu có) và Tên (nếu bật)
        if(payload.ma){
            if(isDupLocal('ma', payload.ma, excludeId) || await isDupRemote('ma', payload.ma, excludeId)){
                toast('Mã đã tồn tại', 'error'); return false;
            }
        }
        if(CHECK_DUP_TEN && payload.ten){
            if(isDupLocal('ten', payload.ten, excludeId) || await isDupRemote('ten', payload.ten, excludeId)){
                toast('Tên đã tồn tại', 'error'); return false;
            }
        }
        return true;
    }

    // ================= UI RENDER =================
    function renderTabs(){
        const wrap = $('#tabs'); wrap.innerHTML='';
        TABS.forEach(t=>{ const b=document.createElement('button'); b.className='tab'+(t.key===active?' active':''); b.textContent=t.label; b.onclick=()=>{ active=t.key; page=1; loadAndRender(); }; wrap.appendChild(b); });
    }

    function visibleCols(){
        const cfg = TABS.find(t=>t.key===active);
        return 3 + (cfg.showMoTa?1:0) + (cfg.showTrangThai?1:0); // Mã, Tên, [Mô tả], [Trạng thái], Thao tác
    }

    function renderTable(){
        const tbody = $('#tbody');
        const cfg = TABS.find(t=>t.key===active);
        $('#thMoTa').style.display = cfg.showMoTa ? '' : 'none';
        $('#thTrangThai').style.display = cfg.showTrangThai ? '' : 'none';

        tbody.innerHTML='';
        if(rows.length===0){
            const tr=document.createElement('tr');
            const td=document.createElement('td');
            td.colSpan = visibleCols();
            td.className='muted'; td.style.textAlign='center'; td.style.padding='28px 12px';
            td.textContent='Không có dữ liệu.';
            tr.appendChild(td); tbody.appendChild(tr);
        } else {
            rows.forEach(row=>{
                const tr=document.createElement('tr');
                const tdMa=document.createElement('td'); tdMa.textContent=row.ma; tr.appendChild(tdMa);
                const tdTen=document.createElement('td'); tdTen.textContent=row.ten; tr.appendChild(tdTen);
                if(cfg.showMoTa){ const tdMoTa=document.createElement('td'); tdMoTa.textContent=row.moTa||'—'; tr.appendChild(tdMoTa); }
                if(cfg.showTrangThai){ const tdTT=document.createElement('td'); tdTT.style.textAlign='center'; const span=document.createElement('span'); const on = !!row.trangThai; span.className = 'badge ' + (on ? 'green':'amber'); span.textContent = on ? 'Hiển thị' : 'Ẩn'; tdTT.appendChild(span); tr.appendChild(tdTT); }
                const tdAct=document.createElement('td'); tdAct.style.textAlign='right'; tdAct.style.paddingRight='16px';
                const bEdit=document.createElement('button'); bEdit.className='btn icon'; bEdit.textContent='Sửa'; bEdit.onclick=()=>openDrawer('edit', row);
                const bToggle=document.createElement('button'); bToggle.className='btn icon'; bToggle.textContent='Ẩn/Hiện'; bToggle.onclick=()=>toggleStatus(row);
                if(cfg.showTrangThai) tdAct.append(bEdit, bToggle); else tdAct.append(bEdit); // bỏ nút Xoá
                tr.appendChild(tdAct); tbody.appendChild(tr);
            });
        }

        $('#info').textContent = `Hiển thị ${rows.length} / ${totalElements} bản ghi`;
        $('#pageKpi').textContent = `${page} / ${totalPages}`;
        $('#prev').disabled = page<=1; $('#next').disabled = page>=totalPages;
    }

    function setLoading(on){
        const tbody = $('#tbody');
        if(on){ tbody.innerHTML = `<tr><td colspan="${visibleCols()}" style="text-align:center;padding:24px"><span class="spin"></span> Đang tải…</td></tr>`; }
    }

    async function loadAndRender(){
        renderTabs();
        setLoading(true);
        try{ await apiList(); }catch(e){ rows=[]; totalElements=0; totalPages=1; toast(e.message, 'error', 'Lỗi'); }
        renderTable();
    }

    // ================= Drawer logic =================
    function openDrawer(mode, row){
        const cfg = TABS.find(t=>t.key===active);
        $('#drawerTitle').textContent = (mode==='edit'?'Cập nhật':'Thêm mới')+ ' — ' + cfg.label;
        $('#statusRow').style.display = cfg.showTrangThai ? '' : 'none';
        $('#moTaRow').style.display = cfg.showMoTa ? '' : 'none';

        // Required marker + placeholder cho MA
        $('#reqMa').style.display = cfg.requireMa ? '' : 'none';
        $('#fMa').placeholder = cfg.requireMa ? 'Bắt buộc' : 'Để trống nếu muốn sinh tự động (tuỳ API)';

        editingId = mode==='edit' ? row.id : null; $('#drawer').dataset.mode = mode;
        $('#fMa').value = row?.ma || '';
        $('#fTen').value = row?.ten || '';
        $('#fMoTa').value = row?.moTa || '';
        $('#fTrangThai').checked = (row?.trangThai ?? true);

        $('#overlay').classList.add('show'); $('#drawer').classList.add('show');
    }
    function closeDrawer(){ $('#overlay').classList.remove('show'); $('#drawer').classList.remove('show'); editingId = null; }

    async function saveFromDrawer(){
        const mode = $('#drawer').dataset.mode || 'create';
        const cfg = TABS.find(t=>t.key===active);
        const payload = { ma: ($('#fMa').value||'').trim() || undefined, ten: ($('#fTen').value||'').trim() };
        if(cfg.showMoTa) payload.moTa = ($('#fMoTa').value||'').trim() || null;
        if(cfg.showTrangThai) payload.trangThai = $('#fTrangThai').checked;

        // Validate
        if(!payload.ten){ toast('Tên là bắt buộc', 'error'); return; }
        if(cfg.requireMa && !payload.ma){ toast('Mã là bắt buộc cho Size và Màu', 'error'); return; }

        // Duplicate checks (local + remote)
        const toCheck = { ...payload };
        if(editingId!=null){
            // nếu người dùng để trống ma khi edit (tab không bắt buộc), dùng ma hiện tại để check
            const current = rows.find(x=>x.id===editingId) || {};
            toCheck.ma = toCheck.ma ?? current.ma;
            toCheck.ten = toCheck.ten ?? current.ten;
        }
        const dupOk = await checkDuplicateAll(toCheck, editingId);
        if(!dupOk) return;

        const verb = mode==='edit' ? 'Cập nhật' : 'Thêm mới';
        const ok = await uiConfirm(`${verb} "${payload.ten}"?`);
        if(!ok) return;

        try{
            if(editingId==null){
                await apiCreate(payload); page = 1; toast('Đã tạo thành công', 'success');
            } else {
                const current = rows.find(x=>x.id===editingId) || {};
                const body = { ma: payload.ma ?? current.ma, ten: payload.ten ?? current.ten };
                if(cfg.showMoTa) body.moTa = payload.moTa;
                if(cfg.showTrangThai) body.trangThai = payload.trangThai ?? current.trangThai;
                await apiUpdate(editingId, body); toast('Đã cập nhật', 'success');
            }
            closeDrawer(); await loadAndRender();
        }catch(e){ toast(e.message, 'error', 'Lỗi'); }
    }

    async function toggleStatus(row){
        const cfg = TABS.find(t=>t.key===active);
        if(!cfg.showTrangThai){ toast('Mục này không có trạng thái.', 'info'); return; }
        const ok = await uiConfirm(`${row.trangThai ? 'Ẩn' : 'Hiển thị'} "${row.ten}"?`);
        if(!ok) return;
        try{ const body = { ma: row.ma, ten: row.ten }; if(cfg.showMoTa) body.moTa = row.moTa; body.trangThai = !row.trangThai; await apiUpdate(row.id, body); toast('Đã cập nhật trạng thái', 'success'); await loadAndRender(); }catch(e){ toast(e.message, 'error', 'Lỗi'); }
    }

    // ================= Wire-up =================
    $('#btnAdd').onclick = ()=>openDrawer('create');
    $('#btnSave').onclick = saveFromDrawer;
    $('#btnClose').onclick = closeDrawer;
    $('#overlay').onclick = closeDrawer;

    let debounce; $('#search').addEventListener('input', (e)=>{ q = e.target.value || ''; page = 1; clearTimeout(debounce); debounce = setTimeout(loadAndRender, 300); });
    $('#prev').onclick = ()=>{ if(page>1){ page--; loadAndRender(); } };
    $('#next').onclick = ()=>{ if(page<totalPages){ page++; loadAndRender(); } };

    // init
    renderTabs(); loadAndRender();
</script>
</body>
</html>
