# App name
spring.application.name=beemate

# Ket noi MS SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=beemate;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=DEBUG
spring.web.resources.static-locations=classpath:/static/

# Mac dinh tieng Viet
spring.web.locale=vi_VN
spring.web.locale-resolver=fixed

#Cau hinh ngay thang
spring.mvc.format.date=dd/MM/yyyy
spring.jackson.date-format=dd/MM/yyyy
spring.jackson.serialization.write-dates-as-timestamps=false
logging.level.org.springframework.security=DEBUG

# T?ng gi?i h?n kích th??c request ?? nh?n ???c chu?i Base64 l?n
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cho phép Jackson b? qua các bean tr?ng/proxy c?a Hibernate
spring.jackson.serialization.fail-on-empty-beans=false

logging.level.root=WARN
logging.level.org.hibernate.SQL=debug
logging.level.org.springframework.transaction=DEBUG

server.error.include-message=always


